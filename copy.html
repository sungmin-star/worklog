<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>작업일지 — 종합 문서</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{
    --ink:#1c2433; --muted:#5b6577; --line:#e2e6ee; --soft:#f5f7fb;
    --blue:#3a4a7a; --accent:#7c5cff; --bg:#fbfbfd; --surface:#fff;
  }
  @media (prefers-color-scheme: dark){
    :root{ --ink:#e9eaee; --muted:#9aa0ac; --line:#34363c; --soft:#26282d;
           --blue:#8aa0d8; --accent:#9a86ff; --bg:#1a1b1e; --surface:#222428; }
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); }
  body{
    font-family:"Apple SD Gothic Neo","Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--ink); line-height:1.7; letter-spacing:-0.1px;
    -webkit-text-size-adjust:100%;
  }
  .wrap{ max-width:820px; margin:0 auto; padding:32px 20px 80px; }
  .doc{ background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:32px 34px; }
  @media (max-width:600px){ .doc{ padding:22px 18px; border-radius:12px; } .wrap{ padding:16px 12px 60px; } }

  h1{ font-size:25px; font-weight:800; letter-spacing:-0.5px; margin:0 0 6px; }
  h2{ font-size:18px; font-weight:700; color:var(--blue); margin:30px 0 12px; padding-bottom:7px; border-bottom:2px solid var(--blue); }
  h3{ font-size:15px; font-weight:700; margin:20px 0 8px; }
  p{ margin:0 0 12px; }
  ul,ol{ margin:6px 0 14px; padding-left:20px; }
  li{ margin:4px 0; }
  a{ color:var(--accent); }
  strong{ font-weight:700; }
  hr{ border:none; border-top:1px solid var(--line); margin:26px 0; }
  code{ font-family:"SFMono-Regular",Menlo,Consolas,monospace; font-size:.88em; background:var(--soft); padding:2px 6px; border-radius:6px; border:1px solid var(--line); }
  blockquote{ margin:14px 0; padding:11px 16px; background:var(--soft); border-left:3px solid var(--accent); border-radius:0 10px 10px 0; color:var(--muted); }
  blockquote p{ margin:6px 0; }
  table{ width:100%; border-collapse:collapse; margin:10px 0 18px; font-size:14px; display:block; overflow-x:auto; }
  th,td{ text-align:left; padding:8px 11px; border-bottom:1px solid var(--line); vertical-align:top; }
  th{ background:var(--soft); color:var(--muted); font-weight:600; white-space:nowrap; }
  .loading{ color:var(--muted); text-align:center; padding:40px 0; }
  .err{ color:#c0392b; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="doc" id="doc"><div class="loading">문서를 불러오는 중…</div></div>
  </div>
<script>
  (async function(){
    const el = document.getElementById("doc");
    try {
      const res = await fetch("./copy.md", { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const md = await res.text();
      el.innerHTML = marked.parse(md);
    } catch (e){
      el.innerHTML = '<p class="err">문서를 불러오지 못했습니다: ' + (e && e.message ? e.message : e) + '</p>';
    }
  })();
</script>
</body>
</html>
