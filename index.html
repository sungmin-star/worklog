<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>L'Heure Bleue</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="theme-color" content="#ece9e1" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#1d1d1f" media="(prefers-color-scheme: dark)" />
<!-- PWA: 홈 화면 설치 + 오프라인 -->
<link rel="manifest" href="./manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="L'Heure Bleue" />
<link rel="apple-touch-icon" href="./icon-180.png" />
<link rel="icon" type="image/png" href="./icon-192.png" />
<script>
  /* 저장된 테마를 페인트 전에 적용해 깜빡임 방지 */
  try{
    var t = localStorage.getItem("worklog:theme");
    if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
  }catch(e){}
</script>
<style>
  /* ============================================================
     작업 일지 — Daily Work Log
     단일 파일 · Vanilla JS · 종이 노트 분위기
     ============================================================ */

  /* ── L'Heure Bleue Light : 크림 + 네이비 + 골드 ───────────── */
  :root{
    --bg:#ece9e1;
    --surface:#f6f3ed;
    --surface-2:#e2ded4;
    --text:#242420;
    --muted:#7a766c;
    --line:#dcd7cb;
    --line-strong:#cac4b6;
    --accent:#c9a961;
    --accent-hover:#8b7355;
    --accent-text:#242420;
    --accent-soft:rgba(201,169,97,0.15);
    --bleue:#1e3a5f;
    --ok:#5c8a5a;
    --danger:#b4453a;
    --shadow:0 1px 0 rgba(20,20,22,0.04);
    --shadow-lg:0 24px 60px rgba(20,20,22,0.14);
    --ring:0 0 0 3px var(--accent-soft);
    --blur-bg:rgba(236,233,225,0.86);
    --radius:4px;
    --radius-sm:3px;
    --display:"Cormorant Garamond", "EB Garamond", "Pretendard Variable", Pretendard, "Apple SD Gothic Neo", Georgia, serif;
    --sans:-apple-system, BlinkMacSystemFont, "SF Pro Text", "Pretendard Variable", Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
  }

  /* ── L'Heure Bleue Dark : 딥 네이비(블루아워) + 골드 ───────── */
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --bg:#1d1d1f;
      --surface:#2a2a2c;
      --surface-2:#38383b;
      --text:#ececec;
      --muted:#9a9a9e;
      --line:#3a3a3d;
      --line-strong:#4c4c50;
      --accent:#cdae6a;
      --accent-hover:#e0c685;
      --accent-text:#1d1d1f;
      --accent-soft:rgba(205,174,106,0.18);
      --bleue:#ececec;
      --ok:#7fb47c;
      --danger:#e0685b;
      --shadow:0 1px 0 rgba(0,0,0,0.4);
      --shadow-lg:0 24px 60px rgba(0,0,0,0.6);
      --blur-bg:rgba(29,29,31,0.80);
    }
  }
  /* 사용자가 직접 다크를 선택한 경우(시스템 설정과 무관) */
  :root[data-theme="dark"]{
    --bg:#1d1d1f;
    --surface:#2a2a2c;
    --surface-2:#38383b;
    --text:#ececec;
    --muted:#9a9a9e;
    --line:#3a3a3d;
    --line-strong:#4c4c50;
    --accent:#cdae6a;
    --accent-hover:#e0c685;
    --accent-text:#1d1d1f;
    --accent-soft:rgba(205,174,106,0.18);
    --bleue:#ececec;
    --ok:#7fb47c;
    --danger:#e0685b;
    --shadow:0 1px 0 rgba(0,0,0,0.4);
    --shadow-lg:0 24px 60px rgba(0,0,0,0.6);
    --blur-bg:rgba(29,29,31,0.80);
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{ -webkit-text-size-adjust:100%; }
  body{
    font-family:var(--sans);
    background:var(--bg);
    color:var(--text);
    font-feature-settings:"tnum" 1;
    line-height:1.55;
    letter-spacing:-0.01em;
    min-height:100dvh;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  body.modal-open{overflow:hidden}

  button{ font-family:inherit; color:inherit; cursor:pointer; }
  input, textarea{ font-family:inherit; color:inherit; }
  ::selection{ background:var(--accent); color:var(--accent-text); }

  /* ---------- Layout ---------- */
  .page{
    max-width:720px;
    margin:0 auto;
    padding:64px 28px 120px;
  }
  @media (max-width:600px){
    .page{ padding:40px 18px 100px; }
  }

  /* ---------- 좌측 카테고리 사이드바 ---------- */
  .sidebar-toggle{
    position:absolute; left:0; top:50%; transform:translateY(-50%);
    width:38px; height:38px; border-radius:50%; border:none;
    background:var(--surface-2); color:var(--text);
    display:inline-flex; align-items:center; justify-content:center;
    transition:background-color .15s ease;
  }
  .sidebar-toggle svg{ width:18px; height:18px; }
  .sidebar-toggle:hover{ background:var(--line); }
  .sidebar{
    position:fixed; left:0; top:0; bottom:0; width:248px; z-index:95;
    background:var(--surface); border-right:1px solid var(--line);
    padding:22px 12px; overflow-y:auto;
    transform:translateX(-100%); transition:transform .25s ease;
    display:none;
  }
  body.app-ready .sidebar{ display:block; }
  .sidebar[data-open="true"]{ transform:translateX(0); box-shadow:var(--shadow-lg); }
  .sidebar-overlay{
    position:fixed; inset:0; z-index:94; background:rgba(0,0,0,0.4);
    opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .sidebar-overlay[data-open="true"]{ opacity:1; pointer-events:auto; }
  .sb-brand{ font-size:13px; font-weight:700; color:var(--muted); padding:4px 12px 14px; letter-spacing:.02em; }
  .sb-section{ margin-bottom:18px; }
  .sb-title{ font-size:11.5px; font-weight:600; color:var(--muted); padding:0 12px 6px; text-transform:uppercase; letter-spacing:.04em; }
  .sb-item, .sb-sub{
    display:flex; align-items:center; gap:8px; width:100%; text-align:left; border:none;
    background:transparent; color:var(--text); border-radius:9px; cursor:pointer;
    transition:background-color .12s ease;
  }
  .sb-item{ padding:9px 12px; font-size:14.5px; font-weight:500; }
  .sb-sub{ padding:7px 12px 7px 14px; font-size:13.5px; color:var(--muted); }
  .sb-item:hover, .sb-sub:hover{ background:var(--surface-2); color:var(--text); }
  .sb-item.active, .sb-sub.active{ background:var(--surface-2); color:var(--text); font-weight:600; box-shadow:inset 0 0 0 1px var(--line); }
  .sb-c{ margin-left:auto; font-size:11.5px; color:var(--muted); font-weight:500; }
  .sb-empty{ padding:4px 12px; font-size:12.5px; color:var(--muted); }

  /* 데스크탑: 사이드바 항상 표시 + 콘텐츠 우측 확보 */
  @media (min-width:1024px){
    .sidebar{ transform:none !important; box-shadow:none; }
    .sidebar-overlay{ display:none; }
    .sidebar-toggle{ display:none; }
    body.app-ready{ padding-left:248px; }
    body.app-ready .months, body.app-ready .tagbar{ display:none; } /* 사이드바가 대체 */
  }

  /* ---------- 사진 갤러리 ---------- */
  .photo-head{ font-size:14px; font-weight:600; color:var(--muted); margin-bottom:14px; }
  .photo-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(104px,1fr)); gap:8px; }
  .photo-cell{ border:none; padding:0; aspect-ratio:1; border-radius:10px; overflow:hidden; cursor:pointer; background:var(--surface-2); }
  .photo-cell img{ width:100%; height:100%; object-fit:cover; display:block; transition:transform .2s ease; }
  .photo-cell:hover img{ transform:scale(1.05); }
  body.view-photos .controls, body.view-photos .months, body.view-photos .tagbar{ display:none; }
  body.view-calendar .controls, body.view-calendar .months, body.view-calendar .tagbar{ display:none; }
  body.view-graph .controls, body.view-graph .months, body.view-graph .tagbar{ display:none; }

  /* 사이드바 하단 구역(사진·프로젝트·휴지통) 구분선 */
  .sb-bottom{ border-top:1px solid var(--line); padding-top:14px; margin-top:6px; }

  /* ---------- 캘린더 뷰 ---------- */
  .cal-head{ display:flex; align-items:center; justify-content:space-between; margin:0 auto 14px; width:100%; max-width:460px; }
  .cal-title{ font-size:17px; font-weight:700; }
  .cal-nav{ width:36px; height:36px; border-radius:50%; border:1px solid var(--line); background:var(--surface); color:var(--text); font-size:20px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; }
  .cal-nav:hover{ background:var(--surface-2); }
  .cal-grid{ display:grid; grid-template-columns:repeat(7, minmax(0,1fr)); gap:5px; width:100%; max-width:460px; margin:0 auto; }
  .cal-dow{ text-align:center; font-size:12px; color:var(--muted); padding:4px 0 8px; font-weight:600; }
  .cal-dow.sun{ color:var(--danger); }
  .cal-dow.sat{ color:var(--accent); }
  .cal-cell{ aspect-ratio:1; border:none; background:transparent; border-radius:10px; position:relative; display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--text); }
  .cal-cell.empty{ visibility:hidden; }
  .cal-cell[disabled]{ color:var(--muted); opacity:.45; cursor:default; }
  .cal-cell.has{ background:var(--surface-2); cursor:pointer; font-weight:700; }
  .cal-cell.has:hover{ background:var(--line); }
  .cal-cell.today{ box-shadow:inset 0 0 0 2px var(--accent); }
  .cal-dot{ position:absolute; bottom:5px; left:50%; transform:translateX(-50%); min-width:13px; height:13px; padding:0 3px; border-radius:7px; background:var(--accent); color:var(--accent-text); font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; }
  .cal-foot{ margin-top:18px; text-align:center; color:var(--muted); font-size:13px; }

  /* ---------- 그래프 뷰 (위키링크 맵) ---------- */
  .graph-wrap{ position:relative; width:100%; height:calc(100vh - 230px); min-height:380px;
    border:1px solid var(--line); border-radius:14px; overflow:hidden; background:var(--bg);
    touch-action:none; user-select:none; -webkit-user-select:none; }
  .graph-wrap canvas{ display:block; width:100%; height:100%; }
  .graph-bar{ position:absolute; left:12px; top:12px; right:12px; display:flex; align-items:center; gap:8px;
    pointer-events:none; font-size:12.5px; color:var(--muted); }
  .graph-bar .legend{ display:flex; align-items:center; gap:12px; background:var(--blur-bg);
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); padding:6px 10px; border-radius:999px; border:1px solid var(--line); }
  .graph-bar .lg{ display:inline-flex; align-items:center; gap:5px; }
  .graph-bar .dot{ width:9px; height:9px; border-radius:50%; }
  .graph-right{ margin-left:auto; display:flex; align-items:center; gap:8px; pointer-events:none; }
  .graph-modes{ pointer-events:auto; display:inline-flex; background:var(--blur-bg); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); border:1px solid var(--line); border-radius:999px; padding:2px; }
  .graph-modes button{ border:none; background:none; color:var(--muted); font-size:12px; padding:4px 11px; border-radius:999px; cursor:pointer; }
  .graph-modes button.on{ background:var(--surface-2); color:var(--text); font-weight:600; }
  .graph-reset{ pointer-events:auto; border:1px solid var(--line); background:var(--blur-bg);
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); color:var(--text); border-radius:999px;
    padding:6px 12px; font-size:12.5px; cursor:pointer; }
  .graph-reset:hover{ background:var(--surface-2); }
  .graph-empty{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:8px; text-align:center; color:var(--muted); padding:24px; }
  .graph-empty .ge-title{ color:var(--text); font-size:15px; font-weight:600; }
  .graph-empty .ge-sub{ font-size:13px; line-height:1.6; max-width:280px; }

  /* ---------- 즐겨찾기 핀 + 글자수 ---------- */
  .entry-pin{
    width:32px; height:32px; border-radius:50%; border:none;
    background:var(--surface-2); color:var(--muted); font-size:16px; line-height:1;
    display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;
    opacity:0; transition:opacity .18s ease, color .15s ease, background-color .15s ease;
  }
  .entry:hover .entry-pin{ opacity:1; }
  .entry-pin.pinned{ opacity:1; color:var(--accent); }
  .entry-pin:hover{ background:var(--line); color:var(--accent); }
  @media (hover:none){ .entry-pin{ opacity:1; } }
  .entry.is-pinned{ box-shadow:inset 3px 0 0 var(--accent); }
  .entry-chars{ margin-left:9px; font-size:11.5px; color:var(--muted); opacity:.85; }
  .char-counter{ margin-top:6px; text-align:right; font-size:12px; color:var(--muted); }

  /* ---------- Header ---------- */
  header.top{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:46px;
    margin-bottom:10px;
  }
  h1.title{ margin:0; line-height:0; }
  .home-logo{
    display:inline-flex; padding:0; border:0; background:none;
    cursor:pointer; line-height:0; border-radius:12px;
    -webkit-tap-highlight-color:transparent;
    transition:transform .12s ease, opacity .12s ease;
  }
  .home-logo:hover{ opacity:.82; }
  .home-logo:active{ transform:scale(0.97); }
  .brand-logo{
    display:block;
    width:180px;
    max-width:calc(100vw - 220px);   /* 우측 버튼과 항상 간격 확보 → 겹침 방지(뷰포트 기준) */
    height:auto;
    border-radius:12px;
  }
  .header-actions{
    position:absolute;
    right:0; top:50%;
    transform:translateY(-50%);
    display:flex; align-items:center; gap:8px;
    /* transform이 독립 쌓임 맥락을 만들어 내부 .menu(z-index:120)가 갇힘 →
       양수 z-index로 헤더 액션 전체를 본문/컨트롤(메뉴 열림 시 opacity<1 레이어) 위로 올림 */
    z-index:130;
  }
  .menu-wrap{ position:relative; }
  .icon-btn{
    width:38px; height:38px;
    border-radius:50%;
    border:none;
    background:var(--surface-2);
    color:var(--text);
    display:inline-flex; align-items:center; justify-content:center;
    transition:background-color .18s ease, transform .1s ease;
  }
  .icon-btn:hover{ background:var(--line); }
  .icon-btn:active{ transform:scale(0.94); }
  .icon-btn svg{ width:18px; height:18px; stroke:currentColor; }

  .menu{
    position:absolute;
    top:calc(100% + 10px);
    right:0;
    min-width:220px;
    max-width:calc(100vw - 24px);
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:12px;
    padding:7px;
    z-index:120;
    box-shadow:var(--shadow-lg);
    opacity:0; transform:translateY(-6px) scale(0.98); transform-origin:top right; pointer-events:none;
    transition:opacity .18s ease, transform .18s ease;
  }
  .menu[data-open="true"]{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  /* 메뉴 열렸을 때 뒤 영역을 반투명하게 죽여 메뉴를 부각시키고
     위젯 이동 없이 자연스럽게 뒤로 물러나게 함.
     opacity<1 이면 독립 합성 레이어가 되어 iOS 네이티브 입력칸 비침(겹침 띠)도 함께 방지됨 */
  body.menu-open .controls,
  body.menu-open .months,
  body.menu-open .tagbar{ opacity:.4; pointer-events:none; }
  .menu button{
    display:block;
    width:100%;
    text-align:left;
    padding:10px 12px;
    border:none;
    background:transparent;
    border-radius:10px;
    font-size:14px;
    font-weight:450;
    color:var(--text);
    transition:background-color .12s ease;
  }
  .menu button:hover{ background:var(--surface-2); color:var(--text); }
  .menu .divider{ height:1px; background:var(--line); margin:5px 8px; }

  /* ---------- Sub: stats ---------- */
  .stats{
    color:var(--muted);
    font-size:13px;
    margin:0 0 28px 0;
    letter-spacing:0.01em;
  }
  .stats b{ color:var(--text); font-weight:600; }
  .stats .sep{ margin:0 8px; opacity:.5; }

  /* ---------- Controls (search + new) ---------- */
  .controls{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:18px;
    transition:opacity .18s ease;
  }
  .search{
    flex:1;
    display:flex; align-items:center;
    background:var(--surface-2);
    border:1px solid transparent;
    border-radius:var(--radius);
    padding:10px 14px 10px 40px;
    position:relative;
    transition:border-color .18s ease, box-shadow .18s ease, background-color .18s ease;
  }
  .search:focus-within{ background:var(--surface); border-color:var(--accent); box-shadow:var(--ring); }
  .search svg{
    position:absolute;
    left:14px; top:50%;
    transform:translateY(-50%);
    width:16px; height:16px;
    color:var(--muted);
  }
  .search input{
    -webkit-appearance:none; appearance:none;
    border:none; outline:none;
    background:transparent;
    width:100%;
    font-size:15px;
  }
  .btn{
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--text);
    border-radius:var(--radius);
    padding:10px 20px;
    font-size:15px;
    font-weight:500;
    letter-spacing:-0.01em;
    box-shadow:none;
    transition:background-color .18s ease, transform .1s ease, box-shadow .18s ease;
    white-space:nowrap;
  }
  .btn:hover{ background:var(--surface-2); }
  .btn:active{ transform:scale(0.97); }
  .btn.ghost{
    background:var(--surface-2);
    color:var(--text);
  }
  .btn.ghost:hover{ background:var(--line); }
  .btn.danger{
    background:transparent;
    color:var(--danger);
  }
  .btn.danger:hover{ background:var(--danger); color:#fff; }

  @media (max-width:600px){
    .controls{ flex-wrap:wrap; }
    .search{ flex:1 1 100%; }
    .btn.new{ flex:1; }
  }

  /* ---------- Month filter ---------- */
  .months{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding-bottom:8px;
    margin:0 -4px 30px;
    padding-left:4px; padding-right:4px;
    scrollbar-width:none;
    transition:opacity .18s ease;
  }
  .months::-webkit-scrollbar{ display:none; }
  .pill{
    flex:none;
    border:none;
    background:var(--surface-2);
    border-radius:var(--radius);
    padding:7px 15px;
    font-size:13px;
    font-weight:500;
    color:var(--muted);
    transition:color .15s ease, background-color .15s ease, transform .1s ease;
  }
  .pill:hover{ background:var(--line); color:var(--text); }
  .pill:active{ transform:scale(0.96); }
  .pill[aria-pressed="true"]{
    background:var(--surface);
    color:var(--text);
    box-shadow:inset 0 0 0 1px var(--line-strong);
  }
  .pill[aria-pressed="true"]:hover{ background:var(--surface); }

  /* ---------- Tag filter bar (#태그) ---------- */
  .tagbar{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding-bottom:8px;
    margin:0 -4px 26px;
    padding-left:4px; padding-right:4px;
    scrollbar-width:none;
    transition:opacity .18s ease;
  }
  .tagbar::-webkit-scrollbar{ display:none; }
  .tagbar .pill{ color:var(--accent); }
  .tagbar .pill[aria-pressed="true"]{ color:var(--accent); }
  .tagbar .tag-clear{ color:var(--danger); }

  /* 카드 하단 태그 칩 */
  .entry-tags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; }
  .entry-tags .tag{
    border:none;
    background:var(--surface-2);
    color:var(--accent);
    border-radius:999px;
    padding:4px 11px;
    font-size:12.5px;
    font-weight:500;
    transition:background-color .15s ease, transform .1s ease;
  }
  .entry-tags .tag:hover{ background:var(--line); }
  .entry-tags .tag:active{ transform:scale(0.95); }
  /* 본문 안의 #태그 강조 */
  .entry-text .hash{ color:var(--accent); font-weight:600; }

  /* 오프라인 동기화 대기 배지 */
  .sync-status{
    position:fixed;
    left:16px; bottom:16px;
    z-index:200;
    background:var(--surface);
    border:1px solid var(--line-strong);
    color:var(--text);
    border-radius:999px;
    padding:8px 14px;
    font-size:12.5px;
    font-weight:500;
    box-shadow:var(--shadow-lg);
    cursor:pointer;
    animation:fadeIn .3s ease both;
  }

  /* ---------- Markdown 본문 서식 ---------- */
  .entry-text .md-h{ font-weight:700; }
  .entry-text .md-h1{ font-size:1.18em; }
  .entry-text .md-h2{ font-size:1.07em; }
  .entry-text .md-h3{ font-size:1em; color:var(--muted); }
  .entry-text .md-q{ display:inline-block; border-left:3px solid var(--line-strong); padding-left:10px; color:var(--muted); }
  .entry-text strong{ font-weight:700; }
  .entry-text em{ font-style:italic; }
  .entry-text code{ background:var(--surface-2); padding:1px 6px; border-radius:5px; font-size:.9em; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  .entry-text .wikilink{ color:var(--accent); font-weight:600; cursor:pointer; text-decoration:none; border-bottom:1px dashed var(--accent); }
  .entry-text .wikilink:hover{ opacity:.78; }

  /* ---------- [[링크]] 백링크 배너 ---------- */
  .link-banner{
    display:flex; align-items:center; gap:8px;
    background:var(--surface-2); border:1px solid var(--line);
    border-radius:var(--radius); padding:10px 14px; margin-bottom:16px;
    font-size:14px; color:var(--text);
  }
  .link-banner .link-clear{
    margin-left:auto; border:none; background:transparent; color:var(--muted);
    font-size:15px; cursor:pointer; padding:2px 8px; border-radius:7px;
  }
  .link-banner .link-clear:hover{ background:var(--line); color:var(--text); }

  /* ---------- 자비스 (자동응답 비서) ---------- */
  .jarvis-fab{
    position:fixed; right:18px; bottom:18px; z-index:150;
    width:54px; height:54px; border-radius:50%;
    border:none; background:var(--accent); color:var(--accent-text);
    font-size:22px; box-shadow:var(--shadow-lg); cursor:pointer;
    display:none; align-items:center; justify-content:center;
    transition:transform .12s ease;
  }
  body.app-ready .jarvis-fab{ display:inline-flex; }
  body.modal-open .jarvis-fab{ display:none; }
  .jarvis-fab:hover{ transform:scale(1.06); }
  .jarvis-fab:active{ transform:scale(0.94); }

  /* 맨 위로 — 스크롤을 내리면 나타나는 버튼 (자비스 버튼 위) */
  .to-top{
    position:fixed; right:18px; bottom:80px; z-index:149;
    width:44px; height:44px; border-radius:50%;
    border:1px solid var(--line); background:var(--surface); color:var(--text);
    box-shadow:var(--shadow-lg); cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center;
    opacity:0; visibility:hidden; transform:translateY(8px);
    transition:opacity .18s ease, transform .18s ease, visibility .18s;
  }
  .to-top svg{ width:20px; height:20px; }
  body.app-ready .to-top.show{ opacity:1; visibility:visible; transform:translateY(0); }
  body.modal-open .to-top{ opacity:0; visibility:hidden; }
  .to-top:hover{ background:var(--surface-2); }
  .to-top:active{ transform:scale(0.92); }

  .jarvis-scrim{ align-items:flex-end; justify-content:flex-end; padding:20px; }
  .jarvis-panel{
    width:min(420px,100%); height:min(620px,84vh);
    display:flex; flex-direction:column;
    background:var(--surface); border:1px solid var(--line);
    border-radius:18px; box-shadow:var(--shadow-lg); overflow:hidden;
    animation:fadeIn .22s ease both;
  }
  .jarvis-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; border-bottom:1px solid var(--line); font-weight:700;
  }
  .jarvis-x{ border:none; background:transparent; color:var(--muted); font-size:15px; cursor:pointer; padding:4px 9px; border-radius:8px; }
  .jarvis-x:hover{ background:var(--surface-2); color:var(--text); }
  .jarvis-log{ flex:1; overflow-y:auto; padding:14px 14px 6px; display:flex; flex-direction:column; gap:10px; }
  .jv-msg{ max-width:88%; padding:10px 13px; border-radius:14px; font-size:14px; line-height:1.6; word-break:break-word; }
  .jv-me{ align-self:flex-end; background:var(--accent); color:var(--accent-text); border-bottom-right-radius:4px; }
  .jv-bot{ align-self:flex-start; background:var(--surface-2); color:var(--text); border-bottom-left-radius:4px; }
  .jv-ex{ color:var(--muted); font-size:12.5px; }
  .jv-think{ display:inline-flex; align-items:center; gap:8px; color:var(--muted); }
  .jv-rows{ display:flex; flex-direction:column; gap:6px; margin-top:9px; }
  .jv-row{
    text-align:left; border:1px solid var(--line); background:var(--surface);
    border-radius:10px; padding:8px 11px; font-size:13px; cursor:pointer;
    display:flex; flex-direction:column; gap:2px; color:var(--text);
  }
  .jv-row:hover{ border-color:var(--accent); }
  .jv-row b{ color:var(--accent); font-size:12px; }
  .jv-row span{ color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .jv-more{ color:var(--muted); font-size:12px; padding:2px 4px; }
  .jarvis-input{ display:flex; gap:8px; padding:12px 14px; border-top:1px solid var(--line); }
  .jarvis-input input{ flex:1; border:1px solid var(--line); background:var(--surface-2); border-radius:999px; padding:10px 16px; font-size:14px; outline:none; color:var(--text); }
  .jarvis-input input:focus{ border-color:var(--accent); }
  .jarvis-send{ border:none; background:var(--accent); color:var(--accent-text); width:42px; height:42px; border-radius:50%; font-size:15px; cursor:pointer; flex-shrink:0; }
  .jarvis-send:active{ transform:scale(0.94); }
  @media (max-width:600px){
    .jarvis-scrim{ justify-content:center; padding:0; }
    .jarvis-panel{ width:100%; height:86vh; border-radius:18px 18px 0 0; align-self:flex-end; }
    .jarvis-fab{ right:14px; bottom:14px; }
    .to-top{ right:14px; bottom:74px; }
  }

  /* ---------- 프로젝트 + 할일 ---------- */
  .proj-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
  .proj-head h2{ margin:0; }
  .proj-body{ max-height:62vh; overflow-y:auto; display:flex; flex-direction:column; gap:14px; }
  .proj-empty{ text-align:center; color:var(--muted); padding:36px 10px; line-height:1.7; }
  .proj-empty span{ font-size:13px; }
  .proj-card{
    border:1px solid var(--line); border-radius:14px; padding:16px 18px; background:var(--surface);
  }
  .proj-card.editing{ border-color:var(--accent); }
  .proj-card-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .proj-name{ font-size:16px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
  .proj-goal{ font-size:13.5px; color:var(--muted); margin-top:5px; }
  .proj-status{
    border:none; border-radius:999px; padding:3px 10px; font-size:11.5px; font-weight:600; cursor:pointer; color:#fff;
  }
  .proj-status.st-active{ background:var(--accent); color:var(--accent-text); }
  .proj-status.st-paused{ background:var(--line-strong); color:var(--text); }
  .proj-status.st-done{ background:var(--ok,#3a9d6e); color:#fff; }
  .proj-card-actions{ display:flex; gap:4px; flex-shrink:0; }
  .proj-mini{ border:none; background:transparent; font-size:14px; cursor:pointer; padding:4px 6px; border-radius:8px; line-height:1; }
  .proj-mini:hover{ background:var(--surface-2); }
  .proj-progress{ display:flex; align-items:center; gap:10px; margin:12px 0 6px; }
  .proj-bar{ flex:1; height:7px; background:var(--surface-2); border-radius:999px; overflow:hidden; }
  .proj-bar span{ display:block; height:100%; background:var(--accent); border-radius:999px; transition:width .25s ease; }
  .proj-prog-num{ font-size:12px; color:var(--muted); white-space:nowrap; }
  .todo-list{ display:flex; flex-direction:column; gap:2px; margin-top:6px; }
  .todo-row{ display:flex; align-items:center; gap:9px; padding:6px 2px; }
  .todo-check{ border:none; background:transparent; font-size:18px; cursor:pointer; line-height:1; color:var(--accent); padding:0; flex-shrink:0; }
  .todo-text{ flex:1; font-size:14.5px; color:var(--text); word-break:break-word; }
  .todo-row.is-done .todo-text{ text-decoration:line-through; color:var(--muted); }
  .todo-del{ border:none; background:transparent; color:var(--muted); cursor:pointer; font-size:13px; padding:2px 6px; border-radius:6px; opacity:0; flex-shrink:0; }
  .todo-row:hover .todo-del{ opacity:1; }
  @media (hover:none){ .todo-del{ opacity:.6; } }
  .todo-del:hover{ background:var(--danger); color:#fff; }
  .todo-add{ margin-top:4px; }
  .todo-add input{
    width:100%; border:1px dashed var(--line); background:transparent; border-radius:9px;
    padding:8px 12px; font-size:14px; outline:none; color:var(--text);
  }
  .todo-add input:focus{ border-style:solid; border-color:var(--accent); }
  .proj-edit{ display:flex; flex-direction:column; gap:10px; }
  .proj-name-input, .proj-goal-input{
    width:100%; border:1px solid var(--line); background:var(--surface-2); border-radius:10px;
    padding:10px 13px; font-size:15px; outline:none; color:var(--text); box-sizing:border-box;
  }
  .proj-name-input:focus, .proj-goal-input:focus{ border-color:var(--accent); background:var(--surface); }
  .proj-goal-input{ min-height:60px; resize:vertical; font-size:14px; }
  .proj-edit-actions{ display:flex; gap:8px; justify-content:flex-end; }

  /* ---------- Entries : 읽기 우선 타임라인 피드 ---------- */
  .entries{ display:flex; flex-direction:column; gap:18px; }

  .month-divider{
    font-size:13px;
    font-weight:600;
    color:var(--muted);
    margin:14px 2px 0;
  }
  .month-divider:first-child{ margin-top:0; }

  .entry{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:24px 26px;
    box-shadow:none;
    animation:fadeIn .35s cubic-bezier(.16,1,.3,1) both;
    transition:border-color .4s ease-out;
  }
  .entry:hover{ border-color:var(--accent); }
  .entry:hover .entry-edit{ opacity:1; }

  .entry-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:12px;
  }
  .entry-date{ font-size:13.5px; color:var(--muted); }
  .entry-date .accent{ color:var(--accent); font-weight:600; margin-right:5px; }
  .entry-edit{
    width:32px; height:32px;
    border-radius:50%;
    border:none;
    background:var(--surface-2);
    color:var(--muted);
    display:inline-flex; align-items:center; justify-content:center;
    opacity:0;
    transition:opacity .18s ease, background-color .15s ease, color .15s ease, transform .1s ease;
    flex-shrink:0;
  }
  .entry-edit:hover{ background:var(--accent); color:var(--accent-text); }
  .entry-edit:active{ transform:scale(0.92); }
  .entry-edit svg{ width:15px; height:15px; }
  @media (hover:none){ .entry-edit{ opacity:1; } }

  .entry-actions{ display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .entry-trash{
    width:32px; height:32px;
    border-radius:50%;
    border:none;
    background:var(--surface-2);
    color:var(--muted);
    display:inline-flex; align-items:center; justify-content:center;
    opacity:0;
    transition:opacity .18s ease, background-color .15s ease, color .15s ease, transform .1s ease;
    flex-shrink:0;
  }
  .entry:hover .entry-trash{ opacity:1; }
  .entry-trash:hover{ background:var(--danger); color:#fff; }
  .entry-trash:active{ transform:scale(0.92); }
  .entry-trash svg{ width:15px; height:15px; }
  @media (hover:none){ .entry-trash{ opacity:1; } }

  /* 본문: 넉넉한 글줄·줄간격으로 그 자리에서 읽기 */
  .entry-text{
    white-space:pre-wrap;
    word-break:break-word;
    font-size:16.5px;
    line-height:1.8;
    color:var(--text);
  }
  .entry-text.is-clamped{
    display:-webkit-box;
    -webkit-line-clamp:12;
    -webkit-box-orient:vertical;
    overflow:hidden;
    position:relative;
  }
  .entry-text.is-clamped::after{
    content:"";
    position:absolute; left:0; right:0; bottom:0;
    height:48px;
    background:linear-gradient(rgba(0,0,0,0), var(--surface));
    pointer-events:none;
  }
  .entry-text mark{
    background:rgba(255,214,10,0.45);
    color:inherit;
    padding:0 3px;
    border-radius:4px;
  }
  .more-btn{
    margin-top:8px;
    border:none;
    background:transparent;
    color:var(--accent);
    font-size:14px;
    font-weight:600;
    padding:4px 0;
  }
  .more-btn:hover{ text-decoration:underline; }

  /* 사진: 안 잘리게, 컬럼 폭에 맞춰 편하게 */
  .entry-photos{ margin-top:14px; display:flex; flex-direction:column; gap:10px; }
  .entry-photos.multi{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
    gap:8px;
  }
  .entry-photos img{
    width:100%;
    border-radius:var(--radius-sm);
    background:var(--surface-2);
    cursor:zoom-in;
    display:block;
  }
  .entry-photos.single img{ max-height:560px; object-fit:contain; }
  .entry-photos.multi img{ aspect-ratio:4/3; object-fit:cover; }

  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ---------- Empty ---------- */
  .empty{
    text-align:center;
    padding:90px 20px;
    color:var(--muted);
  }
  .empty .e-title{
    font-family:var(--display);
    font-weight:600;
    font-size:24px;
    letter-spacing:-0.02em;
    color:var(--text);
    margin-bottom:8px;
  }
  .empty .e-sub{ font-size:15px; }

  /* ---------- Modal ---------- */
  .scrim{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.4);
    -webkit-backdrop-filter:blur(8px);
    backdrop-filter:blur(8px);
    z-index:100;
    display:none;
    align-items:flex-start;
    justify-content:center;
    padding:60px 16px;
    overflow-y:auto;
  }
  .scrim[data-open="true"]{ display:flex; }
  .modal{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    width:100%;
    max-width:580px;
    padding:30px 28px 24px;
    box-shadow:var(--shadow-lg);
    animation:modalIn .26s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes modalIn{
    from{ opacity:0; transform:translateY(16px) scale(0.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  .modal h2{
    font-family:var(--display);
    font-weight:600;
    font-size:24px;
    letter-spacing:-0.02em;
    margin:0 0 20px;
  }
  .field{ margin-bottom:16px; }
  .field label{
    display:block;
    font-size:13px;
    font-weight:500;
    color:var(--muted);
    letter-spacing:-0.01em;
    margin-bottom:7px;
  }
  .field input.date-text, .field textarea{
    width:100%;
    background:var(--surface-2);
    border:1px solid transparent;
    border-radius:var(--radius-sm);
    padding:11px 13px;
    font-size:15px;
    outline:none;
    transition:border-color .18s ease, box-shadow .18s ease, background-color .18s ease;
  }
  .field input.date-text:focus, .field textarea:focus{ background:var(--surface); border-color:var(--accent); box-shadow:var(--ring); }
  .field textarea{ resize:vertical; min-height:140px; line-height:1.65; }

  .date-row{ display:flex; gap:8px; align-items:stretch; }
  .date-row .date-text{ flex:1; min-width:0; }
  .date-cal{
    position:relative;
    flex:none;
    width:48px;
    border:1px solid transparent;
    border-radius:var(--radius-sm);
    background:var(--surface-2);
    color:var(--muted);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
  }
  .date-cal:hover{ background:var(--line); color:var(--text); }
  .date-cal svg{
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:20px; height:20px; pointer-events:none;
  }
  .date-cal input[type="date"]{
    position:absolute; inset:0;
    width:100%; height:100%;
    opacity:0; cursor:pointer;
    border:0; padding:0; margin:0;
  }

  .date-hint{
    margin-top:7px;
    font-size:12.5px;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:6px;
    animation:hintIn .18s ease;
  }
  .date-hint b{ color:var(--accent); font-weight:600; }
  .date-hint .dot{
    width:7px; height:7px; border-radius:50%;
    background:var(--ok); flex:none;
  }
  .date-hint.warn{ color:var(--danger); }
  .date-hint.warn b{ color:var(--danger); }
  .date-hint.warn .dot{ background:var(--danger); }
  @keyframes hintIn{ from{ opacity:0; transform:translateY(-2px); } to{ opacity:1; transform:none; } }

  /* ---------- 분류(카테고리) ---------- */
  .cat-manage{ margin-left:8px; font-size:12px; font-weight:600; color:var(--accent); background:none; border:none; cursor:pointer; padding:0; }
  .cat-row{ display:flex; flex-wrap:wrap; gap:7px; }
  .cat-chip{ display:inline-flex; align-items:center; gap:6px; padding:7px 12px; border-radius:999px;
    border:1px solid var(--line); background:var(--surface-2); color:var(--text); font-size:13px; cursor:pointer;
    transition:border-color .12s ease, background-color .12s ease; }
  .cat-chip:hover{ border-color:var(--line-strong); }
  .cat-chip.on{ border-color:var(--c, var(--accent)); box-shadow:inset 0 0 0 1px var(--c, var(--accent)); background:var(--surface); font-weight:600; }
  .cat-dot{ width:9px; height:9px; border-radius:50%; display:inline-block; flex:none; }
  .cat-x{ margin-left:1px; color:var(--muted); font-size:11px; line-height:1; padding:1px 3px; border-radius:6px; }
  .cat-x:hover{ color:var(--danger); background:var(--surface-2); }
  .cat-add{ color:var(--muted); border-style:dashed; }
  .cat-addbox{ display:inline-flex; }
  .cat-input{ padding:7px 12px; border-radius:999px; border:1px solid var(--accent); background:var(--surface);
    color:var(--text); font-size:13px; outline:none; width:130px; }
  .cat-badge{ display:inline-flex; align-items:center; margin-left:8px; font-size:11.5px; font-weight:600; color:var(--c, var(--muted));
    border:1px solid var(--c, var(--line)); background:transparent; border-radius:999px; padding:1px 9px; line-height:1.7;
    cursor:pointer; vertical-align:middle; }
  .cat-badge:hover{ background:var(--surface-2); }
  .sb-cat-dot{ width:9px; height:9px; border-radius:50%; display:inline-block; flex:none; }

  .dropzone{
    border:1.5px dashed var(--line-strong);
    border-radius:var(--radius-sm);
    padding:20px;
    text-align:center;
    color:var(--muted);
    font-size:14px;
    cursor:pointer;
    transition:background-color .15s ease, border-color .15s ease, color .15s ease;
  }
  .dropzone:hover, .dropzone.dragover{
    background:var(--surface-2);
    border-color:var(--line-strong);
    color:var(--text);
  }
  .dropzone b{ color:var(--text); font-weight:600; }

  .thumbs{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(90px, 1fr));
    gap:6px;
    margin-top:10px;
  }
  .thumb{
    position:relative;
    aspect-ratio:1/1;
    border-radius:8px;
    overflow:hidden;
    background:var(--surface-2);
    border:1px solid var(--line);
  }
  .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .thumb .x{
    position:absolute;
    top:4px; right:4px;
    width:22px; height:22px;
    border-radius:50%;
    border:none;
    background:rgba(0,0,0,0.65);
    color:#fff;
    font-size:12px;
    line-height:1;
    display:inline-flex; align-items:center; justify-content:center;
  }
  .thumb .x:hover{ background:rgba(0,0,0,0.85); }

  .modal-actions{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-top:18px;
  }
  .modal-actions .right{ display:flex; gap:8px; }

  /* ---------- Lightbox ---------- */
  .lightbox{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.92);
    z-index:200;
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
  }

  .lb-nav{

    border:1px solid rgba(255,255,255,0.18);

    z-index:1;

  .lb-nav.prev{ left:16px; }
  .lb-nav.next{ right:16px; }
  .lb-nav[hidden]{ display:none; }
  .lb-count{
    position:absolute;
    left:50%; bottom:20px;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.55);
    -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px);
    color:#fff; font-size:13px; font-weight:500;
    padding:6px 14px; border-radius:980px;
  }
  .lb-count[hidden]{ display:none; }
  @media (max-width:600px){
    .lb-nav{ width:42px; height:42px; }

    .lb-nav.next{ right:8px; }
  }

  /* ---------- Summary ---------- */
  .summary-body{
    font-size:15.5px;
    line-height:1.75;
    color:var(--text);
    white-space:pre-wrap;
    word-break:break-word;
    max-height:55vh;
    overflow-y:auto;
    margin-bottom:4px;
  }
  .summary-note{ color:var(--muted); font-size:13.5px; line-height:1.6; margin-bottom:12px; }
  .summary-note b{ color:var(--text); font-weight:600; }
  .summary-pre{
    font-size:13px;
    line-height:1.6;
    color:var(--muted);
    background:var(--surface-2);
    border-radius:var(--radius-sm);
    padding:12px 14px;
    max-height:30vh;
    overflow:auto;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .summary-loading{ color:var(--muted); display:flex; align-items:center; gap:10px; }
  .summary-loading .spinner{
    width:16px; height:16px; flex:none;
    border:2px solid var(--line);
    border-top-color:var(--accent);
    border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ---------- Confirm ---------- */
  .confirm-msg{
    color:var(--text);
    font-size:15px;
    margin:0 0 18px;
    line-height:1.65;
  }
  .confirm-msg b{ font-weight:600; }

  /* ---------- Toast ---------- */
  .toast{
    position:fixed;
    left:50%;
    bottom:32px;
    transform:translateX(-50%) translateY(20px);
    background:rgba(40,40,42,0.82);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    backdrop-filter:blur(20px) saturate(180%);
    color:#fff;
    padding:12px 22px;
    border-radius:980px;
    font-size:14px;
    font-weight:500;
    box-shadow:var(--shadow-lg);
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s cubic-bezier(.16,1,.3,1);
    z-index:300;
    max-width:90vw;
  }
  .toast[data-show="true"]{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* ---------- Misc ---------- */
  .sr-only{
    position:absolute; width:1px; height:1px;
    padding:0; margin:-1px; overflow:hidden;
    clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }
</style>
<style>
  /* ── 로그인 오버레이 ───────────────────────────────────────── */

  /* 라이트 로고: 크림색 배경을 페이지/카드 배경에 자연스럽게 녹임(사각형 제거) */

  @media (prefers-color-scheme: dark){

  .auth-sub{ margin:0 0 6px; color:var(--muted); font-size:13px; line-height:1.5; }

  /* 모드별 표시 필드: 기본 숨김 후 모드 클래스로 노출 */

  .auth-link{

  /* 휴지통 목록 */

  /* 확인창은 휴지통 모달 위에 표시 */
  #confirmScrim{ z-index:150; }
  /* ── 화면 잠금 (PIN·생체인증) ───────────────────────────────── */
  .lock-scrim{
    position:fixed; inset:0; z-index:1100;

    padding:24px; background:var(--bg);
  }
  .lock-scrim[data-open="true"]{ display:flex; }

  .lock-dots .dot{ width:13px; height:13px; border-radius:50%; border:2px solid var(--line-strong); background:transparent; transition:background-color .12s, border-color .12s; }
  .lock-dots .dot.on{ background:var(--accent); border-color:var(--accent); }
  .lock-pad{ display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; margin:4px 0; }

  .auth-hint:empty{ display:none; }
  .auth-hint.ok{ color:var(--ok, #5c8a5a); }
  .auth-hint.err{ color:#d9534f; }
</style>
</head>

  <div class="auth-scrim" id="authScrim" data-open="false" aria-hidden="true">

<script>
"use strict";

/* ============================================================
   Storage abstraction
   - window.storage (Claude.ai artifact) 우선, 없으면 localStorage 폴백
   - get / set / delete / list 4종 메서드 공통 인터페이스
   ============================================================ */
let storage = (function(){
  const hasArtifact = typeof window !== "undefined"
    && typeof window.storage === "object"
    && window.storage !== null
    && typeof window.storage.get === "function";

  if (hasArtifact) {
    return {
      kind: "artifact",
      async get(key){ return await window.storage.get(key); },
      async set(key, val){ return await window.storage.set(key, val); },
      async delete(key){ return await window.storage.delete(key); },
      async list(prefix){
        const all = await window.storage.list();
        const keys = Array.isArray(all) ? all : (all && all.keys) || [];
        return keys.filter(k => !prefix || String(k).startsWith(prefix));
      },
    };
  }

  return {
    kind: "localStorage",
    async get(key){ return localStorage.getItem(key); },
    async set(key, val){ localStorage.setItem(key, val); },
    async delete(key){ localStorage.removeItem(key); },
    async list(prefix){
      const out = [];
      for (let i = 0; i < localStorage.length; i++){
        const k = localStorage.key(i);
        if (!prefix || (k && k.startsWith(prefix))) out.push(k);
      }
      return out;
    },
  };
})();

const KEY_PREFIX = "e:";
const MAX_IMG_EDGE = 1600;
const JPEG_QUALITY = 0.82;

/* ============================================================
   State
   ============================================================ */
const state = {
  entries: [],         // loaded entries (휴지통 제외)
  trash: [],           // 삭제되어 휴지통에 있는 기록
  projects: [],        // 프로젝트(목표·할일 체크리스트 포함)
  view: "timeline",    // "timeline" | "photos" | "calendar"
  search: "",
  monthFilter: null,   // "YYYY-MM" or null
  tagFilter: null,     // "#태그" 필터 (태그명, # 제외) or null
  linkFilter: null,    // [[위키링크]] 필터 (링크명) or null
  dayFilter: null,     // "YYYY-MM-DD" (캘린더에서 특정 날짜 선택) or null
  favFilter: false,    // ⭐ 즐겨찾기만 보기
  catFilter: null,     // 분류(카테고리) 필터명 or null
  calMonth: null,      // 캘린더가 보여주는 달 "YYYY-MM" (null=이번 달)
  editing: null,       // entry being edited, or null when creating
  draftImages: [],     // dataURLs in editor
  draftCategory: "",   // 에디터에서 선택한 분류
  catManage: false,    // 에디터 분류 '관리(삭제)' 모드
};

/* ============================================================
   Cloud sync (Supabase)
   - 로그인하면 localStorage 대신 Supabase 를 저장소로 사용 → 기기 간 동기화
   - 이미지는 비공개 Storage 버킷에 업로드, 화면에는 서명 URL 로 표시
   ============================================================ */
const SUPA_URL = "https://qoarpcpcdwflvxenkmcy.supabase.co";
const SUPA_KEY = "sb_publishable_A8JGt7mSDMJsPXFW-dlPGQ_ZtrN3KSH";
const BUCKET   = "worklog-images";
const SIGN_TTL = 60 * 60 * 24; // 서명 URL 유효시간(초) = 1일

const sb = (typeof window !== "undefined" && window.supabase && SUPA_URL)
  ? window.supabase.createClient(SUPA_URL, SUPA_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, storageKey: "worklog-auth" },
    })
  : null;

let currentUser = null;
const signedUrlCache = new Map(); // storage path -> 서명 URL
function isCloud(){ return storage && storage.kind === "supabase"; }

function dataURLtoBlob(dataUrl){
  const comma = dataUrl.indexOf(",");
  const head = dataUrl.slice(0, comma);
  const b64 = dataUrl.slice(comma + 1);
  const mime = (head.match(/data:(.*?);/) || [, "image/jpeg"])[1];
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

function isStoragePath(s){
  return typeof s === "string" && !s.startsWith("data:") && !/^https?:\/\//.test(s);
}

// 화면에 그릴 실제 src: Storage path 면 캐시된 서명 URL, 아니면 원본(dataURL/URL)
function imgSrc(src){
  if (isStoragePath(src)) return signedUrlCache.get(src) || "";
  return src;
}

async function uploadImage(entryId, idx, dataUrl){
  const blob = dataURLtoBlob(dataUrl);
  const ext = (blob.type.split("/")[1] || "jpg").replace("jpeg", "jpg");
  const path = `${currentUser.id}/${entryId}/${idx}-${Date.now()}.${ext}`;
  const { error } = await sb.storage.from(BUCKET).upload(path, blob, { contentType: blob.type, upsert: true });
  if (error) throw error;
  return path;
}

// dataURL 들을 Storage 에 올리고 path 배열로 치환 (이미 path/URL 이면 그대로 둠)
async function prepareImagesForSave(entryId, images){
  if (!isCloud()) return images;
  const out = [];
  for (let i = 0; i < images.length; i++){
    const src = images[i];
    if (typeof src === "string" && src.startsWith("data:")) out.push(await uploadImage(entryId, i, src));
    else out.push(src);
  }
  return out;
}

// 엔트리들의 Storage path 에 대한 서명 URL 을 미리 만들어 캐시
async function ensureSignedUrls(entries){
  if (!isCloud()) return;
  const need = [];
  for (const e of entries){
    for (const src of (e.images || [])){
      if (isStoragePath(src) && !signedUrlCache.has(src)) need.push(src);
    }
  }
  if (!need.length) return;
  const uniq = [...new Set(need)];
  const { data, error } = await sb.storage.from(BUCKET).createSignedUrls(uniq, SIGN_TTL);
  if (error){ console.error(error); return; }
  for (const item of (data || [])){
    if (item && item.signedUrl && item.path) signedUrlCache.set(item.path, item.signedUrl);
  }
}

/* ── 오프라인 쓰기 동기화 큐 ──────────────────────────────────
   오프라인/네트워크 끊김 상태에서 저장·삭제가 실패하면 localStorage 큐에
   쌓아두고, 온라인 복귀(또는 로그인) 시 자동으로 서버에 반영한다.
   오프라인에서 추가한 사진은 dataURL 로 큐에 보관했다가 동기화 때 업로드. */
const SYNC_QUEUE_KEY = "worklog:sync-queue";
let flushing = false;

function entryToRow(e){
  return {
    id: e.id, user_id: currentUser.id, date: e.date,
    text: e.text || "", images: e.images || [],
    category: e.category || "",
    created_at: e.createdAt, updated_at: e.updatedAt,
    deleted_at: e.deletedAt != null ? e.deletedAt : null,
    pinned_at: e.pinnedAt != null ? e.pinnedAt : null,
  };
}
// 네트워크성 실패만 큐에 넣는다(RLS 등 진짜 오류는 그대로 throw 되게 구분)
function isOfflineError(err){
  if (typeof navigator !== "undefined" && navigator.onLine === false) return true;
  const m = ((err && (err.message || err.toString())) || "").toLowerCase();
  return (err instanceof TypeError) || m.includes("failed to fetch") ||
         m.includes("network") || m.includes("fetch") || m.includes("timeout");
}
function loadSyncQueue(){
  try { const a = JSON.parse(localStorage.getItem(SYNC_QUEUE_KEY)); return Array.isArray(a) ? a : []; }
  catch(_){ return []; }
}
function saveSyncQueue(q){
  try { localStorage.setItem(SYNC_QUEUE_KEY, JSON.stringify(q)); } catch(_){}
}
function enqueueOp(op){
  const q = loadSyncQueue();
  // 같은 기록의 이전 set 은 최신 것으로 합쳐 큐가 무한정 커지지 않게
  if (op.type === "set"){
    const i = q.findIndex(x => x.type === "set" && x.entry && x.entry.id === op.entry.id);
    if (i >= 0) q.splice(i, 1);
  }
  q.push(op);
  saveSyncQueue(q);
  updateSyncIndicator();
}
function pendingSyncCount(){ return loadSyncQueue().length; }

function updateSyncIndicator(){
  const n = pendingSyncCount();
  let el = document.getElementById("syncStatus");
  if (n === 0){ if (el) el.remove(); return; }
  if (!el){
    el = document.createElement("div");
    el.id = "syncStatus";
    el.className = "sync-status";
    el.addEventListener("click", () => flushSyncQueue());
    document.body.appendChild(el);
  }
  el.textContent = `⏳ 동기화 대기 ${n}건`;
}

// 큐 비우기 — 온라인일 때 순서대로 서버 반영
async function flushSyncQueue(){
  if (flushing) return;
  if (!isCloud() || (typeof navigator !== "undefined" && navigator.onLine === false)) return;
  let q = loadSyncQueue();
  if (!q.length) return;
  flushing = true;
  const remain = [];
  let didSync = false;
  for (const op of q){
    try {
      if (op.type === "set"){
        const e = op.entry;
        let imgs = Array.isArray(e.images) ? e.images : [];
        if (imgs.some(s => typeof s === "string" && s.startsWith("data:"))){
          imgs = await prepareImagesForSave(e.id, imgs);   // 보관해둔 dataURL 업로드
        }
        const { error } = await sb.from("entries").upsert(entryToRow({ ...e, images: imgs }));
        if (error) throw error;
      } else if (op.type === "delete"){
        if (op.paths && op.paths.length){ try { await sb.storage.from(BUCKET).remove(op.paths); } catch(_){} }
        const { error } = await sb.from("entries").delete().eq("id", op.id);
        if (error) throw error;
      } else if (op.type === "proj-set"){
        const { error } = await sb.from("projects").upsert(projectToRow(op.project));
        if (error) throw error;
      } else if (op.type === "proj-delete"){
        const { error } = await sb.from("projects").delete().eq("id", op.id);
        if (error) throw error;
      }
      didSync = true;
    } catch(err){
      if (isOfflineError(err)) remain.push(op);   // 아직 오프라인 → 다음 기회에 재시도
      else console.error("동기화 실패(영구, 건너뜀)", op, err); // 복구불가 → 버림
    }
  }
  saveSyncQueue(remain);
  updateSyncIndicator();
  flushing = false;
  if (didSync && remain.length === 0){
    try { await loadAll(); render(); } catch(_){}
    showToast("오프라인 기록을 동기화했어요");
  }
}

/* ── 프로젝트 + 할일(체크리스트) 데이터 계층 ──────────────────
   클라우드(로그인) 시 projects 테이블 동기화, 아니면 localStorage.
   오프라인이면 기존 sync 큐(proj-set/proj-delete)로 보관 후 자동 동기화. */
const LOCAL_PROJECTS_KEY = "worklog:projects";
const PROJECTS_CACHE_KEY = "worklog:projects-cache";

function projectToRow(p){
  return {
    id: p.id, user_id: currentUser.id,
    name: p.name || "", goal: p.goal || "", status: p.status || "active",
    todos: Array.isArray(p.todos) ? p.todos : [],
    created_at: p.createdAt || Date.now(),
    updated_at: p.updatedAt || Date.now(),
    archived_at: p.archivedAt != null ? p.archivedAt : null,
  };
}
function rowToProject(r){
  return {
    id: r.id, name: r.name || "", goal: r.goal || "", status: r.status || "active",
    todos: Array.isArray(r.todos) ? r.todos : [],
    createdAt: Number(r.created_at) || 0,
    updatedAt: Number(r.updated_at) || 0,
    archivedAt: r.archived_at != null ? Number(r.archived_at) : null,
  };
}
function readLocalProjects(){
  try { const a = JSON.parse(localStorage.getItem(LOCAL_PROJECTS_KEY)); return Array.isArray(a) ? a : null; }
  catch(_){ return null; }
}
function persistLocalProjects(){
  try { localStorage.setItem(LOCAL_PROJECTS_KEY, JSON.stringify(state.projects)); } catch(_){}
}
function sortProjects(a, b){
  const order = { active: 0, paused: 1, done: 2 };
  const oa = order[a.status] ?? 0, ob = order[b.status] ?? 0;
  if (oa !== ob) return oa - ob;
  return (b.updatedAt || 0) - (a.updatedAt || 0);
}

async function loadProjects(){
  if (isCloud()){
    try {
      const { data, error } = await sb.from("projects").select("*");
      if (error) throw error;
      state.projects = (data || []).map(rowToProject).sort(sortProjects);
      try { localStorage.setItem(PROJECTS_CACHE_KEY, JSON.stringify(state.projects)); } catch(_){}
    } catch(err){
      // 오프라인 → 마지막 캐시
      try { const c = JSON.parse(localStorage.getItem(PROJECTS_CACHE_KEY)); if (Array.isArray(c)) state.projects = c; } catch(_){}
    }
  } else {
    state.projects = (readLocalProjects() || []).sort(sortProjects);
  }
}
async function saveProject(p){
  p.updatedAt = Date.now();
  const i = state.projects.findIndex(x => x.id === p.id);
  if (i >= 0) state.projects[i] = p; else state.projects.push(p);
  state.projects.sort(sortProjects);
  if (isCloud()){
    try {
      const { error } = await sb.from("projects").upsert(projectToRow(p));
      if (error) throw error;
      try { localStorage.setItem(PROJECTS_CACHE_KEY, JSON.stringify(state.projects)); } catch(_){}
    } catch(err){
      if (isOfflineError(err)){ enqueueOp({ type: "proj-set", project: p }); }
      else throw err;
    }
  } else {
    persistLocalProjects();
  }
}
async function removeProject(id){
  state.projects = state.projects.filter(p => p.id !== id);
  if (isCloud()){
    try {
      const { error } = await sb.from("projects").delete().eq("id", id);
      if (error) throw error;
      try { localStorage.setItem(PROJECTS_CACHE_KEY, JSON.stringify(state.projects)); } catch(_){}
    } catch(err){
      if (isOfflineError(err)){ enqueueOp({ type: "proj-delete", id }); }
      else throw err;
    }
  } else {
    persistLocalProjects();
  }
}
// 진행률(완료 할일 비율 %)
function projectProgress(p){
  const todos = (p && Array.isArray(p.todos)) ? p.todos : [];
  if (!todos.length) return 0;
  return Math.round(todos.filter(t => t.done).length / todos.length * 100);
}

// localStorage(get/set/delete/list) 와 동일 인터페이스의 Supabase 백엔드
function makeSupabaseStorage(){
  const cache = new Map(); // id -> entry obj
  let loaded = false;
  async function ensureLoaded(){
    if (loaded) return;
    const { data, error } = await sb.from("entries").select("*");
    if (error) throw error;
    cache.clear();
    for (const row of (data || [])){
      cache.set(row.id, {
        id: row.id,
        date: row.date,
        text: row.text || "",
        images: Array.isArray(row.images) ? row.images : [],
        category: row.category || "",
        createdAt: Number(row.created_at) || 0,
        updatedAt: Number(row.updated_at) || 0,
        deletedAt: row.deleted_at != null ? Number(row.deleted_at) : null,
        pinnedAt: row.pinned_at != null ? Number(row.pinned_at) : null,
      });
    }
    loaded = true;
  }
  return {
    kind: "supabase",
    async get(key){
      await ensureLoaded();
      const e = cache.get(key.slice(KEY_PREFIX.length));
      return e ? JSON.stringify(e) : null;
    },
    async set(key, val){
      const e = typeof val === "string" ? JSON.parse(val) : val;
      cache.set(e.id, e);                       // 화면 즉시 반영(낙관적)
      try {
        const { error } = await sb.from("entries").upsert(entryToRow(e));
        if (error) throw error;
      } catch(err){
        if (isOfflineError(err)){ enqueueOp({ type: "set", entry: e }); return; }
        throw err;                              // 진짜 오류는 그대로 전달
      }
    },
    async delete(key){
      const id = key.slice(KEY_PREFIX.length);
      const e = cache.get(id);
      const paths = (e && Array.isArray(e.images)) ? e.images.filter(isStoragePath) : [];
      cache.delete(id);                         // 화면 즉시 반영(낙관적)
      try {
        if (paths.length){ try { await sb.storage.from(BUCKET).remove(paths); } catch(_){} }
        const { error } = await sb.from("entries").delete().eq("id", id);
        if (error) throw error;
      } catch(err){
        if (isOfflineError(err)){ enqueueOp({ type: "delete", id, paths }); return; }
        throw err;
      }
    },
    async list(){
      await ensureLoaded();
      return [...cache.keys()].map(id => KEY_PREFIX + id);
    },
  };
}

// localStorage 에 남아있던 기존 기록을 클라우드로 1회 이전
async function migrateLocalToCloud(){
  const localKeys = [];
  try {
    for (let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if (k && k.startsWith(KEY_PREFIX)) localKeys.push(k);
    }
  } catch(_){ return; }
  if (!localKeys.length) return;
  let migrated = 0;
  for (const k of localKeys){
    try {
      const raw = localStorage.getItem(k);
      if (!raw) continue;
      const e = JSON.parse(raw);
      if (!e || !e.id || !e.date) continue;
      e.images = await prepareImagesForSave(e.id, e.images || []);
      await storage.set(KEY_PREFIX + e.id, JSON.stringify(e));
      localStorage.removeItem(k);
      migrated++;
    } catch(err){ console.error("migrate fail", err); }
  }
  if (migrated) showToast(`기존 기록 ${migrated}개를 클라우드로 옮겼어요`);
}

async function doLogin(){
  const email = $authEmail.value.trim();
  const password = $authPassword.value;
  if (!email || !password){ authError("이메일과 비밀번호를 입력하세요"); return; }
  authBusy(true); authError("로그인 중…");
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  authBusy(false);
  if (error){ authError(error.message || "로그인에 실패했어요"); return; }
  authError("");
  rememberEmail(email);
  await startApp(data.user);
}
async function doSignup(){
  const name = $authName.value.trim();
  const email = $authEmail.value.trim();
  const password = $authPassword.value;
  const password2 = $authPassword2.value;
  const birthdate = $authBirth.value || ""; // "YYYY-MM-DD"
  if (!name){ authError("이름(닉네임)을 입력하세요"); $authName.focus(); return; }
  if (!email){ authError("이메일을 입력하세요"); $authEmail.focus(); return; }
  if (password.length < 6){ authError("비밀번호는 6자 이상이어야 해요"); $authPassword.focus(); return; }
  if (password !== password2){ authError("비밀번호가 일치하지 않아요"); $authPassword2.focus(); return; }
  authBusy(true); authError("가입 중…");
  const { data, error } = await sb.auth.signUp({
    email, password,
    options: { data: { name, birthdate } },
  });
  authBusy(false);
  if (error){
    const msg = (error.message || "").toLowerCase();
    if (error.code === "user_already_exists" || msg.includes("already registered") || msg.includes("already exists")){
      authError("이미 가입된 이메일이에요. 로그인해 주세요.");
    } else {
      authError(error.message || "가입에 실패했어요");
    }
    return;
  }
  // 이메일 확인이 켜진 환경에서는 기존 이메일이 가짜 성공(identities 빈 배열)으로 옴 → 중복으로 처리
  if (data.user && Array.isArray(data.user.identities) && data.user.identities.length === 0){
    authError("이미 가입된 이메일이에요. 로그인해 주세요.");
    return;
  }
  rememberEmail(email);
  if (data.session){ authError(""); await startApp(data.user); }
  else { setAuthMode("login"); authError("확인 메일을 보냈어요. 메일의 링크를 누른 뒤 로그인하세요."); }
}

/* ============================================================

function genId(){

}
function escapeHtml(s){
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}
function todayISO(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function parseDate(iso){
  // iso = "YYYY-MM-DD" -> Date at local midnight
  const [y,m,d] = iso.split("-").map(Number);
  return new Date(y, m-1, d);
}
function daysBetween(a, b){
  const MS = 24*60*60*1000;
  const aa = new Date(a.getFullYear(), a.getMonth(), a.getDate()).getTime();
  const bb = new Date(b.getFullYear(), b.getMonth(), b.getDate()).getTime();
  return Math.round((aa - bb) / MS);
}
const WEEKDAYS = ["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
function formatDateLine(iso){
  const d = parseDate(iso);
  const today = new Date();
  const diff = daysBetween(d, today);
  const wd = WEEKDAYS[d.getDay()];
  let accent = "";
  if (diff === 0) accent = "오늘";
  else if (diff === -1) accent = "어제";
  const full = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 · ${wd}`;
  return { accent, full };
}
function formatMonth(ym){
  const [y, m] = ym.split("-").map(Number);
  return `${y}년 ${m}월`;
}

/* ============================================================
   Flexible date parsing (본문에 입력한 날짜 자동 인식)
   - "26.06.01", "2026-6-1", "2026/06/01", "6월 1일",
     "2026년 6월 1일", "6/1", "오늘/어제/내일/모레/그제" 등 인식
   - 본문 첫 줄 앞쪽에서 날짜 토큰을 찾음. 못 찾으면 null.
   ============================================================ */
function buildISO(y, mo, d){
  y = Number(y); mo = Number(mo); d = Number(d);
  if (y < 100) y += 2000;            // 26 -> 2026
  if (!(mo >= 1 && mo <= 12) || !(d >= 1 && d <= 31)) return null;
  const dt = new Date(y, mo - 1, d);
  if (dt.getFullYear() !== y || dt.getMonth() !== mo - 1 || dt.getDate() !== d) {
    return null;                     // 2/30 같은 잘못된 날짜 차단
  }
  return todayISOFrom(dt);
}
function todayISOFrom(d){
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function parseFlexibleDate(input){
  if (!input) return null;
  // 첫 줄만 보고, 앞쪽의 글머리표(* - • · 공백) 제거
  let s = String(input).split(/\r?\n/)[0].trim().replace(/^[\*\-•·.\s]+/, "");
  if (!s) return null;
  const now = new Date();

  // 상대 날짜 키워드
  const rel = { "그제": -2, "그저께": -2, "엊그제": -2, "어제": -1, "오늘": 0, "금일": 0, "내일": 1, "낼": 1, "모레": 2, "글피": 3 };
  for (const k in rel){
    if (s.startsWith(k)){
      const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() + rel[k]);
      return todayISOFrom(d);
    }
  }

  let m;
  // YYYY년 M월 D일 / YY년 M월 D일
  m = s.match(/^(\d{2,4})\s*년\s*(\d{1,2})\s*월\s*(\d{1,2})\s*일?/);
  if (m) return buildISO(m[1], m[2], m[3]);
  // M월 D일 (올해)
  m = s.match(/^(\d{1,2})\s*월\s*(\d{1,2})\s*일?/);
  if (m) return buildISO(now.getFullYear(), m[1], m[2]);
  // YYYY.MM.DD / YY.MM.DD ( . - / 또는 공백 구분 )
  m = s.match(/^(\d{2,4})\s*[.\-\/]\s*(\d{1,2})\s*[.\-\/]\s*(\d{1,2})/);
  if (m) return buildISO(m[1], m[2], m[3]);
  // MM/DD (올해) — 구분자 하나, 뒤에 또 다른 숫자 구분자가 없어야 함
  m = s.match(/^(\d{1,2})\s*[.\-\/]\s*(\d{1,2})(?!\s*[.\-\/]\s*\d)/);
  if (m){
    const mm = Number(m[1]), dd = Number(m[2]);
    if (mm >= 1 && mm <= 12 && dd >= 1 && dd <= 31) return buildISO(now.getFullYear(), mm, dd);
  }
  return null;
}

/* ============================================================
   Image compression
   ============================================================ */
function compressImage(file){
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith("image/")) {
      reject(new Error("이미지 파일만 가능합니다."));
      return;
    }
    const reader = new FileReader();
    reader.onerror = () => reject(reader.error || new Error("파일 읽기 실패"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("이미지 디코드 실패"));
      img.onload = () => {
        const { naturalWidth: w, naturalHeight: h } = img;
        let tw = w, th = h;
        const longest = Math.max(w, h);
        if (longest > MAX_IMG_EDGE) {
          const ratio = MAX_IMG_EDGE / longest;
          tw = Math.round(w * ratio);
          th = Math.round(h * ratio);
        }
        const canvas = document.createElement("canvas");
        canvas.width = tw; canvas.height = th;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, tw, th);
        try {
          const dataUrl = canvas.toDataURL("image/jpeg", JPEG_QUALITY);
          resolve(dataUrl);
        } catch (e) { reject(e); }
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ============================================================
   Persistence
   ============================================================ */
const TRASH_TTL_MS = 30 * 24 * 60 * 60 * 1000; // 휴지통 보관 30일
const OFFLINE_CACHE_KEY = "worklog:offline-cache";

function readOfflineCache(){
  try {
    const raw = localStorage.getItem(OFFLINE_CACHE_KEY);
    const arr = raw ? JSON.parse(raw) : null;
    return Array.isArray(arr) ? arr : null;
  } catch(_){ return null; }
}

async function loadAll(){
  try {
    const keys = await storage.list(KEY_PREFIX);
    const all = [];
    for (const k of keys){
      try {
        const raw = await storage.get(k);
        if (!raw) continue;
        const obj = typeof raw === "string" ? JSON.parse(raw) : raw;
        if (obj && obj.id && obj.date) all.push(obj);
      } catch(e){ /* skip corrupted */ }
    }
    await purgeExpiredTrash(all);            // 30일 지난 휴지통 영구삭제
    const active = all.filter(e => !e.deletedAt);
    const trash  = all.filter(e => e.deletedAt);
    active.sort(sortEntries);
    trash.sort((a, b) => (b.deletedAt || 0) - (a.deletedAt || 0));
    state.entries = active;
    state.trash = trash;
    try { await ensureSignedUrls(state.entries); } catch(_){ /* 오프라인 시 사진 URL 생략 */ }
    // 오프라인 대비 캐시 (본문 기준; 이미지는 온라인에서만 표시)
    try { localStorage.setItem(OFFLINE_CACHE_KEY, JSON.stringify(active)); } catch(_){}
  } catch (err) {
    // 네트워크 실패(오프라인 등) → 마지막으로 본 기록 표시
    if (isCloud()){
      const cached = readOfflineCache();
      if (cached){
        state.entries = cached;
        state.trash = [];
        showToast("오프라인: 마지막으로 본 기록을 표시해요");
        return;
      }
    }
    throw err;
  }
}
function sortEntries(a, b){
  if (a.date !== b.date) return a.date < b.date ? 1 : -1;
  return (b.createdAt || 0) - (a.createdAt || 0);
}
async function saveEntry(entry){
  await storage.set(KEY_PREFIX + entry.id, JSON.stringify(entry));
}
// 영구 삭제 (행 + Storage 이미지 제거)
async function deleteEntry(id){
  await storage.delete(KEY_PREFIX + id);
}

/* ── 휴지통 ─────────────────────────────────────────────────── */
// 삭제 → 휴지통으로 이동(소프트 삭제)
async function trashEntry(id){
  const e = state.entries.find(x => x.id === id);
  if (!e) return;
  e.deletedAt = Date.now();
  await saveEntry(e);
  state.entries = state.entries.filter(x => x.id !== id);
  state.trash.unshift(e);
}
// 휴지통에서 복원
async function restoreEntry(id){
  const e = state.trash.find(x => x.id === id);
  if (!e) return;
  e.deletedAt = null;
  await saveEntry(e);
  state.trash = state.trash.filter(x => x.id !== id);
  state.entries.push(e);
  state.entries.sort(sortEntries);
  await ensureSignedUrls([e]);   // 복원된 기록의 사진 서명 URL 갱신
}
// 완전 삭제(되돌릴 수 없음)
async function purgeEntry(id){
  await deleteEntry(id);
  state.trash = state.trash.filter(x => x.id !== id);
}
// 휴지통 비우기
async function emptyTrash(){
  for (const id of state.trash.map(e => e.id)){
    try { await deleteEntry(id); } catch(err){ console.error(err); }
  }
  state.trash = [];
}
// 30일 지난 항목 자동 영구삭제 (로드 시 호출, all 배열에서도 제거)
async function purgeExpiredTrash(all){
  const now = Date.now();
  const expired = all.filter(e => e.deletedAt && (now - e.deletedAt) > TRASH_TTL_MS);
  for (const e of expired){
    try { await deleteEntry(e.id); } catch(err){ console.error(err); }
    const i = all.indexOf(e);
    if (i >= 0) all.splice(i, 1);
  }
}

// 본문에서 #태그 추출 (한글·영문·숫자·_·- 허용). 앞이 공백/줄머리/괄호일 때만 인식
const TAG_RE = /(^|[\s(])#([0-9A-Za-z_\-가-힣ㄱ-ㆎ]+)/g;
function extractTags(text){
  if (!text) return [];
  const out = [];
  let m;
  TAG_RE.lastIndex = 0;
  while ((m = TAG_RE.exec(text))){
    const t = m[2];
    if (t && !out.includes(t)) out.push(t);
  }
  return out;
}

// 본문에서 [[위키링크]] 추출
const LINK_RE = /\[\[([^\[\]\n]+)\]\]/g;
function extractLinks(text){
  if (!text) return [];
  const out = [];
  let m;
  LINK_RE.lastIndex = 0;
  while ((m = LINK_RE.exec(text))){
    const t = m[1].trim();
    if (t && !out.includes(t)) out.push(t);
  }
  return out;
}

const CAT_KEY = "worklog:categories";
const CAT_PALETTE = ["#c9a961","#6c9bd1","#7fb47c","#d08a6a","#a98bd0","#5bb0b8","#d6789f","#b08a5a"];
function loadCatList(){
  try { const a = JSON.parse(localStorage.getItem(CAT_KEY)); if (Array.isArray(a)) return a.filter(c => c && c.name); } catch(_){}
  return [{ name:"작업", color:CAT_PALETTE[0] }, { name:"스케줄", color:CAT_PALETTE[1] }];
}
function saveCatList(){ try { localStorage.setItem(CAT_KEY, JSON.stringify(catList)); } catch(_){} }
let catList = loadCatList();
// 저장된 목록 + 실제 기록에 쓰인 분류(다른 기기에서 만든 것)를 합쳐서 보여줌
function getCategories(){
  const map = new Map(catList.map(c => [c.name, c]));
  let pi = catList.length;
  for (const e of state.entries){
    const c = (e.category || "").trim();
    if (c && !map.has(c)) map.set(c, { name:c, color:CAT_PALETTE[pi++ % CAT_PALETTE.length] });
  }
  return [...map.values()];
}
function catColor(name){ const c = getCategories().find(x => x.name === name); return c ? c.color : "var(--muted)"; }
function addCategory(name){
  name = (name || "").trim();
  if (!name || catList.some(c => c.name === name)) return false;
  catList.push({ name, color:CAT_PALETTE[catList.length % CAT_PALETTE.length] });
  saveCatList();
  return true;
}
function removeCategory(name){
  catList = catList.filter(c => c.name !== name);
  saveCatList();
  // 이 분류를 쓰던 기록은 '미분류'로 풀어줌(저장·동기화)
  for (const e of state.entries){
    if ((e.category || "") === name){ e.category = ""; e.updatedAt = Date.now(); saveEntry(e).catch(() => {}); }
  }
  if (state.catFilter === name) state.catFilter = null;
}

/* 날짜를 사람이 검색할 법한 여러 형태로 펼쳐 검색 대상에 포함
   예) 2026-06-09 → "2026년 6월 9일", "2026년 6월", "6월 9일", "6월", "9일", "2026.06.09" … */
function dateSearchText(iso){
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso || "");
  if (!m) return iso || "";
  const y = m[1], mo = m[2], d = m[3];
  const moN = String(Number(mo)), dN = String(Number(d));
  return [
    iso, `${y}.${mo}.${d}`, `${y}/${mo}/${d}`, `${mo}.${d}`, `${moN}/${dN}`,
    `${y}년 ${moN}월 ${dN}일`, `${y}년 ${moN}월`, `${moN}월 ${dN}일`,
    `${moN}월`, `${dN}일`, y
  ].join(" ");
}
// 검색·자비스가 함께 뒤지는 텍스트: 본문 + 화면에 보이는 날짜 + 날짜 변형들
function searchableText(e){
  const parts = [e.text || "", e.date || ""];
  try { parts.push(formatDateLine(e.date).full); } catch(_){}
  try { parts.push(formatMonth((e.date || "").slice(0, 7))); } catch(_){}
  parts.push(dateSearchText(e.date));
  return parts.join(" ").toLowerCase();
}

/* 검색 연산자 파서: tag:버그  -제외어  "정확한 구문"  일반어(AND) */
function parseSearch(q){
  const out = { inc: [], exc: [], tags: [] };
  const re = /-?"[^"]+"|-?[^\s]+/g;
  let m;
  while ((m = re.exec(q || ""))){
    let t = m[0], neg = false;
    if (t[0] === "-"){ neg = true; t = t.slice(1); }
    if (t[0] === '"' && t[t.length - 1] === '"') t = t.slice(1, -1);
    t = t.trim();
    if (!t) continue;
    if (/^tag:/i.test(t)){ out.tags.push(t.slice(4).replace(/^#/, "").toLowerCase()); continue; }
    (neg ? out.exc : out.inc).push(t.toLowerCase());
  }
  return out;
}
function matchSearch(entry, parsed){
  const text = searchableText(entry);   // 본문 + 날짜(여러 형태) 동시 검색
  for (const t of parsed.inc) if (!text.includes(t)) return false;
  for (const t of parsed.exc) if (text.includes(t)) return false;
  if (parsed.tags.length){
    const tg = extractTags(entry.text).map(s => s.toLowerCase());
    for (const t of parsed.tags) if (!tg.includes(t)) return false;
  }
  return true;
}

function filteredEntries(){
  const parsed = parseSearch(state.search.trim());
  const hasSearch = parsed.inc.length || parsed.exc.length || parsed.tags.length;
  return state.entries.filter(e => {
    if (state.favFilter && !e.pinnedAt) return false;
    if (state.catFilter && (e.category || "") !== state.catFilter) return false;
    if (state.dayFilter && e.date !== state.dayFilter) return false;
    if (state.monthFilter && !e.date.startsWith(state.monthFilter)) return false;
    if (state.tagFilter && !extractTags(e.text).includes(state.tagFilter)) return false;
    if (state.linkFilter && !extractLinks(e.text).includes(state.linkFilter)) return false;
    if (hasSearch && !matchSearch(e, parsed)) return false;
    return true;
  });
}

function shiftMonth(ym, delta){
  const [y, m] = ym.split("-").map(Number);
  return todayISOFrom(new Date(y, m - 1 + delta, 1)).slice(0, 7);
}
function renderCalendar(){
  const ym = state.calMonth || todayISO().slice(0, 7);
  const [y, mo] = ym.split("-").map(Number);
  const startDow = new Date(y, mo - 1, 1).getDay();   // 0=일
  const daysInMonth = new Date(y, mo, 0).getDate();
  const counts = new Map();
  for (const e of state.entries) if (e.date.startsWith(ym)) counts.set(e.date, (counts.get(e.date) || 0) + 1);
  const today = todayISO();
  const wd = ["일", "월", "화", "수", "목", "금", "토"];
  let html =
    `<div class="cal-head">` +
      `<button class="cal-nav" type="button" data-cal="-1" aria-label="이전 달">‹</button>` +
      `<div class="cal-title">${escapeHtml(formatMonth(ym))}</div>` +
      `<button class="cal-nav" type="button" data-cal="1" aria-label="다음 달">›</button>` +
    `</div>` +
    `<div class="cal-grid">` +
    wd.map((d, i) => `<div class="cal-dow ${i === 0 ? "sun" : ""} ${i === 6 ? "sat" : ""}">${d}</div>`).join("");
  for (let i = 0; i < startDow; i++) html += `<div class="cal-cell empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++){
    const iso = `${ym}-${String(d).padStart(2, "0")}`;
    const c = counts.get(iso) || 0;
    html += `<button class="cal-cell ${c ? "has" : ""} ${iso === today ? "today" : ""}" type="button" ${c ? `data-calday="${iso}"` : "disabled"}>` +
      `<span class="cal-d">${d}</span>${c ? `<span class="cal-dot">${c > 1 ? c : ""}</span>` : ""}</button>`;
  }
  html += `</div>`;
  const monthN = [...counts.values()].reduce((a, b) => a + b, 0);
  html += `<div class="cal-foot">${escapeHtml(formatMonth(ym))} · 기록 <b>${monthN}</b>건 · <b>${counts.size}</b>일</div>`;
  $entries.innerHTML = html;
}

function renderTags(){
  const counts = new Map();
  for (const e of state.entries){
    for (const t of extractTags(e.text)) counts.set(t, (counts.get(t) || 0) + 1);
  }
  // 현재 필터가 더 이상 존재하지 않는 태그면 해제
  if (state.tagFilter && !counts.has(state.tagFilter)) state.tagFilter = null;
  if (counts.size === 0){ $tagbar.innerHTML = ""; $tagbar.style.display = "none"; return; }
  const tags = [...counts.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "ko"));
  const parts = [];
  if (state.tagFilter){
    parts.push(`<button class="pill tag-clear" data-tag="" aria-label="태그 필터 해제">✕ #${escapeHtml(state.tagFilter)}</button>`);
  }
  for (const [t, c] of tags){
    const pressed = state.tagFilter === t;
    parts.push(`<button class="pill" data-tag="${escapeHtml(t)}" aria-pressed="${pressed}">#${escapeHtml(t)} <span class="c">${c}</span></button>`);
  }
  $tagbar.innerHTML = parts.join("");
  $tagbar.style.display = "";
}

function isoAddDays(iso, n){
  const [y, m, d] = iso.split("-").map(Number);
  return todayISOFrom(new Date(y, m - 1, d + n));
}
// 오늘(또는 어제)부터 거꾸로 며칠 연속 기록했는지
function currentStreak(entries){
  const set = new Set(entries.map(e => e.date));
  if (!set.size) return 0;
  const today = todayISO();
  let start = set.has(today) ? today : isoAddDays(today, -1);
  if (!set.has(start)) return 0;     // 오늘·어제 둘 다 없으면 연속 끊김
  let streak = 0, d = start;
  while (set.has(d)){ streak++; d = isoAddDays(d, -1); }
  return streak;
}

// 글자수(공백 제외) — 작성량 통계용
function textLen(t){ return (t || "").replace(/\s+/g, "").length; }
function fmtNum(n){ return n.toLocaleString("ko-KR"); }

function renderStats(){
  const total = state.entries.length;
  const days = new Set(state.entries.map(e => e.date)).size;
  const photos = state.entries.reduce((acc, e) => acc + (e.images?.length || 0), 0);
  if (total === 0){
    $stats.innerHTML = `아직 기록이 없습니다`;
    return;
  }
  const chars = state.entries.reduce((acc, e) => acc + textLen(e.text), 0);
  let html =
    `총 <b>${total}</b>건` +
    `<span class="sep">·</span>` +
    `<b>${days}</b>일 기록` +
    `<span class="sep">·</span>` +
    `사진 <b>${photos}</b>장` +
    `<span class="sep">·</span>` +
    `✍ <b>${fmtNum(chars)}</b>자`;
  const streak = currentStreak(state.entries);
  if (streak >= 2) html += `<span class="sep">·</span>🔥 <b>${streak}</b>일 연속`;
  if (state.monthFilter){
    const ms = state.entries.filter(e => e.date.startsWith(state.monthFilter));
    const mc = ms.reduce((a, e) => a + textLen(e.text), 0);
    html += `<span class="sep">·</span>${escapeHtml(formatMonth(state.monthFilter))} <b>${ms.length}</b>건·<b>${fmtNum(mc)}</b>자`;
  }
  $stats.innerHTML = html;
}

function renderMonths(){
  const set = new Set();
  for (const e of state.entries) set.add(e.date.slice(0,7));
  const months = Array.from(set).sort().reverse();
  const parts = [];
  parts.push(
    `<button class="pill" data-month="" aria-pressed="${state.monthFilter === null}">전체</button>`
  );
  for (const ym of months){
    const pressed = state.monthFilter === ym;
    parts.push(
      `<button class="pill" data-month="${ym}" aria-pressed="${pressed}">${escapeHtml(formatMonth(ym))}</button>`
    );
  }
  $months.innerHTML = parts.join("");
  $months.style.display = months.length === 0 ? "none" : "";
}

// 특수 필터(날짜·즐겨찾기·링크) 활성 시 상단 배너
function filterBannerHtml(count){
  let label = "";
  if (state.dayFilter) label = `📅 <b>${escapeHtml(formatDateLine(state.dayFilter).full.split(" · ")[0])}</b> 기록 ${count}개`;
  else if (state.favFilter) label = `⭐ <b>즐겨찾기</b> ${count}개`;
  else if (state.linkFilter) label = `🔗 <b>[[${escapeHtml(state.linkFilter)}]]</b> 언급한 기록 ${count}개`;
  else if (state.catFilter) label = `<span class="cat-dot" style="background:${catColor(state.catFilter)}"></span> <b>${escapeHtml(state.catFilter)}</b> 분류 ${count}개`;
  else return "";
  return `<div class="link-banner">${label}<button class="filter-clear" type="button" aria-label="필터 해제">✕</button></div>`;
}

function renderEntries(){

  if (list.length === 0){

        <div class="e-title">${isFilter ? "결과가 없어요" : "오늘의 첫 기록"}</div>
        <div class="e-sub">${
          isFilter
            ? "다른 키워드·태그·월을 선택해보세요"
            : "오른쪽 위 “새 기록”에서 시작해보세요"
        }</div>
      </div>`;
    return;
  }
  const q = state.search.trim();
  // 월이 바뀔 때마다 구분선을 끼워 스캔하기 쉽게
  let html = banner;
  let lastMonth = null;
  for (const e of list){
