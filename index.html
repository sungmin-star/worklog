<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>L'Heure Bleue</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta name="theme-color" content="#f6f4ef" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#1d1d1f" media="(prefers-color-scheme: dark)" />
<!-- PWA: 홈 화면 설치 + 오프라인 -->
<link rel="manifest" href="./manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="L'Heure Bleue" />
<link rel="apple-touch-icon" href="./icon-180.png" />
<link rel="icon" type="image/png" href="./icon-192.png" />
<script>
  /* 저장된 테마를 페인트 전에 적용해 깜빡임 방지 */
  try{
    var t = localStorage.getItem("worklog:theme");
    if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
  }catch(e){}
</script>
<style>
  /* ============================================================
     작업 일지 — Daily Work Log
     단일 파일 · Vanilla JS · 종이 노트 분위기
     ============================================================ */

  /* ── L'Heure Bleue Light : 크림 + 네이비 + 골드 ───────────── */
  :root{
    --bg:#f6f4ef;
    --surface:#ffffff;
    --surface-2:#ebe8e1;
    --text:#1e1e1e;
    --muted:#76746e;
    --line:#e4e1da;
    --line-strong:#d3cfc6;
    --accent:#c9a961;
    --accent-hover:#8b7355;
    --accent-text:#1e1e1e;
    --accent-soft:rgba(201,169,97,0.15);
    --bleue:#1e3a5f;
    --ok:#5c8a5a;
    --danger:#b4453a;
    --shadow:0 1px 0 rgba(20,20,22,0.04);
    --shadow-lg:0 24px 60px rgba(20,20,22,0.14);
    --ring:0 0 0 3px var(--accent-soft);
    --blur-bg:rgba(246,244,239,0.82);
    --radius:4px;
    --radius-sm:3px;
    --display:"Cormorant Garamond", "EB Garamond", "Pretendard Variable", Pretendard, "Apple SD Gothic Neo", Georgia, serif;
    --sans:-apple-system, BlinkMacSystemFont, "SF Pro Text", "Pretendard Variable", Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
  }

  /* ── L'Heure Bleue Dark : 딥 네이비(블루아워) + 골드 ───────── */
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --bg:#1d1d1f;
      --surface:#2a2a2c;
      --surface-2:#38383b;
      --text:#ececec;
      --muted:#9a9a9e;
      --line:#3a3a3d;
      --line-strong:#4c4c50;
      --accent:#cdae6a;
      --accent-hover:#e0c685;
      --accent-text:#1d1d1f;
      --accent-soft:rgba(205,174,106,0.18);
      --bleue:#ececec;
      --ok:#7fb47c;
      --danger:#e0685b;
      --shadow:0 1px 0 rgba(0,0,0,0.4);
      --shadow-lg:0 24px 60px rgba(0,0,0,0.6);
      --blur-bg:rgba(29,29,31,0.80);
    }
  }
  /* 사용자가 직접 다크를 선택한 경우(시스템 설정과 무관) */
  :root[data-theme="dark"]{
    --bg:#1d1d1f;
    --surface:#2a2a2c;
    --surface-2:#38383b;
    --text:#ececec;
    --muted:#9a9a9e;
    --line:#3a3a3d;
    --line-strong:#4c4c50;
    --accent:#cdae6a;
    --accent-hover:#e0c685;
    --accent-text:#1d1d1f;
    --accent-soft:rgba(205,174,106,0.18);
    --bleue:#ececec;
    --ok:#7fb47c;
    --danger:#e0685b;
    --shadow:0 1px 0 rgba(0,0,0,0.4);
    --shadow-lg:0 24px 60px rgba(0,0,0,0.6);
    --blur-bg:rgba(29,29,31,0.80);
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{ -webkit-text-size-adjust:100%; }
  body{
    font-family:var(--sans);
    background:var(--bg);
    color:var(--text);
    font-feature-settings:"tnum" 1;
    line-height:1.55;
    letter-spacing:-0.01em;
    min-height:100dvh;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  body.modal-open{overflow:hidden}

  button{ font-family:inherit; color:inherit; cursor:pointer; }
  input, textarea{ font-family:inherit; color:inherit; }
  ::selection{ background:var(--accent); color:var(--accent-text); }

  /* ---------- Layout ---------- */
  .page{
    max-width:720px;
    margin:0 auto;
    padding:64px 28px 120px;
  }
  @media (max-width:600px){
    .page{ padding:40px 18px 100px; }
  }

  /* ---------- Header ---------- */
  header.top{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    min-height:46px;
    margin-bottom:10px;
  }
  h1.title{ margin:0; line-height:0; }
  .brand-logo{
    display:block;
    width:196px;
    max-width:58%;
    height:auto;
    border-radius:12px;
  }
  @media (max-width:600px){ .brand-logo{ width:164px; } }
  .header-actions{
    position:absolute;
    right:0; top:50%;
    transform:translateY(-50%);
    display:flex; align-items:center; gap:8px;
  }
  .menu-wrap{ position:relative; }
  .icon-btn{
    width:38px; height:38px;
    border-radius:50%;
    border:none;
    background:var(--surface-2);
    color:var(--text);
    display:inline-flex; align-items:center; justify-content:center;
    transition:background-color .18s ease, transform .1s ease;
  }
  .icon-btn:hover{ background:var(--line); }
  .icon-btn:active{ transform:scale(0.94); }
  .icon-btn svg{ width:18px; height:18px; stroke:currentColor; }

  .menu{
    position:absolute;
    top:calc(100% + 10px);
    right:0;
    min-width:220px;
    background:var(--blur-bg);
    -webkit-backdrop-filter:blur(24px) saturate(180%);
    backdrop-filter:blur(24px) saturate(180%);
    border:1px solid var(--line);
    border-radius:16px;
    padding:7px;
    z-index:50;
    box-shadow:var(--shadow-lg);
    opacity:0; transform:translateY(-6px) scale(0.98); transform-origin:top right; pointer-events:none;
    transition:opacity .18s ease, transform .18s ease;
  }
  .menu[data-open="true"]{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  .menu button{
    display:block;
    width:100%;
    text-align:left;
    padding:10px 12px;
    border:none;
    background:transparent;
    border-radius:10px;
    font-size:14px;
    font-weight:450;
    color:var(--text);
    transition:background-color .12s ease;
  }
  .menu button:hover{ background:var(--surface-2); color:var(--text); }
  .menu .divider{ height:1px; background:var(--line); margin:5px 8px; }

  /* ---------- Sub: stats ---------- */
  .stats{
    color:var(--muted);
    font-size:13px;
    margin:0 0 28px 0;
    letter-spacing:0.01em;
  }
  .stats b{ color:var(--text); font-weight:600; }
  .stats .sep{ margin:0 8px; opacity:.5; }

  /* ---------- Controls (search + new) ---------- */
  .controls{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:18px;
  }
  .search{
    flex:1;
    display:flex; align-items:center;
    background:var(--surface-2);
    border:1px solid transparent;
    border-radius:var(--radius);
    padding:10px 14px 10px 40px;
    position:relative;
    transition:border-color .18s ease, box-shadow .18s ease, background-color .18s ease;
  }
  .search:focus-within{ background:var(--surface); border-color:var(--accent); box-shadow:var(--ring); }
  .search svg{
    position:absolute;
    left:14px; top:50%;
    transform:translateY(-50%);
    width:16px; height:16px;
    color:var(--muted);
  }
  .search input{
    border:none; outline:none;
    background:transparent;
    width:100%;
    font-size:15px;
  }
  .btn{
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--text);
    border-radius:var(--radius);
    padding:10px 20px;
    font-size:15px;
    font-weight:500;
    letter-spacing:-0.01em;
    box-shadow:none;
    transition:background-color .18s ease, transform .1s ease, box-shadow .18s ease;
    white-space:nowrap;
  }
  .btn:hover{ background:var(--surface-2); }
  .btn:active{ transform:scale(0.97); }
  .btn.ghost{
    background:var(--surface-2);
    color:var(--text);
  }
  .btn.ghost:hover{ background:var(--line); }
  .btn.danger{
    background:transparent;
    color:var(--danger);
  }
  .btn.danger:hover{ background:var(--danger); color:#fff; }

  @media (max-width:600px){
    .controls{ flex-wrap:wrap; }
    .search{ flex:1 1 100%; }
    .btn.new{ flex:1; }
  }

  /* ---------- Month filter ---------- */
  .months{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding-bottom:8px;
    margin:0 -4px 30px;
    padding-left:4px; padding-right:4px;
    scrollbar-width:none;
  }
  .months::-webkit-scrollbar{ display:none; }
  .pill{
    flex:none;
    border:none;
    background:var(--surface-2);
    border-radius:var(--radius);
    padding:7px 15px;
    font-size:13px;
    font-weight:500;
    color:var(--muted);
    transition:color .15s ease, background-color .15s ease, transform .1s ease;
  }
  .pill:hover{ background:var(--line); color:var(--text); }
  .pill:active{ transform:scale(0.96); }
  .pill[aria-pressed="true"]{
    background:var(--surface);
    color:var(--text);
    box-shadow:inset 0 0 0 1px var(--line-strong);
  }
  .pill[aria-pressed="true"]:hover{ background:var(--surface); }

  /* ---------- Entries : 읽기 우선 타임라인 피드 ---------- */
  .entries{ display:flex; flex-direction:column; gap:18px; }

  .month-divider{
    font-size:13px;
    font-weight:600;
    color:var(--muted);
    margin:14px 2px 0;
  }
  .month-divider:first-child{ margin-top:0; }

  .entry{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:24px 26px;
    box-shadow:none;
    animation:fadeIn .35s cubic-bezier(.16,1,.3,1) both;
    transition:border-color .4s ease-out;
  }
  .entry:hover{ border-color:var(--accent); }
  .entry:hover .entry-edit{ opacity:1; }

  .entry-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:12px;
  }
  .entry-date{ font-size:13.5px; color:var(--muted); }
  .entry-date .accent{ color:var(--accent); font-weight:600; margin-right:5px; }
  .entry-edit{
    width:32px; height:32px;
    border-radius:50%;
    border:none;
    background:var(--surface-2);
    color:var(--muted);
    display:inline-flex; align-items:center; justify-content:center;
    opacity:0;
    transition:opacity .18s ease, background-color .15s ease, color .15s ease, transform .1s ease;
    flex-shrink:0;
  }
  .entry-edit:hover{ background:var(--accent); color:var(--accent-text); }
  .entry-edit:active{ transform:scale(0.92); }
  .entry-edit svg{ width:15px; height:15px; }
  @media (hover:none){ .entry-edit{ opacity:1; } }

  .entry-actions{ display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .entry-trash{
    width:32px; height:32px;
    border-radius:50%;
    border:none;
    background:var(--surface-2);
    color:var(--muted);
    display:inline-flex; align-items:center; justify-content:center;
    opacity:0;
    transition:opacity .18s ease, background-color .15s ease, color .15s ease, transform .1s ease;
    flex-shrink:0;
  }
  .entry:hover .entry-trash{ opacity:1; }
  .entry-trash:hover{ background:var(--danger); color:#fff; }
  .entry-trash:active{ transform:scale(0.92); }
  .entry-trash svg{ width:15px; height:15px; }
  @media (hover:none){ .entry-trash{ opacity:1; } }

  /* 본문: 넉넉한 글줄·줄간격으로 그 자리에서 읽기 */
  .entry-text{
    white-space:pre-wrap;
    word-break:break-word;
    font-size:16.5px;
    line-height:1.8;
    color:var(--text);
  }
  .entry-text.is-clamped{
    display:-webkit-box;
    -webkit-line-clamp:12;
    -webkit-box-orient:vertical;
    overflow:hidden;
    position:relative;
  }
  .entry-text.is-clamped::after{
    content:"";
    position:absolute; left:0; right:0; bottom:0;
    height:48px;
    background:linear-gradient(rgba(0,0,0,0), var(--surface));
    pointer-events:none;
  }
  .entry-text mark{
    background:rgba(255,214,10,0.45);
    color:inherit;
    padding:0 3px;
    border-radius:4px;
  }
  .more-btn{
    margin-top:8px;
    border:none;
    background:transparent;
    color:var(--accent);
    font-size:14px;
    font-weight:600;
    padding:4px 0;
  }
  .more-btn:hover{ text-decoration:underline; }

  /* 사진: 안 잘리게, 컬럼 폭에 맞춰 편하게 */
  .entry-photos{ margin-top:14px; display:flex; flex-direction:column; gap:10px; }
  .entry-photos.multi{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
    gap:8px;
  }
  .entry-photos img{
    width:100%;
    border-radius:var(--radius-sm);
    background:var(--surface-2);
    cursor:zoom-in;
    display:block;
  }
  .entry-photos.single img{ max-height:560px; object-fit:contain; }
  .entry-photos.multi img{ aspect-ratio:4/3; object-fit:cover; }

  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ---------- Empty ---------- */
  .empty{
    text-align:center;
    padding:90px 20px;
    color:var(--muted);
  }
  .empty .e-title{
    font-family:var(--display);
    font-weight:600;
    font-size:24px;
    letter-spacing:-0.02em;
    color:var(--text);
    margin-bottom:8px;
  }
  .empty .e-sub{ font-size:15px; }

  /* ---------- Modal ---------- */
  .scrim{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.4);
    -webkit-backdrop-filter:blur(8px);
    backdrop-filter:blur(8px);
    z-index:100;
    display:none;
    align-items:flex-start;
    justify-content:center;
    padding:60px 16px;
    overflow-y:auto;
  }
  .scrim[data-open="true"]{ display:flex; }
  .modal{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    width:100%;
    max-width:580px;
    padding:30px 28px 24px;
    box-shadow:var(--shadow-lg);
    animation:modalIn .26s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes modalIn{
    from{ opacity:0; transform:translateY(16px) scale(0.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  .modal h2{
    font-family:var(--display);
    font-weight:600;
    font-size:24px;
    letter-spacing:-0.02em;
    margin:0 0 20px;
  }
  .field{ margin-bottom:16px; }
  .field label{
    display:block;
    font-size:13px;
    font-weight:500;
    color:var(--muted);
    letter-spacing:-0.01em;
    margin-bottom:7px;
  }
  .field input.date-text, .field textarea{
    width:100%;
    background:var(--surface-2);
    border:1px solid transparent;
    border-radius:var(--radius-sm);
    padding:11px 13px;
    font-size:15px;
    outline:none;
    transition:border-color .18s ease, box-shadow .18s ease, background-color .18s ease;
  }
  .field input.date-text:focus, .field textarea:focus{ background:var(--surface); border-color:var(--accent); box-shadow:var(--ring); }
  .field textarea{ resize:vertical; min-height:140px; line-height:1.65; }

  .date-row{ display:flex; gap:8px; align-items:stretch; }
  .date-row .date-text{ flex:1; min-width:0; }
  .date-cal{
    position:relative;
    flex:none;
    width:48px;
    border:1px solid transparent;
    border-radius:var(--radius-sm);
    background:var(--surface-2);
    color:var(--muted);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
  }
  .date-cal:hover{ background:var(--line); color:var(--text); }
  .date-cal svg{ width:20px; height:20px; pointer-events:none; }
  .date-cal input[type="date"]{
    position:absolute; inset:0;
    width:100%; height:100%;
    opacity:0; cursor:pointer;
    border:0; padding:0; margin:0;
  }

  .date-hint{
    margin-top:7px;
    font-size:12.5px;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:6px;
    animation:hintIn .18s ease;
  }
  .date-hint b{ color:var(--accent); font-weight:600; }
  .date-hint .dot{
    width:7px; height:7px; border-radius:50%;
    background:var(--ok); flex:none;
  }
  .date-hint.warn{ color:var(--danger); }
  .date-hint.warn b{ color:var(--danger); }
  .date-hint.warn .dot{ background:var(--danger); }
  @keyframes hintIn{ from{ opacity:0; transform:translateY(-2px); } to{ opacity:1; transform:none; } }

  .dropzone{
    border:1.5px dashed var(--line-strong);
    border-radius:var(--radius-sm);
    padding:20px;
    text-align:center;
    color:var(--muted);
    font-size:14px;
    cursor:pointer;
    transition:background-color .15s ease, border-color .15s ease, color .15s ease;
  }
  .dropzone:hover, .dropzone.dragover{
    background:var(--surface-2);
    border-color:var(--line-strong);
    color:var(--text);
  }
  .dropzone b{ color:var(--text); font-weight:600; }

  .thumbs{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(90px, 1fr));
    gap:6px;
    margin-top:10px;
  }
  .thumb{
    position:relative;
    aspect-ratio:1/1;
    border-radius:8px;
    overflow:hidden;
    background:var(--surface-2);
    border:1px solid var(--line);
  }
  .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .thumb .x{
    position:absolute;
    top:4px; right:4px;
    width:22px; height:22px;
    border-radius:50%;
    border:none;
    background:rgba(0,0,0,0.65);
    color:#fff;
    font-size:12px;
    line-height:1;
    display:inline-flex; align-items:center; justify-content:center;
  }
  .thumb .x:hover{ background:rgba(0,0,0,0.85); }

  .modal-actions{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-top:18px;
  }
  .modal-actions .right{ display:flex; gap:8px; }

  /* ---------- Lightbox ---------- */
  .lightbox{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.92);
    z-index:200;
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .lightbox[data-open="true"]{ display:flex; }
  .lightbox img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    border-radius:6px;
  }
  .lightbox .close{
    position:absolute;
    top:18px; right:18px;
    width:38px; height:38px;
    border-radius:50%;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    color:#fff;
    font-size:18px;
    display:inline-flex; align-items:center; justify-content:center;
  }
  .lightbox .close:hover{ background:rgba(255,255,255,0.2); }
  .lb-nav{
    position:absolute;
    top:50%; transform:translateY(-50%);
    width:48px; height:48px;
    border-radius:50%;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.18);
    -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px);
    color:#fff;
    display:inline-flex; align-items:center; justify-content:center;
    transition:background-color .15s ease, transform .1s ease;
    z-index:1;
  }
  .lb-nav svg{ width:24px; height:24px; }
  .lb-nav:hover{ background:rgba(255,255,255,0.24); }
  .lb-nav:active{ transform:translateY(-50%) scale(0.92); }
  .lb-nav.prev{ left:16px; }
  .lb-nav.next{ right:16px; }
  .lb-nav[hidden]{ display:none; }
  .lb-count{
    position:absolute;

"use strict";

/* ============================================================
   Storage abstraction
   - window.storage (Claude.ai artifact) 우선, 없으면 localStorage 폴백
   - get / set / delete / list 4종 메서드 공통 인터페이스
   ============================================================ */
let storage = (function(){
  const hasArtifact = typeof window !== "undefined"
    && typeof window.storage === "object"
    && window.storage !== null
    && typeof window.storage.get === "function";

  if (hasArtifact) {
    return {
      kind: "artifact",
      async get(key){ return await window.storage.get(key); },
      async set(key, val){ return await window.storage.set(key, val); },
      async delete(key){ return await window.storage.delete(key); },
      async list(prefix){
        const all = await window.storage.list();
        const keys = Array.isArray(all) ? all : (all && all.keys) || [];
        return keys.filter(k => !prefix || String(k).startsWith(prefix));
      },
    };
  }

  return {
    kind: "localStorage",
    async get(key){ return localStorage.getItem(key); },
    async set(key, val){ localStorage.setItem(key, val); },
    async delete(key){ localStorage.removeItem(key); },
    async list(prefix){
      const out = [];
      for (let i = 0; i < localStorage.length; i++){
        const k = localStorage.key(i);
        if (!prefix || (k && k.startsWith(prefix))) out.push(k);
      }
      return out;
    },
  };
})();

let currentUser = null;
const signedUrlCache = new Map(); // storage path -> 서명 URL
function isCloud(){ return storage && storage.kind === "supabase"; }

function dataURLtoBlob(dataUrl){
  const comma = dataUrl.indexOf(",");
  const head = dataUrl.slice(0, comma);
  const b64 = dataUrl.slice(comma + 1);
  const mime = (head.match(/data:(.*?);/) || [, "image/jpeg"])[1];
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

function isStoragePath(s){
  return typeof s === "string" && !s.startsWith("data:") && !/^https?:\/\//.test(s);
}

// 화면에 그릴 실제 src: Storage path 면 캐시된 서명 URL, 아니면 원본(dataURL/URL)
function imgSrc(src){
  if (isStoragePath(src)) return signedUrlCache.get(src) || "";
  return src;
}

async function uploadImage(entryId, idx, dataUrl){
  const blob = dataURLtoBlob(dataUrl);
  const ext = (blob.type.split("/")[1] || "jpg").replace("jpeg", "jpg");
  const path = `${currentUser.id}/${entryId}/${idx}-${Date.now()}.${ext}`;
  const { error } = await sb.storage.from(BUCKET).upload(path, blob, { contentType: blob.type, upsert: true });
  if (error) throw error;
  return path;
}

// dataURL 들을 Storage 에 올리고 path 배열로 치환 (이미 path/URL 이면 그대로 둠)
async function prepareImagesForSave(entryId, images){
  if (!isCloud()) return images;
  const out = [];
  for (let i = 0; i < images.length; i++){
    const src = images[i];
    if (typeof src === "string" && src.startsWith("data:")) out.push(await uploadImage(entryId, i, src));
    else out.push(src);
  }
  return out;
}

// 엔트리들의 Storage path 에 대한 서명 URL 을 미리 만들어 캐시
async function ensureSignedUrls(entries){
  if (!isCloud()) return;
  const need = [];
  for (const e of entries){
    for (const src of (e.images || [])){
      if (isStoragePath(src) && !signedUrlCache.has(src)) need.push(src);
    }
  }
  if (!need.length) return;
  const uniq = [...new Set(need)];
  const { data, error } = await sb.storage.from(BUCKET).createSignedUrls(uniq, SIGN_TTL);
  if (error){ console.error(error); return; }
  for (const item of (data || [])){
    if (item && item.signedUrl && item.path) signedUrlCache.set(item.path, item.signedUrl);
  }
}

// localStorage(get/set/delete/list) 와 동일 인터페이스의 Supabase 백엔드
function makeSupabaseStorage(){
  const cache = new Map(); // id -> entry obj
  let loaded = false;
  async function ensureLoaded(){
    if (loaded) return;
    const { data, error } = await sb.from("entries").select("*");
    if (error) throw error;
    cache.clear();
    for (const row of (data || [])){
      cache.set(row.id, {
        id: row.id,
        date: row.date,
        text: row.text || "",
        images: Array.isArray(row.images) ? row.images : [],
        createdAt: Number(row.created_at) || 0,
        updatedAt: Number(row.updated_at) || 0,
        deletedAt: row.deleted_at != null ? Number(row.deleted_at) : null,
      });
    }
    loaded = true;
  }
  return {
    kind: "supabase",
    async get(key){
      await ensureLoaded();
      const e = cache.get(key.slice(KEY_PREFIX.length));
      return e ? JSON.stringify(e) : null;
    },
    async set(key, val){
      const e = typeof val === "string" ? JSON.parse(val) : val;
      const row = {
        id: e.id, user_id: currentUser.id, date: e.date,
        text: e.text || "", images: e.images || [],
        created_at: e.createdAt, updated_at: e.updatedAt,
        deleted_at: e.deletedAt != null ? e.deletedAt : null,
      };
      const { error } = await sb.from("entries").upsert(row);
      if (error) throw error;
      cache.set(e.id, e);
    },
    async delete(key){
      const id = key.slice(KEY_PREFIX.length);
      const e = cache.get(id);
      if (e && Array.isArray(e.images)){
        const paths = e.images.filter(isStoragePath);
        if (paths.length){ try { await sb.storage.from(BUCKET).remove(paths); } catch(_){} }
      }
      const { error } = await sb.from("entries").delete().eq("id", id);
      if (error) throw error;
      cache.delete(id);
    },
    async list(){
      await ensureLoaded();
      return [...cache.keys()].map(id => KEY_PREFIX + id);
    },
  };
}

// localStorage 에 남아있던 기존 기록을 클라우드로 1회 이전
async function migrateLocalToCloud(){
  const localKeys = [];
  try {
    for (let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if (k && k.startsWith(KEY_PREFIX)) localKeys.push(k);
    }
  } catch(_){ return; }
  if (!localKeys.length) return;
  let migrated = 0;
  for (const k of localKeys){
    try {
      const raw = localStorage.getItem(k);
      if (!raw) continue;
      const e = JSON.parse(raw);
      if (!e || !e.id || !e.date) continue;
      e.images = await prepareImagesForSave(e.id, e.images || []);
      await storage.set(KEY_PREFIX + e.id, JSON.stringify(e));
      localStorage.removeItem(k);
      migrated++;
    } catch(err){ console.error("migrate fail", err); }
  }
  if (migrated) showToast(`기존 기록 ${migrated}개를 클라우드로 옮겼어요`);
}

  authBusy(true); authError("가입 중…");
  const { data, error } = await sb.auth.signUp({

/* ============================================================

function genId(){

}
function escapeHtml(s){
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}
function todayISO(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function parseDate(iso){
  // iso = "YYYY-MM-DD" -> Date at local midnight
  const [y,m,d] = iso.split("-").map(Number);
  return new Date(y, m-1, d);
}
function daysBetween(a, b){
  const MS = 24*60*60*1000;
  const aa = new Date(a.getFullYear(), a.getMonth(), a.getDate()).getTime();
  const bb = new Date(b.getFullYear(), b.getMonth(), b.getDate()).getTime();
  return Math.round((aa - bb) / MS);
}
const WEEKDAYS = ["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
function formatDateLine(iso){
  const d = parseDate(iso);
  const today = new Date();
  const diff = daysBetween(d, today);
  const wd = WEEKDAYS[d.getDay()];
  let accent = "";
  if (diff === 0) accent = "오늘";
  else if (diff === -1) accent = "어제";
  const full = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 · ${wd}`;
  return { accent, full };
}
function formatMonth(ym){
  const [y, m] = ym.split("-").map(Number);
  return `${y}년 ${m}월`;
}

/* ============================================================
   Flexible date parsing (본문에 입력한 날짜 자동 인식)
   - "26.06.01", "2026-6-1", "2026/06/01", "6월 1일",
     "2026년 6월 1일", "6/1", "오늘/어제/내일/모레/그제" 등 인식
   - 본문 첫 줄 앞쪽에서 날짜 토큰을 찾음. 못 찾으면 null.
   ============================================================ */
function buildISO(y, mo, d){
  y = Number(y); mo = Number(mo); d = Number(d);
  if (y < 100) y += 2000;            // 26 -> 2026
  if (!(mo >= 1 && mo <= 12) || !(d >= 1 && d <= 31)) return null;
  const dt = new Date(y, mo - 1, d);
  if (dt.getFullYear() !== y || dt.getMonth() !== mo - 1 || dt.getDate() !== d) {
    return null;                     // 2/30 같은 잘못된 날짜 차단
  }
  return todayISOFrom(dt);
}
function todayISOFrom(d){
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function parseFlexibleDate(input){
  if (!input) return null;
  // 첫 줄만 보고, 앞쪽의 글머리표(* - • · 공백) 제거
  let s = String(input).split(/\r?\n/)[0].trim().replace(/^[\*\-•·.\s]+/, "");
  if (!s) return null;
  const now = new Date();

  // 상대 날짜 키워드
  const rel = { "그제": -2, "그저께": -2, "엊그제": -2, "어제": -1, "오늘": 0, "금일": 0, "내일": 1, "낼": 1, "모레": 2, "글피": 3 };
  for (const k in rel){
    if (s.startsWith(k)){
      const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() + rel[k]);
      return todayISOFrom(d);
    }
  }

  let m;
  // YYYY년 M월 D일 / YY년 M월 D일
  m = s.match(/^(\d{2,4})\s*년\s*(\d{1,2})\s*월\s*(\d{1,2})\s*일?/);
  if (m) return buildISO(m[1], m[2], m[3]);
  // M월 D일 (올해)
  m = s.match(/^(\d{1,2})\s*월\s*(\d{1,2})\s*일?/);
  if (m) return buildISO(now.getFullYear(), m[1], m[2]);
  // YYYY.MM.DD / YY.MM.DD ( . - / 또는 공백 구분 )
  m = s.match(/^(\d{2,4})\s*[.\-\/]\s*(\d{1,2})\s*[.\-\/]\s*(\d{1,2})/);
  if (m) return buildISO(m[1], m[2], m[3]);
  // MM/DD (올해) — 구분자 하나, 뒤에 또 다른 숫자 구분자가 없어야 함
  m = s.match(/^(\d{1,2})\s*[.\-\/]\s*(\d{1,2})(?!\s*[.\-\/]\s*\d)/);
  if (m){
    const mm = Number(m[1]), dd = Number(m[2]);
    if (mm >= 1 && mm <= 12 && dd >= 1 && dd <= 31) return buildISO(now.getFullYear(), mm, dd);
  }
  return null;
}

/* ============================================================
   Image compression
   ============================================================ */
function compressImage(file){
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith("image/")) {
      reject(new Error("이미지 파일만 가능합니다."));
      return;
    }
    const reader = new FileReader();
    reader.onerror = () => reject(reader.error || new Error("파일 읽기 실패"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("이미지 디코드 실패"));
      img.onload = () => {
        const { naturalWidth: w, naturalHeight: h } = img;
        let tw = w, th = h;
        const longest = Math.max(w, h);
        if (longest > MAX_IMG_EDGE) {
          const ratio = MAX_IMG_EDGE / longest;
          tw = Math.round(w * ratio);
          th = Math.round(h * ratio);
        }
        const canvas = document.createElement("canvas");
        canvas.width = tw; canvas.height = th;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, tw, th);
        try {
          const dataUrl = canvas.toDataURL("image/jpeg", JPEG_QUALITY);
          resolve(dataUrl);
        } catch (e) { reject(e); }
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ============================================================
   Persistence
   ============================================================ */
const TRASH_TTL_MS = 30 * 24 * 60 * 60 * 1000; // 휴지통 보관 30일
const OFFLINE_CACHE_KEY = "worklog:offline-cache";

function readOfflineCache(){
  try {
    const raw = localStorage.getItem(OFFLINE_CACHE_KEY);
    const arr = raw ? JSON.parse(raw) : null;
    return Array.isArray(arr) ? arr : null;
  } catch(_){ return null; }
}

async function loadAll(){
  try {
    const keys = await storage.list(KEY_PREFIX);
    const all = [];
    for (const k of keys){
      try {
        const raw = await storage.get(k);
        if (!raw) continue;
        const obj = typeof raw === "string" ? JSON.parse(raw) : raw;
        if (obj && obj.id && obj.date) all.push(obj);
      } catch(e){ /* skip corrupted */ }
    }
    await purgeExpiredTrash(all);            // 30일 지난 휴지통 영구삭제
    const active = all.filter(e => !e.deletedAt);
    const trash  = all.filter(e => e.deletedAt);
    active.sort(sortEntries);
    trash.sort((a, b) => (b.deletedAt || 0) - (a.deletedAt || 0));
    state.entries = active;
    state.trash = trash;
    try { await ensureSignedUrls(state.entries); } catch(_){ /* 오프라인 시 사진 URL 생략 */ }
    // 오프라인 대비 캐시 (본문 기준; 이미지는 온라인에서만 표시)
    try { localStorage.setItem(OFFLINE_CACHE_KEY, JSON.stringify(active)); } catch(_){}
  } catch (err) {
    // 네트워크 실패(오프라인 등) → 마지막으로 본 기록 표시
    if (isCloud()){
      const cached = readOfflineCache();
      if (cached){
        state.entries = cached;
        state.trash = [];
        showToast("오프라인: 마지막으로 본 기록을 표시해요");
        return;
      }
    }
    throw err;
  }
}
function sortEntries(a, b){
  if (a.date !== b.date) return a.date < b.date ? 1 : -1;
  return (b.createdAt || 0) - (a.createdAt || 0);
}
async function saveEntry(entry){
  await storage.set(KEY_PREFIX + entry.id, JSON.stringify(entry));
}
// 영구 삭제 (행 + Storage 이미지 제거)
async function deleteEntry(id){
  await storage.delete(KEY_PREFIX + id);
}

/* ── 휴지통 ─────────────────────────────────────────────────── */
// 삭제 → 휴지통으로 이동(소프트 삭제)
async function trashEntry(id){
  const e = state.entries.find(x => x.id === id);
  if (!e) return;
  e.deletedAt = Date.now();
  await saveEntry(e);
  state.entries = state.entries.filter(x => x.id !== id);
  state.trash.unshift(e);
}
// 휴지통에서 복원
async function restoreEntry(id){
  const e = state.trash.find(x => x.id === id);
  if (!e) return;
  e.deletedAt = null;
  await saveEntry(e);
  state.trash = state.trash.filter(x => x.id !== id);
  state.entries.push(e);
  state.entries.sort(sortEntries);
  await ensureSignedUrls([e]);   // 복원된 기록의 사진 서명 URL 갱신
}
// 완전 삭제(되돌릴 수 없음)
async function purgeEntry(id){
  await deleteEntry(id);
  state.trash = state.trash.filter(x => x.id !== id);
}
// 휴지통 비우기
async function emptyTrash(){
  for (const id of state.trash.map(e => e.id)){
    try { await deleteEntry(id); } catch(err){ console.error(err); }
  }
  state.trash = [];
}
// 30일 지난 항목 자동 영구삭제 (로드 시 호출, all 배열에서도 제거)
async function purgeExpiredTrash(all){
  const now = Date.now();
  const expired = all.filter(e => e.deletedAt && (now - e.deletedAt) > TRASH_TTL_MS);
  for (const e of expired){
    try { await deleteEntry(e.id); } catch(err){ console.error(err); }
    const i = all.indexOf(e);
    if (i >= 0) all.splice(i, 1);
  }
}

/* ============================================================
   Rendering
   ============================================================ */
const $entries = document.getElementById("entries");
const $months = document.getElementById("months");
const $stats = document.getElementById("stats");

function filteredEntries(){
  const q = state.search.trim().toLowerCase();
  return state.entries.filter(e => {
    if (state.monthFilter && !e.date.startsWith(state.monthFilter)) return false;
    if (q && !(e.text || "").toLowerCase().includes(q)) return false;
    return true;
  });
}

function render(){
  renderStats();
  renderMonths();
  renderEntries();
}

function renderStats(){
  const total = state.entries.length;
  const days = new Set(state.entries.map(e => e.date)).size;
  const photos = state.entries.reduce((acc, e) => acc + (e.images?.length || 0), 0);
  if (total === 0){
    $stats.innerHTML = `아직 기록이 없습니다`;
  } else {
    $stats.innerHTML =
      `총 <b>${total}</b>건` +
      `<span class="sep">·</span>` +
      `<b>${days}</b>일 기록` +
      `<span class="sep">·</span>` +
      `사진 <b>${photos}</b>장`;
  }
}

function renderMonths(){
  const set = new Set();
  for (const e of state.entries) set.add(e.date.slice(0,7));
  const months = Array.from(set).sort().reverse();
  const parts = [];
  parts.push(
    `<button class="pill" data-month="" aria-pressed="${state.monthFilter === null}">전체</button>`
  );
  for (const ym of months){
    const pressed = state.monthFilter === ym;
    parts.push(
      `<button class="pill" data-month="${ym}" aria-pressed="${pressed}">${escapeHtml(formatMonth(ym))}</button>`
    );
  }
  $months.innerHTML = parts.join("");
  $months.style.display = months.length === 0 ? "none" : "";
}

function renderEntries(){
  const list = filteredEntries();
  if (list.length === 0){
    const isEmpty = state.entries.length === 0;
    const isFilter = !!(state.search || state.monthFilter);
    $entries.innerHTML = `
      <div class="empty">
        <div class="e-title">${isFilter ? "검색 결과가 없어요" : "오늘의 첫 기록"}</div>
        <div class="e-sub">${
          isFilter
            ? "다른 키워드나 월을 선택해보세요"
            : "오른쪽 위 “새 기록”에서 시작해보세요"
        }</div>
      </div>`;
    return;
  }
  const q = state.search.trim();
  // 월이 바뀔 때마다 구분선을 끼워 스캔하기 쉽게
  let html = "";
  let lastMonth = null;
  for (const e of list){
    const ym = e.date.slice(0, 7);
    if (ym !== lastMonth){
      html += `<div class="month-divider">${escapeHtml(formatMonth(ym))}</div>`;
      lastMonth = ym;
    }
    html += renderEntry(e, q);
  }
  $entries.innerHTML = html;
  enhanceClamps();
}

// 읽기 우선 카드 — 본문을 그 자리에서 바로 읽음(길면 "계속 읽기")
function renderEntry(e, query){
  const dl = formatDateLine(e.date);
  const dateHtml = `${dl.accent ? `<span class="accent">${dl.accent}</span>` : ""}${escapeHtml(dl.full)}`;
  const imgs = e.images || [];

  let photos = "";
  if (imgs.length){
    const cls = imgs.length > 1 ? "multi" : "single";
    photos = `<div class="entry-photos ${cls}">` +
      imgs.map((src, i) => `<img src="${escapeHtml(imgSrc(src))}" alt="첨부 사진 ${i + 1}" data-idx="${i}" data-id="${escapeHtml(e.id)}">`).join("") +
      `</div>`;
  }

  let textBlock = "";
  if (e.text && e.text.trim()){
    textBlock = `<div class="entry-text is-clamped" data-id="${escapeHtml(e.id)}">${highlightText(e.text, query)}</div>` +
      `<button class="more-btn" type="button" data-more="${escapeHtml(e.id)}" hidden>계속 읽기</button>`;
  }

  return `
    <article class="entry" data-id="${escapeHtml(e.id)}">
      <div class="entry-head">
        <div class="entry-date">${dateHtml}</div>
        <div class="entry-actions">
          <button class="entry-edit" type="button" data-edit="${escapeHtml(e.id)}" aria-label="기록 수정">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path></svg>
          </button>
          <button class="entry-trash" type="button" data-trash="${escapeHtml(e.id)}" aria-label="휴지통으로 이동">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path></svg>
          </button>
        </div>
      </div>
      ${textBlock}
      ${photos}
    </article>`;
}

// 본문이 잘렸을 때만 "계속 읽기" 버튼을 노출
function enhanceClamps(){
  $entries.querySelectorAll(".entry-text.is-clamped").forEach(el => {
    const more = el.nextElementSibling;
    if (!more || !more.classList.contains("more-btn")) return;
    if (el.scrollHeight - el.clientHeight > 8){
      more.hidden = false;
    } else {
      el.classList.remove("is-clamped");
      more.hidden = true;
    }
  });
}

function highlightText(text, query){
  const safe = escapeHtml(text);
  if (!query) return safe;
  const q = escapeHtml(query);
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return safe.replace(new RegExp(escaped, "gi"), m => `<mark>${m}</mark>`);
}

/* ============================================================
   Editor modal
   ============================================================ */
const $editorScrim = document.getElementById("editorScrim");
const $editorTitle = document.getElementById("editorTitle");
const $dateText = document.getElementById("dateText");
const $datePick = document.getElementById("datePick");
const $dateHint = document.getElementById("dateHint");
const $textInput = document.getElementById("textInput");
// 본문에서 자동 인식한 날짜를 기억해, 같은 값으로는 다시 덮어쓰지 않음
let lastAutoDate = null;

function hideDateHint(){
  $dateHint.hidden = true;
  $dateHint.className = "date-hint";
  $dateHint.textContent = "";
}
// 날짜 입력칸을 즉시 인식해 힌트 표시 + 달력 동기화
function recognizeDateField(){
  const raw = $dateText.value.trim();
  if (!raw){ hideDateHint(); return null; }
  const iso = parseFlexibleDate(raw);
  if (iso){
    const dl = formatDateLine(iso);
    $dateHint.className = "date-hint";
    $dateHint.innerHTML = `<span class="dot"></span>인식됨 → <b>${escapeHtml(dl.full)}</b>`;
    $datePick.value = iso;            // 달력도 같은 날짜로 맞춰둠
  } else {
    $dateHint.className = "date-hint warn";
    $dateHint.innerHTML = `<span class="dot"></span>날짜를 인식하지 못했어요`;
  }
  $dateHint.hidden = false;
  return iso;
}
// 본문 입력 시 첫 줄에서 날짜를 인식해 날짜 칸에 자동 반영
function autoDetectDateFromText(){
  const iso = parseFlexibleDate($textInput.value);
  if (iso && iso !== lastAutoDate){
    $dateText.value = iso;
    lastAutoDate = iso;
    recognizeDateField();
  }
}
const $dropzone = document.getElementById("dropzone");
const $fileInput = document.getElementById("fileInput");
const $thumbs = document.getElementById("thumbs");
const $deleteBtn = document.getElementById("deleteBtn");

function openEditor(entry){
  state.editing = entry || null;
  state.draftImages = entry ? [...(entry.images || [])] : [];
  $editorTitle.textContent = entry ? "기록 수정" : "새 기록";
  const iso = entry ? entry.date : todayISO();
  $dateText.value = iso;
  $datePick.value = iso;
  $textInput.value = entry ? (entry.text || "") : "";
  lastAutoDate = iso;
  recognizeDateField();
  $deleteBtn.hidden = !entry;
  renderThumbs();
  $editorScrim.dataset.open = "true";
  $editorScrim.setAttribute("aria-hidden", "false");
  document.body.classList.add("modal-open");
  setTimeout(() => $textInput.focus(), 50);
}
function closeEditor(){
  $editorScrim.dataset.open = "false";
  $editorScrim.setAttribute("aria-hidden", "true");
  document.body.classList.remove("modal-open");
  state.editing = null;
  state.draftImages = [];
}
function renderThumbs(){
  $thumbs.innerHTML = state.draftImages.map((src, i) => `
    <div class="thumb">
      <img src="${imgSrc(src)}" alt="첨부 사진 ${i+1}">
      <button class="x" type="button" data-rm="${i}" aria-label="사진 ${i+1} 삭제">✕</button>
    </div>
  `).join("");
}

async function addFiles(files){
  const arr = Array.from(files || []).filter(f => f.type.startsWith("image/"));
  if (arr.length === 0) return;
  for (const f of arr){
    try {
      const dataUrl = await compressImage(f);
      state.draftImages.push(dataUrl);
    } catch (e){
      showToast("일부 사진을 추가하지 못했어요");
    }
  }
  renderThumbs();
}

$dropzone.addEventListener("click", () => $fileInput.click());
$dropzone.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") { e.preventDefault(); $fileInput.click(); }
});
$dropzone.addEventListener("dragover", (e) => { e.preventDefault(); $dropzone.classList.add("dragover"); });
$dropzone.addEventListener("dragleave", () => $dropzone.classList.remove("dragover"));
$dropzone.addEventListener("drop", (e) => {
  e.preventDefault();
  $dropzone.classList.remove("dragover");
  if (e.dataTransfer?.files) addFiles(e.dataTransfer.files);
});
$fileInput.addEventListener("change", (e) => {
  addFiles(e.target.files);
  e.target.value = "";
});
$thumbs.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-rm]");
  if (!btn) return;
  const idx = Number(btn.dataset.rm);
  state.draftImages.splice(idx, 1);
  renderThumbs();
});

// 날짜 입력칸 타이핑 → 즉시 인식
$dateText.addEventListener("input", recognizeDateField);
// 달력에서 고르면 텍스트 칸에 반영 후 인식
$datePick.addEventListener("change", () => {
  if ($datePick.value){
    $dateText.value = $datePick.value;
    lastAutoDate = $datePick.value;
    recognizeDateField();
  }
});
// 본문 입력 → 날짜 자동 인식 (첫 줄에 날짜를 적으면 날짜칸 자동 반영)
$textInput.addEventListener("input", autoDetectDateFromText);

document.getElementById("cancelBtn").addEventListener("click", closeEditor);
document.getElementById("saveBtn").addEventListener("click", saveFromEditor);

async function saveFromEditor(){
  const date = parseFlexibleDate($dateText.value);
  const text = $textInput.value.trim();
  const images = state.draftImages.slice();

  if (!date){
    showToast("날짜를 인식하지 못했어요 (예: 26.06.01, 6월 1일, 오늘)");
    recognizeDateField();
    $dateText.focus();
    return;
  }
  if (!text && images.length === 0){
    showToast("본문 또는 사진 중 하나는 필요해요");
    $textInput.focus();
    return;
  }

  const now = Date.now();
  const id = state.editing ? state.editing.id : genId();
  let storedImages = images;
  try {
    storedImages = await prepareImagesForSave(id, images);
  } catch (err){
    console.error(err);
    showToast("사진 업로드에 실패했어요");
    return;
  }
  let entry;
  if (state.editing){
    entry = {
      ...state.editing,
      date, text, images: storedImages,
      updatedAt: now,
    };
  } else {
    entry = {
      id,
      date, text, images: storedImages,
      createdAt: now,
      updatedAt: now,
    };
  }

  try {
    await saveEntry(entry);
  } catch (err){
    console.error(err);
    showToast("저장 실패: 용량 초과 가능성이 있어요");
    return;
  }

  const i = state.entries.findIndex(e => e.id === entry.id);
  if (i >= 0) state.entries[i] = entry;
  else state.entries.push(entry);
  state.entries.sort(sortEntries);
  await ensureSignedUrls([entry]);

  closeEditor();
  render();
}

$deleteBtn.addEventListener("click", () => {
  if (!state.editing) return;
  const id = state.editing.id;
  openConfirm({
    title: "기록 삭제",
    message: "이 기록을 휴지통으로 옮길까요? <b>30일</b> 안에 복원할 수 있어요.",
    okText: "삭제",
    danger: true,
    onOk: async () => {
      try {
        await trashEntry(id);
        closeEditor();
        render();
        showToast("휴지통으로 옮겼어요");
      } catch (err){
        console.error(err);
        showToast("삭제에 실패했어요");
      }
    },
  });
});

const $lbClose = document.getElementById("lbClose");
const $lbPrev = document.getElementById("lbPrev");
const $lbNext = document.getElementById("lbNext");

let lbImages = [];
let lbIndex = 0;

function renderLightbox(){
  $lbImg.src = lbImages[lbIndex] || "";
  const multi = lbImages.length > 1;
  $lbPrev.hidden = !multi;
  $lbNext.hidden = !multi;
  $lbCount.hidden = !multi;

// images: 단일 문자열 또는 배열 모두 허용
function openLightbox(images, index){

  renderLightbox();

}
function lbStep(delta){

  lbIndex = (lbIndex + delta + lbImages.length) % lbImages.length;
  renderLightbox();
}
function closeLightbox(){
  $lightbox.dataset.open = "false";
  $lightbox.setAttribute("aria-hidden", "true");
  $lbImg.src = "";

function trashDaysLeft(deletedAt){
  return Math.max(0, Math.ceil((TRASH_TTL_MS - (Date.now() - deletedAt)) / (24*60*60*1000)));
}
function renderTrash(){

function exportBackup(){
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    entries: state.entries,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `worklog-${todayISO()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("백업 파일을 내려받았어요");
}

document.getElementById("importFile").addEventListener("change", async (e) => {
  const file = e.target.files?.[0];
  e.target.value = "";
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data || !Array.isArray(data.entries)) throw new Error("invalid");

    const count = data.entries.length;
    openConfirm({
      title: "백업 가져오기",
      message: `<b>${count}</b>건의 기록을 가져올까요? 기존 기록과 병합됩니다.`,
      okText: "가져오기",
      onOk: async () => {
        const existing = new Set(state.entries.map(x => x.id));
        let added = 0;
        for (const raw of data.entries){
          if (!raw || !raw.date) continue;
          let entry = {
            id: raw.id || genId(),
            date: raw.date,
            text: raw.text || "",
            images: Array.isArray(raw.images) ? raw.images : [],
            createdAt: typeof raw.createdAt === "number" ? raw.createdAt : Date.now(),
            updatedAt: typeof raw.updatedAt === "number" ? raw.updatedAt : Date.now(),
          };
          while (existing.has(entry.id)) entry.id = genId();
          existing.add(entry.id);
          try {
            await saveEntry(entry);
            state.entries.push(entry);
            added++;
          } catch(err){ /* skip on storage error */ }
        }
        state.entries.sort(sortEntries);
        render();
        showToast(`${added}건을 가져왔어요`);
      },
    });
  } catch(err){
    showToast("파일을 읽을 수 없어요");
  }
});

/* ============================================================
   AI 요약 — claude.ai 아티팩트면 모델 직접 호출, 아니면 복사 폴백
   ============================================================ */
const $summaryScrim = document.getElementById("summaryScrim");
const $summaryBody = document.getElementById("summaryBody");
const $summaryClose = document.getElementById("summaryClose");
const $summaryCopy = document.getElementById("summaryCopy");
let summaryText = "";

function openSummary(){
  $summaryScrim.dataset.open = "true";
  $summaryScrim.setAttribute("aria-hidden", "false");
  document.body.classList.add("modal-open");
}
function closeSummary(){
  $summaryScrim.dataset.open = "false";
  $summaryScrim.setAttribute("aria-hidden", "true");
  if ($editorScrim.dataset.open !== "true" && $confirmScrim.dataset.open !== "true"){
    document.body.classList.remove("modal-open");
  }
}

function buildSummaryPrompt(entries){
  const body = entries
    .slice()
    .sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0))
    .map(e => {
      const imgs = (e.images && e.images.length) ? ` (사진 ${e.images.length}장)` : "";
      return `■ ${e.date}${imgs}\n${(e.text || "").trim()}`;
    })
    .join("\n\n");
  return (
    `다음은 나의 작업 일지 기록이야. 한국어로 간결하게 요약해줘.\n` +
    `- 주요하게 한 일과 성과를 불릿으로 정리\n` +
    `- 반복되는 주제나 패턴이 있으면 짚어주기\n` +
    `- 마지막에 한 줄 총평\n\n` +
    `[기록 ${entries.length}건]\n${body}`
  );
}

async function copyText(t){
  try {
    if (navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(t);
      return true;
    }
  } catch(e){ /* ignore */ }
  return false;
}

async function runSummary(){
  setMenu(false);
  const entries = filteredEntries();
  if (!entries.length){ showToast("요약할 기록이 없어요"); return; }
  const scope = state.monthFilter ? formatMonth(state.monthFilter) : "전체 기록";
  const prompt = buildSummaryPrompt(entries);
  summaryText = prompt;

  openSummary();
  $summaryCopy.hidden = true;
  $summaryBody.innerHTML =
    `<div class="summary-loading"><span class="spinner"></span>요약 중… (${escapeHtml(scope)} · ${entries.length}건)</div>`;

  // claude.ai 아티팩트 안: 모델을 그 자리에서 호출
  if (window.claude && typeof window.claude.complete === "function"){
    try {
      const out = await window.claude.complete(prompt);
      summaryText = String(out || "").trim() || "(요약 결과가 비어 있어요)";
      $summaryBody.textContent = summaryText;
      $summaryCopy.hidden = false;
      return;
    } catch(err){
      console.error(err);
      // 실패 시 복사 폴백으로 진행
    }
  }

  // 폴백: 요약용 내용을 복사 → Claude 대화창에 붙여넣기
  summaryText = prompt;
  const copied = await copyText(prompt);
  $summaryBody.innerHTML =
    `<div class="summary-note">이 화면에서는 자동 요약을 바로 쓸 수 없어요(claude.ai 아티팩트에서만 즉시 요약). ` +
    `${copied ? "<b>아래 내용이 복사됐어요.</b>" : "아래 내용을 복사해서"} <b>Claude 대화창에 붙여넣고 보내면</b> 요약해 줍니다.</div>` +
    `<div class="summary-pre">${escapeHtml(prompt)}</div>`;
  $summaryCopy.hidden = false;
  if (copied) showToast("Claude에 붙여넣을 내용을 복사했어요");
}

$summaryClose.addEventListener("click", closeSummary);
$summaryScrim.addEventListener("click", (e) => { if (e.target === $summaryScrim) closeSummary(); });
$summaryCopy.addEventListener("click", async () => {
  const ok = await copyText(summaryText);

});

/* ============================================================
   Theme toggle (라이트/다크 수동 전환, 선택값 저장)
   ============================================================ */
const $themeBtn = document.getElementById("themeBtn");
const THEME_KEY = "worklog:theme";
const ICON_SUN = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path></svg>`;
const ICON_MOON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"></path></svg>`;

function systemDark(){
  return !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
}
function currentThemeAttr(){
  return document.documentElement.getAttribute("data-theme") || "auto";
}
function effectiveDark(){
  const t = currentThemeAttr();
  return t === "dark" || (t === "auto" && systemDark());
}
function updateThemeIcon(){
  // 현재 다크면 해(→라이트로), 라이트면 달(→다크로)
  $themeBtn.innerHTML = effectiveDark() ? ICON_SUN : ICON_MOON;
}
function toggleTheme(){
  const next = effectiveDark() ? "light" : "dark";
  try { localStorage.setItem(THEME_KEY, next); } catch(e){}
  document.documentElement.setAttribute("data-theme", next);
  updateThemeIcon();
}
$themeBtn.addEventListener("click", toggleTheme);
// auto(시스템 추종) 상태일 때 시스템 설정이 바뀌면 아이콘 갱신
if (window.matchMedia){
  const mq = window.matchMedia("(prefers-color-scheme: dark)");
  const onChange = () => { if (currentThemeAttr() === "auto") updateThemeIcon(); };
  if (mq.addEventListener) mq.addEventListener("change", onChange);
  else if (mq.addListener) mq.addListener(onChange);
}
updateThemeIcon();

/* ============================================================
   화면 잠금 (PIN · 생체인증) — 로컬 기기 잠금
   - Supabase 세션은 유지하되, 앱을 열 때 PIN/생체로 화면 잠금 해제
   - 데이터 접근 권한이 아니라 '화면 가림(개인정보 보호)' 용도
   ============================================================ */
const PIN_KEY = "worklog:pin";        // {salt, hash, len}
const BIO_KEY = "worklog:biometric";  // {credentialId}

function getPin(){ try { return JSON.parse(localStorage.getItem(PIN_KEY) || "null"); } catch(_){ return null; } }
function getBio(){ try { return JSON.parse(localStorage.getItem(BIO_KEY) || "null"); } catch(_){ return null; } }
function lockEnabled(){ return !!(getPin() || getBio()); }

function randHex(n){ return [...crypto.getRandomValues(new Uint8Array(n))].map(b=>b.toString(16).padStart(2,"0")).join(""); }
async function hashPin(pin, salt){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(salt + ":" + pin));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}
function bufToB64(buf){ const a = new Uint8Array(buf); let s=""; for (const x of a) s += String.fromCharCode(x); return btoa(s); }
function b64ToBuf(b64){ const s = atob(b64); const a = new Uint8Array(s.length); for (let i=0;i<s.length;i++) a[i]=s.charCodeAt(i); return a.buffer; }

let pendingUser = null; // 잠금 해제 후 진입할 사용자
let pinBuffer = "";

const $lockScrim  = document.getElementById("lockScrim");
const $lockSub    = document.getElementById("lockSub");
const $lockDots   = document.getElementById("lockDots");
const $lockPad    = document.getElementById("lockPad");
const $lockMsg    = document.getElementById("lockMsg");
const $lockBioBtn = document.getElementById("lockBioBtn");

function lockMsg(m, err){ if (!$lockMsg) return; $lockMsg.textContent = m || ""; $lockMsg.className = "lock-msg" + (err ? " err" : ""); }
function renderLockDots(len){
  let html = "";
  for (let i=0;i<len;i++) html += `<span class="dot ${i<pinBuffer.length?"on":""}"></span>`;
  $lockDots.innerHTML = html;
}
function renderLockPad(){
  const keys = ["1","2","3","4","5","6","7","8","9", getBio()?"bio":"", "0", "del"];
  $lockPad.innerHTML = keys.map(k=>{
    if (k === "")   return `<span class="pad-key empty"></span>`;
    if (k === "del")return `<button type="button" class="pad-key" data-k="del" aria-label="지우기">⌫</button>`;
    if (k === "bio")return `<button type="button" class="pad-key bio" data-k="bio" aria-label="생체인증">☝</button>`;
    return `<button type="button" class="pad-key" data-k="${k}">${k}</button>`;
  }).join("");
}
function showLock(user){
  pendingUser = user;
  pinBuffer = "";
  const pin = getPin();
  const len = pin ? (pin.len || 4) : 4;
  $lockPad.style.display  = pin ? "" : "none";
  $lockDots.style.display = pin ? "" : "none";
  renderLockPad();
  renderLockDots(len);
  $lockBioBtn.style.display = getBio() ? "" : "none";
  $lockSub.textContent = pin && getBio() ? "PIN 또는 생체인증으로 잠금을 해제하세요."
    : pin ? "PIN을 입력해 잠금을 해제하세요." : "생체인증으로 잠금을 해제하세요.";
  lockMsg("");
  $lockScrim.dataset.open = "true";
  $lockScrim.setAttribute("aria-hidden", "false");
  document.body.classList.add("modal-open");
}
function hideLock(){
  $lockScrim.dataset.open = "false";
  $lockScrim.setAttribute("aria-hidden", "true");
  document.body.classList.remove("modal-open");
}
async function unlockSuccess(){
  hideLock();
  const u = pendingUser; pendingUser = null;
  await startApp(u);
}
async function tryPin(){
  const pin = getPin();
  if (!pin) return;
  const h = await hashPin(pinBuffer, pin.salt);
  if (h === pin.hash){ await unlockSuccess(); }
  else {
    pinBuffer = "";
    renderLockDots(pin.len || 4);
    lockMsg("PIN이 일치하지 않아요", true);
    if (navigator.vibrate) navigator.vibrate(120);
  }
}
if ($lockPad) $lockPad.addEventListener("click", async (e) => {
  const btn = e.target.closest("[data-k]");
  if (!btn) return;
  const k = btn.dataset.k;
  const pin = getPin();
  const len = pin ? (pin.len || 4) : 4;
  if (k === "del"){ pinBuffer = pinBuffer.slice(0, -1); renderLockDots(len); return; }
  if (k === "bio"){ doBioUnlock(); return; }
  if (pinBuffer.length >= len) return;
  pinBuffer += k;
  renderLockDots(len);
  lockMsg("");
  if (pinBuffer.length === len) await tryPin();
});
async function doBioUnlock(){
  try {
    lockMsg("생체인증 확인 중…");
    const ok = await unlockBiometric();
    if (ok) await unlockSuccess();
    else lockMsg("생체인증에 실패했어요", true);
  } catch(err){
    console.warn(err);
    lockMsg("생체인증을 사용할 수 없어요. PIN으로 해제하세요.", true);
  }
}
if ($lockBioBtn) $lockBioBtn.addEventListener("click", doBioUnlock);
const $lockLogoutBtn = document.getElementById("lockLogoutBtn");
if ($lockLogoutBtn) $lockLogoutBtn.addEventListener("click", async () => {
  try { if (sb) await sb.auth.signOut(); } catch(_){}
  location.reload();
});

/* 생체인증 (WebAuthn) */
async function biometricSupported(){
  if (!window.PublicKeyCredential) return false;
  try { return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable(); }
  catch(_){ return false; }
}
async function enableBiometric(){
  const challenge = crypto.getRandomValues(new Uint8Array(32));
  const userId = crypto.getRandomValues(new Uint8Array(16));
  const cred = await navigator.credentials.create({
    publicKey: {
      challenge,
      rp: { name: "L'Heure Bleue" },
      user: { id: userId, name: (currentUser && currentUser.email) || "worklog", displayName: "작업일지" },
      pubKeyCredParams: [{ type:"public-key", alg:-7 }, { type:"public-key", alg:-257 }],
      authenticatorSelection: { authenticatorAttachment:"platform", userVerification:"required" },
      timeout: 60000, attestation: "none",
    },
  });
  if (!cred) throw new Error("등록 취소됨");
  localStorage.setItem(BIO_KEY, JSON.stringify({ credentialId: bufToB64(cred.rawId) }));
}
async function unlockBiometric(){
  const meta = getBio();
  if (!meta) throw new Error("등록된 생체인증이 없어요");
  const challenge = crypto.getRandomValues(new Uint8Array(32));
  const assertion = await navigator.credentials.get({
    publicKey: {
      challenge,
      allowCredentials: [{ type:"public-key", id: b64ToBuf(meta.credentialId) }],
      userVerification: "required",
      timeout: 60000,
    },
  });
  return !!assertion;
}

/* 잠금 설정 모달 */
const $lockSetScrim  = document.getElementById("lockSettingsScrim");
const $pinStatus     = document.getElementById("pinStatus");
const $bioStatus     = document.getElementById("bioStatus");
const $pinSetWrap    = document.getElementById("pinSetWrap");
const $pinInput1     = document.getElementById("pinInput1");
const $pinInput2     = document.getElementById("pinInput2");
const $pinSaveBtn    = document.getElementById("pinSaveBtn");
const $pinToggleBtn  = document.getElementById("pinToggleBtn");
const $bioToggleBtn  = document.getElementById("bioToggleBtn");
const $lockSetMsg    = document.getElementById("lockSetMsg");
const $lockNowBtn    = document.getElementById("lockNowBtn");

function lockSetMsg(m, err){ if (!$lockSetMsg) return; $lockSetMsg.textContent = m || ""; $lockSetMsg.className = "lock-msg" + (err ? " err" : ""); }
function refreshLockSettings(){
  const hasPin = !!getPin(), hasBio = !!getBio();
  $pinStatus.textContent = hasPin ? "설정됨" : "사용 안 함";
  $pinToggleBtn.textContent = hasPin ? "PIN 해제" : "PIN 설정";
  $bioStatus.textContent = hasBio ? "사용 중" : "사용 안 함";
  $bioToggleBtn.textContent = hasBio ? "생체인증 해제" : "생체인증 사용";
  $pinSetWrap.style.display = "none";
  $pinInput1.value = ""; $pinInput2.value = "";
  lockSetMsg("");
  biometricSupported().then(ok => {
    if (!ok && !hasBio){ $bioToggleBtn.disabled = true; $bioStatus.textContent = "이 기기 미지원"; }
    else $bioToggleBtn.disabled = false;
  });
}
function openLockSettings(){ refreshLockSettings(); $lockSetScrim.dataset.open = "true"; $lockSetScrim.setAttribute("aria-hidden","false"); document.body.classList.add("modal-open"); }
function closeLockSettings(){ $lockSetScrim.dataset.open = "false"; $lockSetScrim.setAttribute("aria-hidden","true"); document.body.classList.remove("modal-open"); }

document.getElementById("lockSettingsBtn").addEventListener("click", () => { setMenu(false); openLockSettings(); });
document.getElementById("lockSettingsClose").addEventListener("click", closeLockSettings);
$lockSetScrim.addEventListener("click", (e) => { if (e.target === $lockSetScrim) closeLockSettings(); });

$pinToggleBtn.addEventListener("click", () => {
  if (getPin()){
    openConfirm({ title:"PIN 해제", message:"PIN 잠금을 해제할까요?", okText:"해제", danger:true,
      onOk: () => { localStorage.removeItem(PIN_KEY); refreshLockSettings(); showToast("PIN을 해제했어요"); } });
  } else {
    $pinSetWrap.style.display = ""; lockSetMsg(""); $pinInput1.focus();
  }
});
$pinSaveBtn.addEventListener("click", async () => {
  const p1 = $pinInput1.value.trim(), p2 = $pinInput2.value.trim();
  if (!/^\d{4,6}$/.test(p1)){ lockSetMsg("PIN은 숫자 4~6자리예요", true); return; }
  if (p1 !== p2){ lockSetMsg("PIN이 일치하지 않아요", true); return; }
  const salt = randHex(8);
  const hash = await hashPin(p1, salt);
  localStorage.setItem(PIN_KEY, JSON.stringify({ salt, hash, len: p1.length }));
  refreshLockSettings(); showToast("PIN을 설정했어요");
});
$bioToggleBtn.addEventListener("click", async () => {
  if (getBio()){
    openConfirm({ title:"생체인증 해제", message:"생체인증 잠금을 해제할까요?", okText:"해제", danger:true,
      onOk: () => { localStorage.removeItem(BIO_KEY); refreshLockSettings(); showToast("생체인증을 해제했어요"); } });
  } else {
    try {
      lockSetMsg("생체인증 등록 중…");
      await enableBiometric();
      refreshLockSettings(); showToast("생체인증을 등록했어요");
    } catch(err){ console.warn(err); lockSetMsg("생체인증 등록에 실패했어요", true); }
  }
});
$lockNowBtn.addEventListener("click", () => {
  if (!lockEnabled()){ lockSetMsg("먼저 PIN이나 생체인증을 설정하세요", true); return; }
  closeLockSettings();
  showLock(currentUser);
});

/* ============================================================
   Boot
   ============================================================ */
(async function init(){
  if (sb){
    // 인증 상태 변화 감지 (로그아웃·비밀번호 재설정)
    // 저장 영구화 요청 → 자동 로그인 정보(세션)가 지워지지 않도록 (특히 iOS/설치형 PWA)
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist().catch(() => {});
    }
    sb.auth.onAuthStateChange((event) => {
      if (event === "SIGNED_OUT") location.reload();
      else if (event === "PASSWORD_RECOVERY"){ showLogin(); setAuthMode("recovery"); }
    });
    // 비밀번호 재설정 메일 링크로 들어온 경우 → 새 비밀번호 설정 화면
    if (INITIAL_HASH.includes("type=recovery")){
      showLogin();
      setAuthMode("recovery");
      render();
      return;
    }
    try {
      const { data } = await sb.auth.getSession();
      if (data && data.session && data.session.user){
        if (lockEnabled()){
          render();                 // 데이터는 잠금 해제 후 로드 (화면은 잠금이 가림)
          showLock(data.session.user);
        } else {
          await startApp(data.session.user);
        }
      } else {
        showLogin();
        render();
      }
    } catch(e){
      console.error(e);
      showLogin();
      render();
    }
    return;
  }
  // Supabase SDK 로드 실패 → 기존 로컬(localStorage) 모드로 동작
  try {
    await loadAll();
  } catch(e){
    console.error(e);
    showToast("저장된 기록을 불러오지 못했어요");
  }
  render();
})();
</script>

  /* PWA 서비스 워커 등록 (오프라인 실행 + 홈 화면 설치) */
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW 등록 실패", e));
    });
  }
</script>
