    if (ym !== lastMonth){
      html += `<div class="month-divider">${escapeHtml(formatMonth(ym))}</div>`;
      lastMonth = ym;
    }
    html += renderEntry(e, q);
  }
  $entries.innerHTML = html;
  enhanceClamps();
}

// 읽기 우선 카드 — 본문을 그 자리에서 바로 읽음(길면 "계속 읽기")
function renderEntry(e, query){
  const dl = formatDateLine(e.date);
  const dateHtml = `${dl.accent ? `<span class="accent">${dl.accent}</span>` : ""}${escapeHtml(dl.full)}`;
  const imgs = e.images || [];

  let photos = "";
  if (imgs.length){
    const cls = imgs.length > 1 ? "multi" : "single";
    photos = `<div class="entry-photos ${cls}">` +
      imgs.map((src, i) => `<img src="${escapeHtml(imgSrc(src))}" alt="첨부 사진 ${i + 1}" data-idx="${i}" data-id="${escapeHtml(e.id)}">`).join("") +
      `</div>`;
  }

  let textBlock = "";
  if (e.text && e.text.trim()){
    textBlock = `<div class="entry-text is-clamped" data-id="${escapeHtml(e.id)}">${renderBody(e.text, query)}</div>` +
      `<button class="more-btn" type="button" data-more="${escapeHtml(e.id)}" hidden>계속 읽기</button>`;
  }

  const tags = extractTags(e.text);
  let tagBlock = "";
  if (tags.length){
    tagBlock = `<div class="entry-tags">` +
      tags.map(t => `<button class="tag" type="button" data-tag="${escapeHtml(t)}">#${escapeHtml(t)}</button>`).join("") +
      `</div>`;
  }

  const len = textLen(e.text);
  const metaHtml = len ? `<span class="entry-chars">${fmtNum(len)}자</span>` : "";
  const catBadge = e.category ? `<button class="cat-badge" type="button" data-catfilter="${escapeHtml(e.category)}" style="--c:${catColor(e.category)}" title="‘${escapeHtml(e.category)}’ 분류만 보기">${escapeHtml(e.category)}</button>` : "";
  return `
    <article class="entry ${e.pinnedAt ? "is-pinned" : ""}" data-id="${escapeHtml(e.id)}">
      <div class="entry-head">
        <div class="entry-date">${dateHtml}${catBadge}${metaHtml}</div>
        <div class="entry-actions">
          <button class="entry-pin ${e.pinnedAt ? "pinned" : ""}" type="button" data-pin="${escapeHtml(e.id)}" aria-label="즐겨찾기" title="즐겨찾기">${e.pinnedAt ? "★" : "☆"}</button>
          <button class="entry-edit" type="button" data-edit="${escapeHtml(e.id)}" aria-label="기록 수정">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path></svg>
          </button>
          <button class="entry-trash" type="button" data-trash="${escapeHtml(e.id)}" aria-label="휴지통으로 이동">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path></svg>
          </button>
        </div>
      </div>
      ${textBlock}
      ${photos}
      ${tagBlock}
    </article>`;
}

// 본문이 잘렸을 때만 "계속 읽기" 버튼을 노출
function enhanceClamps(){
  $entries.querySelectorAll(".entry-text.is-clamped").forEach(el => {
    const more = el.nextElementSibling;
    if (!more || !more.classList.contains("more-btn")) return;
    if (el.scrollHeight - el.clientHeight > 8){
      more.hidden = false;
    } else {
      el.classList.remove("is-clamped");
      more.hidden = true;
    }
  });
}

/* 한 줄의 인라인 마크다운(이미 escape 된 텍스트 위에서): 코드/굵게/기울임/[[링크]]/#태그 */
function renderInlineMd(s){
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  s = s.replace(/\[\[([^\[\]\n]+)\]\]/g, (m, n) => {
    const name = n.trim();
    return `<a class="wikilink" data-link="${name}">${name}</a>`;
  });
  s = s.replace(/(^|[\s(])#([0-9A-Za-z_\-가-힣ㄱ-ㆎ]+)/g, '$1<span class="hash">#$2</span>');
  return s;
}
/* HTML 태그(<...>) 바깥의 텍스트에만 검색어 하이라이트 적용 (마크업·XSS 안전) */
function highlightSegments(html, terms){
  const list = (terms || []).filter(Boolean);
  if (!list.length) return html;
  const re = new RegExp(list.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|"), "gi");
  return html.split(/(<[^>]*>)/).map(p =>
    p.charAt(0) === "<" ? p : p.replace(re, m => `<mark>${m}</mark>`)
  ).join("");
}
/* 본문 렌더: 블록(제목/목록/인용) + 인라인 마크다운 + 검색 하이라이트 */
function renderBody(text, query){
  const hlTerms = query ? parseSearch(query).inc.map(t => escapeHtml(t)) : [];
  const lines = escapeHtml(text).split("\n");
  const html = lines.map(line => {
    let m, cls = "", inner = line;
    if ((m = line.match(/^(#{1,3})\s+(.*)$/))){ cls = "md-h md-h" + m[1].length; inner = m[2]; }
    else if ((m = line.match(/^\s*[-*]\s+(.*)$/))){ cls = "md-li"; inner = m[1]; }
    else if ((m = line.match(/^\s*&gt;\s?(.*)$/))){ cls = "md-q"; inner = m[1]; }
    inner = renderInlineMd(inner);
    return cls ? `<span class="${cls}">${inner}</span>` : inner;
  }).join("\n");
  return highlightSegments(html, hlTerms);
}

const $editorScrim = document.getElementById("editorScrim");

// 본문에서 자동 인식한 날짜를 기억해, 같은 값으로는 다시 덮어쓰지 않음
let lastAutoDate = null;

/* ── 에디터 분류 칩 ──────────────────────────────────────── */
function renderCatRow(){
  if (!$catRow) return;
  const cats = getCategories();
  const sel = state.draftCategory || "";
  const manage = state.catManage;
  let html = "";
  // 미분류
  html += `<button type="button" class="cat-chip ${sel === "" ? "on" : ""}" data-cat="">미분류</button>`;
  for (const c of cats){
    const on = sel === c.name;
    html += `<button type="button" class="cat-chip ${on ? "on" : ""}" data-cat="${escapeHtml(c.name)}" style="--c:${c.color}">` +
      `<span class="cat-dot" style="background:${c.color}"></span>${escapeHtml(c.name)}` +
      (manage ? `<span class="cat-x" data-catdel="${escapeHtml(c.name)}" role="button" aria-label="${escapeHtml(c.name)} 삭제">✕</span>` : ``) +
      `</button>`;
  }
  if (!manage){
    html += `<button type="button" class="cat-chip cat-add" id="catAddChip">＋ 새 분류</button>`;
  }
  $catManageBtn.textContent = manage ? "완료" : "관리";
  $catRow.innerHTML = html;
}

$catManageBtn && $catManageBtn.addEventListener("click", () => {
  state.catManage = !state.catManage;
  renderCatRow();
});
$catRow && $catRow.addEventListener("click", (e) => {
  const del = e.target.closest("[data-catdel]");
  if (del){
    e.stopPropagation();
    const name = del.dataset.catdel;
    const used = state.entries.filter(x => (x.category || "") === name).length;
    const proceed = () => { removeCategory(name); if (state.draftCategory === name) state.draftCategory = ""; renderCatRow(); render(); };
    if (used > 0){
      openConfirm({
        title: "분류 삭제",
        message: `<b>${escapeHtml(name)}</b> 분류를 삭제할까요? 이 분류로 지정된 <b>${used}개</b> 기록은 ‘미분류’가 돼요.`,
        okText: "삭제", danger: true, onOk: proceed,
      });
    } else { proceed(); }
    return;
  }
  const add = e.target.closest("#catAddChip");
  if (add){ startAddCategory(); return; }
  const chip = e.target.closest("[data-cat]");
  if (chip){ state.draftCategory = chip.dataset.cat; renderCatRow(); return; }
});

function startAddCategory(){
  const chip = document.getElementById("catAddChip");
  if (!chip) return;
  const wrap = document.createElement("span");
  wrap.className = "cat-addbox";
  wrap.innerHTML = `<input type="text" class="cat-input" maxlength="16" placeholder="분류 이름" />`;
  chip.replaceWith(wrap);
  const input = wrap.querySelector("input");
  let done = false;
  const finish = (save) => {
    if (done) return; done = true;
    if (save){ const name = input.value.trim(); if (name){ addCategory(name); state.draftCategory = name; } }
    renderCatRow();
  };
  input.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter"){ ev.preventDefault(); finish(true); }
    else if (ev.key === "Escape"){ ev.preventDefault(); finish(false); }
  });
  input.addEventListener("blur", () => finish(true));
  setTimeout(() => input.focus(), 20);
}

function hideDateHint(){
  $dateHint.hidden = true;
  $dateHint.className = "date-hint";
  $dateHint.textContent = "";
}
// 날짜 입력칸을 즉시 인식해 힌트 표시 + 달력 동기화
function recognizeDateField(){
  const raw = $dateText.value.trim();
  if (!raw){ hideDateHint(); return null; }
  const iso = parseFlexibleDate(raw);
  if (iso){
    const dl = formatDateLine(iso);
    $dateHint.className = "date-hint";
    $dateHint.innerHTML = `<span class="dot"></span>인식됨 → <b>${escapeHtml(dl.full)}</b>`;
    $datePick.value = iso;            // 달력도 같은 날짜로 맞춰둠
  } else {
    $dateHint.className = "date-hint warn";
    $dateHint.innerHTML = `<span class="dot"></span>날짜를 인식하지 못했어요`;
  }
  $dateHint.hidden = false;
  return iso;
}
// 본문 입력 시 첫 줄에서 날짜를 인식해 날짜 칸에 자동 반영
function autoDetectDateFromText(){
  const iso = parseFlexibleDate($textInput.value);
  if (iso && iso !== lastAutoDate){
    $dateText.value = iso;
    lastAutoDate = iso;
    recognizeDateField();
  }
}
const $dropzone = document.getElementById("dropzone");
const $fileInput = document.getElementById("fileInput");
const $thumbs = document.getElementById("thumbs");
const $deleteBtn = document.getElementById("deleteBtn");

function openEditor(entry, opts){
  state.editing = entry || null;
  state.draftImages = entry ? [...(entry.images || [])] : [];
  state.draftCategory = entry ? (entry.category || "") : "";
  state.catManage = false;
  renderCatRow();
  $editorTitle.textContent = entry ? "기록 수정" : "새 기록";
  const iso = entry ? entry.date : todayISO();
  $dateText.value = iso;
  $datePick.value = iso;
  $textInput.value = entry ? (entry.text || "") : ((opts && opts.prefill) || "");
  updateCharCounter();
  lastAutoDate = iso;
  recognizeDateField();
  $deleteBtn.hidden = !entry;
  renderThumbs();
  $editorScrim.dataset.open = "true";
  $editorScrim.setAttribute("aria-hidden", "false");
  document.body.classList.add("modal-open");
  setTimeout(() => $textInput.focus(), 50);
}
function closeEditor(){
  $editorScrim.dataset.open = "false";
  $editorScrim.setAttribute("aria-hidden", "true");
  document.body.classList.remove("modal-open");
  state.editing = null;
  state.draftImages = [];
}
function renderThumbs(){
  $thumbs.innerHTML = state.draftImages.map((src, i) => `
    <div class="thumb">
      <img src="${imgSrc(src)}" alt="첨부 사진 ${i+1}">
      <button class="x" type="button" data-rm="${i}" aria-label="사진 ${i+1} 삭제">✕</button>
    </div>
  `).join("");
}

async function addFiles(files){
  const arr = Array.from(files || []).filter(f => f.type.startsWith("image/"));
  if (arr.length === 0) return;
  for (const f of arr){
    try {
      const dataUrl = await compressImage(f);
      state.draftImages.push(dataUrl);
    } catch (e){
      showToast("일부 사진을 추가하지 못했어요");
    }
  }
  renderThumbs();
}

$dropzone.addEventListener("click", () => $fileInput.click());
$dropzone.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") { e.preventDefault(); $fileInput.click(); }
});
$dropzone.addEventListener("dragover", (e) => { e.preventDefault(); $dropzone.classList.add("dragover"); });
$dropzone.addEventListener("dragleave", () => $dropzone.classList.remove("dragover"));
$dropzone.addEventListener("drop", (e) => {
  e.preventDefault();
  $dropzone.classList.remove("dragover");
  if (e.dataTransfer?.files) addFiles(e.dataTransfer.files);
});
$fileInput.addEventListener("change", (e) => {
  addFiles(e.target.files);

});
$thumbs.addEventListener("click", (e) => {

const $charCounter = document.getElementById("charCounter");
function updateCharCounter(){
  if (!$charCounter) return;
  const total = ($textInput.value || "").length;
  const noSpace = textLen($textInput.value);
  $charCounter.textContent = `${fmtNum(noSpace)}자 (공백포함 ${fmtNum(total)})`;
}
$textInput.addEventListener("input", updateCharCounter);

document.getElementById("cancelBtn").addEventListener("click", closeEditor);
document.getElementById("saveBtn").addEventListener("click", saveFromEditor);

async function saveFromEditor(){
  const date = parseFlexibleDate($dateText.value);
  const text = $textInput.value.trim();
  const images = state.draftImages.slice();

  if (!date){
    showToast("날짜를 인식하지 못했어요 (예: 26.06.01, 6월 1일, 오늘)");
    recognizeDateField();
    $dateText.focus();
    return;
  }
  if (!text && images.length === 0){
    showToast("본문 또는 사진 중 하나는 필요해요");
    $textInput.focus();
    return;
  }

  const now = Date.now();
  const id = state.editing ? state.editing.id : genId();
  let storedImages = images;
  try {
    storedImages = await prepareImagesForSave(id, images);
  } catch (err){
    console.error(err);
    if (isOfflineError(err)){
      storedImages = images;   // 오프라인: dataURL 그대로 저장 → 연결되면 자동 업로드
    } else {
      showToast("사진 업로드에 실패했어요");
      return;
    }
  }
  let entry;
  if (state.editing){
    entry = {
      ...state.editing,
      date, text, images: storedImages,
      category: state.draftCategory || "",
      updatedAt: now,
    };
  } else {
    entry = {
      id,
      date, text, images: storedImages,
      category: state.draftCategory || "",
      createdAt: now,
      updatedAt: now,
    };
  }

  try {
    await saveEntry(entry);
  } catch (err){
    console.error(err);
    showToast("저장 실패: 용량 초과 가능성이 있어요");
    return;
  }

  const i = state.entries.findIndex(e => e.id === entry.id);
  if (i >= 0) state.entries[i] = entry;
  else state.entries.push(entry);
  state.entries.sort(sortEntries);
  try { await ensureSignedUrls([entry]); } catch(_){ /* 오프라인 시 서명 URL 생략 */ }

  closeEditor();
  render();
  if (pendingSyncCount() > 0) showToast("오프라인 — 저장됨, 연결되면 자동 동기화돼요");
}

$deleteBtn.addEventListener("click", () => {
  if (!state.editing) return;
  const id = state.editing.id;
  openConfirm({
    title: "기록 삭제",
    message: "이 기록을 휴지통으로 옮길까요? <b>30일</b> 안에 복원할 수 있어요.",
    okText: "삭제",
    danger: true,
    onOk: async () => {
      try {
        await trashEntry(id);
        closeEditor();
        render();
        showToast("휴지통으로 옮겼어요");
      } catch (err){
        console.error(err);
        showToast("삭제에 실패했어요");
      }
    },
  });
});

   Lightbox
   ============================================================ */
const $lightbox = document.getElementById("lightbox");
const $lbImg = document.getElementById("lbImg");
const $lbClose = document.getElementById("lbClose");
const $lbPrev = document.getElementById("lbPrev");
const $lbNext = document.getElementById("lbNext");
const $lbCount = document.getElementById("lbCount");
let lbImages = [];
let lbIndex = 0;

function renderLightbox(){
  $lbImg.src = lbImages[lbIndex] || "";
  const multi = lbImages.length > 1;
  $lbPrev.hidden = !multi;
  $lbNext.hidden = !multi;
  $lbCount.hidden = !multi;
  if (multi) $lbCount.textContent = `${lbIndex + 1} / ${lbImages.length}`;
}
// images: 단일 문자열 또는 배열 모두 허용
function openLightbox(images, index){
  lbImages = Array.isArray(images) ? images.slice() : [images];
  lbIndex = Math.max(0, Math.min(index || 0, lbImages.length - 1));
  renderLightbox();
  $lightbox.dataset.open = "true";
  $lightbox.setAttribute("aria-hidden", "false");
  document.body.classList.add("modal-open");
}
function lbStep(delta){
  if (lbImages.length < 2) return;
  lbIndex = (lbIndex + delta + lbImages.length) % lbImages.length;
  renderLightbox();
}
function closeLightbox(){
  $lightbox.dataset.open = "false";
  $lightbox.setAttribute("aria-hidden", "true");
  $lbImg.src = "";
  lbImages = [];
  if ($editorScrim.dataset.open !== "true"
      && $confirmScrim.dataset.open !== "true"){
    document.body.classList.remove("modal-open");
  }
}
$lbClose.addEventListener("click", closeLightbox);
$lbPrev.addEventListener("click", (e) => { e.stopPropagation(); lbStep(-1); });
$lbNext.addEventListener("click", (e) => { e.stopPropagation(); lbStep(1); });
$lightbox.addEventListener("click", (e) => {
  if (e.target === $lightbox) closeLightbox();
});
// 모바일 스와이프로 사진 넘기기
let lbTouchX = null;
$lightbox.addEventListener("touchstart", (e) => {
  lbTouchX = e.changedTouches[0].clientX;
}, { passive: true });
$lightbox.addEventListener("touchend", (e) => {
  if (lbTouchX === null) return;
  const dx = e.changedTouches[0].clientX - lbTouchX;
  if (Math.abs(dx) > 45) lbStep(dx < 0 ? 1 : -1);
  lbTouchX = null;
});

const $menu = document.getElementById("menu");
function setMenu(open){
  $menu.dataset.open = open ? "true" : "false";
  $menuBtn.setAttribute("aria-expanded", open ? "true" : "false");
  document.body.classList.toggle("menu-open", open);
}
$menuBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  setMenu($menu.dataset.open !== "true");
});
document.addEventListener("click", (e) => {
  if (!$menu.contains(e.target) && e.target !== $menuBtn) setMenu(false);
});

/* ── 휴지통 모달 ───────────────────────────────────────────── */
const $trashScrim = document.getElementById("trashScrim");
const $trashList  = document.getElementById("trashList");
const $trashEmptyBtn = document.getElementById("trashEmptyBtn");

function trashDaysLeft(deletedAt){
  return Math.max(0, Math.ceil((TRASH_TTL_MS - (Date.now() - deletedAt)) / (24*60*60*1000)));
}
function renderTrash(){
  const list = state.trash || [];
  if ($trashEmptyBtn) $trashEmptyBtn.disabled = !list.length;
  if (!list.length){
    $trashList.innerHTML = `<p class="summary-note" style="text-align:center; padding:28px 0;">휴지통이 비어 있어요</p>`;
    return;
  }
  $trashList.innerHTML = list.map(e => {
    const dl = formatDateLine(e.date);
    const txt = (e.text || "").trim().replace(/\s+/g, " ");
    const preview = txt ? txt.slice(0, 60) : ((e.images && e.images.length) ? `사진 ${e.images.length}장` : "(내용 없음)");
    return `<div class="trash-item">
        <div class="trash-info">
          <div class="t-date">${escapeHtml(dl.full)}</div>
          <div class="t-preview">${escapeHtml(preview)}</div>
          <div class="t-left">${trashDaysLeft(e.deletedAt)}일 후 완전 삭제</div>
        </div>
        <div class="trash-actions">
          <button class="btn ghost" type="button" data-restore="${escapeHtml(e.id)}">복원</button>
          <button class="btn danger" type="button" data-purge="${escapeHtml(e.id)}">삭제</button>
        </div>
      </div>`;
  }).join("");
}
function openTrash(){
  renderTrash();
  $trashScrim.dataset.open = "true";
  $trashScrim.setAttribute("aria-hidden", "false");
  document.body.classList.add("modal-open");
}
function closeTrash(){
  $trashScrim.dataset.open = "false";
  $trashScrim.setAttribute("aria-hidden", "true");
  document.body.classList.remove("modal-open");
}
document.getElementById("trashBtn").addEventListener("click", () => { setMenu(false); openTrash(); });
document.getElementById("trashClose").addEventListener("click", closeTrash);
$trashScrim.addEventListener("click", (e) => { if (e.target === $trashScrim) closeTrash(); });
$trashList.addEventListener("click", async (e) => {
  const r = e.target.closest("[data-restore]");
  const p = e.target.closest("[data-purge]");
  if (r){
    try { await restoreEntry(r.dataset.restore); } catch(err){ console.error(err); showToast("복원에 실패했어요"); return; }
    renderTrash(); render(); showToast("복원했어요");
  } else if (p){
    const id = p.dataset.purge;
    openConfirm({
      title: "삭제", message: "이 기록을 완전히 삭제할까요? <b>되돌릴 수 없어요.</b>",
      okText: "삭제", danger: true,
      onOk: async () => {
        try { await purgeEntry(id); } catch(err){ console.error(err); showToast("삭제에 실패했어요"); return; }
        renderTrash(); render();
      },
    });
  }
});
$trashEmptyBtn.addEventListener("click", () => {

    title: "휴지통 비우기", message: `휴지통의 <b>${state.trash.length}개</b> 기록을 완전히 삭제할까요? 되돌릴 수 없어요.`,

      renderTrash(); render(); showToast("휴지통을 비웠어요");
    },
  });
});

function exportBackup(){
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    entries: state.entries,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `worklog-${todayISO()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("백업 파일을 내려받았어요");
}

document.getElementById("importFile").addEventListener("change", async (e) => {
  const file = e.target.files?.[0];
  e.target.value = "";
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data || !Array.isArray(data.entries)) throw new Error("invalid");

    const count = data.entries.length;
    openConfirm({
      title: "백업 가져오기",
      message: `<b>${count}</b>건의 기록을 가져올까요? 기존 기록과 병합됩니다.`,
      okText: "가져오기",
      onOk: async () => {
        const existing = new Set(state.entries.map(x => x.id));
        let added = 0;
        for (const raw of data.entries){
          if (!raw || !raw.date) continue;
          let entry = {
            id: raw.id || genId(),
            date: raw.date,
            text: raw.text || "",
            images: Array.isArray(raw.images) ? raw.images : [],
            createdAt: typeof raw.createdAt === "number" ? raw.createdAt : Date.now(),
            updatedAt: typeof raw.updatedAt === "number" ? raw.updatedAt : Date.now(),
          };
          while (existing.has(entry.id)) entry.id = genId();
          existing.add(entry.id);
          try {
            await saveEntry(entry);
            state.entries.push(entry);
            added++;
          } catch(err){ /* skip on storage error */ }
        }
        state.entries.sort(sortEntries);
        render();
        showToast(`${added}건을 가져왔어요`);
      },
    });
  } catch(err){
    showToast("파일을 읽을 수 없어요");
  }
});

/* ============================================================
   Event delegation: cards
   ============================================================ */
$entries.addEventListener("click", (e) => {
  // 0a) 캘린더 이전/다음 달
  const calNav = e.target.closest("[data-cal]");
  if (calNav){
    const base = state.calMonth || todayISO().slice(0, 7);
    state.calMonth = shiftMonth(base, Number(calNav.dataset.cal));
    renderCalendar();
    return;
  }
  // 0b) 캘린더 날짜 클릭 → 그 날 기록 목록 먼저 보여주기
  const calDay = e.target.closest("[data-calday]");
  if (calDay){
    openDayList(calDay.dataset.calday);
    return;
  }
  // 0) 사진 갤러리 셀 → 라이트박스
  const cell = e.target.closest(".photo-cell");
  if (cell){
    const entry = state.entries.find(x => x.id === cell.dataset.pid);
    const idx = Number(cell.dataset.idx || 0);
    if (entry && entry.images && entry.images[idx]) openLightbox(entry.images.map(imgSrc), idx);
    return;
  }
  // 0c) 즐겨찾기(핀) 토글
  const pinBtn = e.target.closest("[data-pin]");
  if (pinBtn){
    const entry = state.entries.find(x => x.id === pinBtn.dataset.pin);
    if (entry){
      entry.pinnedAt = entry.pinnedAt ? null : Date.now();
      entry.updatedAt = Date.now();
      saveEntry(entry).catch(err => { console.error(err); showToast("저장에 실패했어요"); });
      updateSyncIndicator();
      render();
    }
    return;
  }
  // 1) 수정 버튼
  const editBtn = e.target.closest("[data-edit]");
  if (editBtn){
    const entry = state.entries.find(x => x.id === editBtn.dataset.edit);
    if (entry) openEditor(entry);
    return;
  }
  // 1-2) 휴지통으로 보내기 버튼
  const trashBtn = e.target.closest("[data-trash]");
  if (trashBtn){
    const id = trashBtn.dataset.trash;
    openConfirm({
      title: "기록 삭제",
      message: "이 기록을 휴지통으로 옮길까요? <b>30일</b> 안에 복원할 수 있어요.",
      okText: "삭제",
      danger: true,
      onOk: async () => {
        try { await trashEntry(id); } catch(err){ console.error(err); showToast("삭제에 실패했어요"); return; }
        render();
        showToast("휴지통으로 옮겼어요");
      },
    });
    return;
  }
  // 2) "계속 읽기 / 접기" 토글
  const moreBtn = e.target.closest("[data-more]");
  if (moreBtn){
    const el = $entries.querySelector(`.entry-text[data-id="${CSS.escape(moreBtn.dataset.more)}"]`);
    if (el){
      const expanded = el.classList.contains("is-expanded");
      if (expanded){
        el.classList.remove("is-expanded");
        el.classList.add("is-clamped");
        moreBtn.textContent = "계속 읽기";
      } else {
        el.classList.add("is-expanded");
        el.classList.remove("is-clamped");
        moreBtn.textContent = "접기";
      }
    }
    return;
  }
  // 2-2) 태그 칩 클릭 → 해당 태그로 필터(다시 누르면 해제)
  const tagBtn = e.target.closest(".entry-tags [data-tag]");
  if (tagBtn){
    const t = tagBtn.dataset.tag;
    state.tagFilter = (state.tagFilter === t) ? null : t;
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
    return;
  }
  // 2-3) [[위키링크]] 클릭 → 해당 링크를 언급한 기록만 보기(백링크)
  const linkEl = e.target.closest(".wikilink[data-link]");
  if (linkEl){
    state.linkFilter = linkEl.dataset.link;
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
    return;
  }
  // 2-3b) 분류 뱃지 클릭 → 그 분류만 보기
  const catB = e.target.closest("[data-catfilter]");
  if (catB){
    state.view = "timeline"; clearFilters(); state.catFilter = catB.dataset.catfilter;
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
    return;
  }
  // 2-4) 필터 배너의 해제(✕) — 날짜·즐겨찾기·링크·분류 모두
  if (e.target.closest(".filter-clear")){
    state.linkFilter = null; state.dayFilter = null; state.favFilter = false; state.catFilter = null;
    render();
    return;
  }
  // 3) 사진 확대 (라이트박스, 좌우 넘기기)
  const img = e.target.closest(".entry-photos img");
  if (img){
    const id = img.dataset.id;
    const idx = Number(img.dataset.idx || 0);
    const entry = state.entries.find(x => x.id === id);
    if (entry && entry.images && entry.images[idx]) openLightbox(entry.images.map(imgSrc), idx);
  }
});

/* ============================================================
   프로젝트 + 할일(체크리스트) 관리
   ============================================================ */
const $projectsScrim = document.getElementById("projectsScrim");
const $projectsBody = document.getElementById("projectsBody");
let projectsEditingId = null;   // 이름·목표 편집 중인 프로젝트
let projectsFocusTodo = null;   // 렌더 후 할일 입력칸 포커스 줄 프로젝트

function statusInfo(s){
  return ({ active:{label:"진행중",cls:"st-active"}, paused:{label:"보류",cls:"st-paused"}, done:{label:"완료",cls:"st-done"} })[s]
      || { label:"진행중", cls:"st-active" };
}
function nextStatus(s){ return s === "active" ? "paused" : s === "paused" ? "done" : "active"; }

function openProjects(){
  setMenu(false);
  projectsEditingId = null;
  $projectsScrim.dataset.open = "true";
  $projectsScrim.setAttribute("aria-hidden", "false");
  document.body.classList.add("modal-open");
  renderProjects();
}
function closeProjects(){
  $projectsScrim.dataset.open = "false";
  $projectsScrim.setAttribute("aria-hidden", "true");
  projectsEditingId = null;
  if ($editorScrim.dataset.open !== "true") document.body.classList.remove("modal-open");
}
async function saveProjectSafe(p){
  try { await saveProject(p); } catch(err){ console.error(err); showToast("저장에 실패했어요"); }
  updateSyncIndicator();
}

function renderProjects(){
  const list = state.projects;
  if (!list.length){
    $projectsBody.innerHTML = `<div class="proj-empty">아직 프로젝트가 없어요.<br><span>“+ 새 프로젝트”로 목표와 할 일을 정리해보세요.</span></div>`;
    return;
  }
  $projectsBody.innerHTML = list.map(p => {
    const si = statusInfo(p.status);
    const todos = Array.isArray(p.todos) ? p.todos : [];
    const doneN = todos.filter(t => t.done).length;
    const prog = projectProgress(p);
    if (projectsEditingId === p.id){
      return `<div class="proj-card editing" data-pid="${escapeHtml(p.id)}">
        <div class="proj-edit">
          <input class="proj-name-input" data-field="name" value="${escapeHtml(p.name)}" placeholder="프로젝트 이름" />
          <textarea class="proj-goal-input" data-field="goal" placeholder="목표를 한 줄로 (예: 6월 안에 앱 출시)">${escapeHtml(p.goal)}</textarea>
          <div class="proj-edit-actions">
            <button class="btn ghost" type="button" data-cancelproject>취소</button>
            <button class="btn" type="button" data-saveproject="${escapeHtml(p.id)}">저장</button>
          </div>
        </div>
      </div>`;
    }
    const todoList = todos.map((t, i) => `
      <div class="todo-row ${t.done ? "is-done" : ""}">
        <button class="todo-check" type="button" data-toggletodo="${escapeHtml(p.id)}" data-idx="${i}" aria-label="완료 토글">${t.done ? "☑" : "☐"}</button>
        <span class="todo-text">${escapeHtml(t.text)}</span>
        <button class="todo-del" type="button" data-deltodo="${escapeHtml(p.id)}" data-idx="${i}" aria-label="할일 삭제">✕</button>
      </div>`).join("");
    return `<div class="proj-card" data-pid="${escapeHtml(p.id)}">
      <div class="proj-card-head">
        <div class="proj-titles">
          <div class="proj-name">${escapeHtml(p.name || "(이름 없음)")}
            <button class="proj-status ${si.cls}" type="button" data-status="${escapeHtml(p.id)}" title="상태 변경">${si.label}</button>
          </div>
          ${p.goal ? `<div class="proj-goal">🎯 ${escapeHtml(p.goal)}</div>` : ""}
        </div>
        <div class="proj-card-actions">
          <button class="proj-mini" type="button" data-editproject="${escapeHtml(p.id)}" aria-label="편집">✏️</button>
          <button class="proj-mini" type="button" data-delproject="${escapeHtml(p.id)}" aria-label="삭제">🗑</button>
        </div>
      </div>
      <div class="proj-progress">
        <div class="proj-bar"><span style="width:${prog}%"></span></div>
        <div class="proj-prog-num">${doneN}/${todos.length} · ${prog}%</div>
      </div>
      <div class="todo-list">
        ${todoList}
        <form class="todo-add" data-addtodo="${escapeHtml(p.id)}"><input type="text" placeholder="+ 할 일 추가" autocomplete="off" /></form>
      </div>
    </div>`;
  }).join("");

  if (projectsFocusTodo){
    const el = $projectsBody.querySelector(`.proj-card[data-pid="${CSS.escape(projectsFocusTodo)}"] .todo-add input`);
    if (el) el.focus();
    projectsFocusTodo = null;
  }
  if (projectsEditingId){
    const el = $projectsBody.querySelector(`.proj-card[data-pid="${CSS.escape(projectsEditingId)}"] .proj-name-input`);
    if (el){ el.focus(); el.select(); }
  }
}

function newProject(){
  const now = Date.now();
  const p = { id: genId(), name: "새 프로젝트", goal: "", status: "active", todos: [], createdAt: now, updatedAt: now, archivedAt: null };
  projectsEditingId = p.id;
  saveProjectSafe(p);           // state.projects 에 즉시 반영(내부에서 push+sort)
  renderProjects();
}

document.getElementById("projectsBtn").addEventListener("click", openProjects);
document.getElementById("projectNewBtn").addEventListener("click", newProject);
document.getElementById("projectsClose").addEventListener("click", closeProjects);
$projectsScrim.addEventListener("click", (e) => { if (e.target === $projectsScrim) closeProjects(); });

$projectsBody.addEventListener("click", async (e) => {
  const status = e.target.closest("[data-status]");
  if (status){
    const p = state.projects.find(x => x.id === status.dataset.status);
    if (p){ p.status = nextStatus(p.status); p.archivedAt = p.status === "done" ? Date.now() : null; await saveProjectSafe(p); renderProjects(); }
    return;
  }
  const ed = e.target.closest("[data-editproject]");
  if (ed){ projectsEditingId = ed.dataset.editproject; renderProjects(); return; }
  if (e.target.closest("[data-cancelproject]")){ projectsEditingId = null; renderProjects(); return; }
  const sv = e.target.closest("[data-saveproject]");
  if (sv){
    const card = sv.closest(".proj-card");
    const p = state.projects.find(x => x.id === sv.dataset.saveproject);
    if (p && card){
      p.name = (card.querySelector('[data-field="name"]').value || "").trim() || "(이름 없음)";
      p.goal = (card.querySelector('[data-field="goal"]').value || "").trim();
      projectsEditingId = null;
      await saveProjectSafe(p); renderProjects();
    }
    return;
  }
  const del = e.target.closest("[data-delproject]");
  if (del){
    const id = del.dataset.delproject;
    openConfirm({ title:"프로젝트 삭제", message:"이 프로젝트와 할 일을 모두 삭제할까요?", okText:"삭제", danger:true,
      onOk: async () => { try { await removeProject(id); } catch(err){ console.error(err); showToast("삭제에 실패했어요"); return; } projectsEditingId=null; renderProjects(); showToast("삭제했어요"); } });
    return;
  }
  const tg = e.target.closest("[data-toggletodo]");
  if (tg){
    const p = state.projects.find(x => x.id === tg.dataset.toggletodo);
    const i = Number(tg.dataset.idx);
    if (p && p.todos[i]){ p.todos[i].done = !p.todos[i].done; p.todos[i].doneAt = p.todos[i].done ? Date.now() : null; await saveProjectSafe(p); renderProjects(); }
    return;
  }
  const td = e.target.closest("[data-deltodo]");
  if (td){
    const p = state.projects.find(x => x.id === td.dataset.deltodo);
    const i = Number(td.dataset.idx);
    if (p && p.todos[i]){ p.todos.splice(i, 1); await saveProjectSafe(p); renderProjects(); }
    return;
  }
});
$projectsBody.addEventListener("submit", async (e) => {
  const form = e.target.closest("[data-addtodo]");
  if (!form) return;
  e.preventDefault();
  const p = state.projects.find(x => x.id === form.dataset.addtodo);
  const inp = form.querySelector("input");
  const text = (inp.value || "").trim();
  if (!p || !text) return;
  p.todos.push({ id: genId(), text, done: false, createdAt: Date.now(), doneAt: null });
  projectsFocusTodo = p.id;
  await saveProjectSafe(p); renderProjects();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape"){
    if ($lightbox.dataset.open === "true") { closeLightbox(); return; }
    if ($jarvisScrim.dataset.open === "true") { closeJarvis(); return; }
    if ($projectsScrim.dataset.open === "true") { closeProjects(); return; }
    if ($confirmScrim.dataset.open === "true") { closeConfirm(); return; }
    if ($summaryScrim.dataset.open === "true") { closeSummary(); return; }
    if ($dayScrim.dataset.open === "true") { closeDayList(); return; }
    if ($editorScrim.dataset.open === "true") { closeEditor(); return; }
    if ($menu.dataset.open === "true") { setMenu(false); return; }
    if ($sidebar.dataset.open === "true") { closeSidebar(); return; }
  }
  if ($lightbox.dataset.open === "true"){
    if (e.key === "ArrowLeft") { e.preventDefault(); lbStep(-1); return; }
    if (e.key === "ArrowRight") { e.preventDefault(); lbStep(1); return; }
  }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "n"){
    e.preventDefault();
    if ($editorScrim.dataset.open !== "true") openEditor(null);
  }
});
[$editorScrim, $confirmScrim].forEach(scrim => {
  scrim.addEventListener("click", (e) => {
    if (e.target === scrim){
      if (scrim === $editorScrim) closeEditor();
      else closeConfirm();
    }
  });
});

/* ============================================================

const $dayScrim = document.getElementById("dayScrim");
const $dayBody = document.getElementById("dayBody");
const $dayTitle = document.getElementById("dayTitle");
const $dayClose = document.getElementById("dayClose");
const $dayAllBtn = document.getElementById("dayAllBtn");
let dayListIso = null;

function openDayList(iso){
  const list = state.entries.filter(e => e.date === iso).slice().sort(sortEntries);
  if (!list.length) return;
  // 기록이 1건뿐이면 목록 없이 바로 열기
  if (list.length === 1){ openEditor(list[0]); return; }
  dayListIso = iso;
  let dateLabel = iso;
  try { dateLabel = formatDateLine(iso).full.split(" · ")[0]; } catch(_){}
  $dayTitle.innerHTML = `📅 ${escapeHtml(dateLabel)} · 기록 ${list.length}개`;
  $dayBody.innerHTML = `<div class="jv-rows">` + list.map((e, i) => {
    const snip = (e.text || "").replace(/\s+/g, " ").trim().slice(0, 56) || "(사진만)";
    const ph = (e.images && e.images.length) ? ` 📷${e.images.length}` : "";
    const pin = e.pinnedAt ? "★ " : "";
    return `<button class="jv-row" type="button" data-dayopen="${escapeHtml(e.id)}">` +
      `<b>${pin}기록 ${i + 1}${ph}</b><span>${escapeHtml(snip)}</span></button>`;
  }).join("") + `</div>`;
  $dayScrim.dataset.open = "true";
  $dayScrim.setAttribute("aria-hidden", "false");
  document.body.classList.add("modal-open");
}
function closeDayList(){
  $dayScrim.dataset.open = "false";
  $dayScrim.setAttribute("aria-hidden", "true");
  if ($editorScrim.dataset.open !== "true") document.body.classList.remove("modal-open");
}
$dayClose.addEventListener("click", closeDayList);
$dayScrim.addEventListener("click", (e) => { if (e.target === $dayScrim) closeDayList(); });
$dayBody.addEventListener("click", (e) => {
  const row = e.target.closest("[data-dayopen]");
  if (!row) return;
  const entry = state.entries.find(x => x.id === row.dataset.dayopen);
  closeDayList();

$dayAllBtn.addEventListener("click", () => {

});

/* ============================================================
   그래프 뷰 — [[위키링크]]로 기록·개념을 잇는 별자리 맵
   외부 라이브러리 없이 캔버스 + 간단한 force 시뮬레이션
   ============================================================ */
const HUB_DEG = 2;            // 이 이상 연결되면 '허브' → 라벨 항상 표시
const ENTRY_COL = "#868d99"; // 기록(중립 회색) — 분류색 허브가 또렷이 보이도록
let graphGen = 0;            // RAF 루프 무효화 토큰
const graphPos = new Map();  // id → {x,y} (뷰 재진입 시 배치 유지)
let graphCam = null;         // {scale, panX, panY}
let graphRT = null;          // 런타임 상태
// 점을 잇는 기준: "category"(분류) | "link"([[위키링크]])
let graphMode = (function(){ try { return localStorage.getItem("worklog:graphmode") || "category"; } catch(_){ return "category"; } })();
function setGraphMode(m){
  if (m === graphMode || (m !== "category" && m !== "link")) return;
  graphMode = m;
  try { localStorage.setItem("worklog:graphmode", m); } catch(_){}
  graphPos.clear(); graphCam = null;   // 기준이 바뀌면 배치 재계산 + 가운데 정렬
  renderGraph();
}

function shortDate(iso){ const p = (iso||"").split("-"); return p.length===3 ? (+p[1])+"/"+(+p[2]) : iso; }

function buildGraphData(mode){
  const nodes = [], idx = new Map(), edges = [];
  const ensure = (id, init) => { let n = idx.get(id); if(!n){ n = init(); idx.set(id, n); nodes.push(n); } return n; };
  for (const e of state.entries){
    const eid = "e:" + e.id;
    const en = ensure(eid, () => ({ id:eid, type:"entry", entry:e, label:shortDate(e.date), deg:0 }));
    if (mode === "category"){
      const c = (e.category || "").trim();
      if (c){
        const cid = "cat:" + c;
        const cn = ensure(cid, () => ({ id:cid, type:"concept", name:c, label:c, color:catColor(c), deg:0, filter:{ type:"cat", value:c } }));
        edges.push({ a:en, b:cn }); en.deg++; cn.deg++;
      }
    } else {
      for (const L of extractLinks(e.text)){
        const cid = "c:" + L.toLowerCase();
        const cn = ensure(cid, () => ({ id:cid, type:"concept", name:L, label:L, color:null, deg:0, filter:{ type:"link", value:L } }));
        edges.push({ a:en, b:cn }); en.deg++; cn.deg++;
      }
    }
  }
  const adj = new Map();
  for (const n of nodes) adj.set(n.id, new Set());
  for (const ed of edges){ adj.get(ed.a.id).add(ed.b.id); adj.get(ed.b.id).add(ed.a.id); }
  for (const n of nodes){
    const p = graphPos.get(n.id);
    if (p){ n.x = p.x; n.y = p.y; }
    else { const a = Math.random()*6.2832, r = 30 + Math.random()*170; n.x = Math.cos(a)*r; n.y = Math.sin(a)*r; }
    n.vx = 0; n.vy = 0;
  }
  return { nodes, edges, adj };
}

function renderGraph(){
  $entries.innerHTML =
    `<div class="graph-wrap" id="graphWrap">` +
      `<canvas id="graphCanvas"></canvas>` +
      `<div class="graph-bar">` +
        `<span class="legend"><span class="lg"><span class="dot" style="background:${ENTRY_COL}"></span>기록</span>` +
        `<span class="lg"><span class="dot" id="lgConcept"></span>${graphMode === "category" ? "분류" : "개념 [[ ]]"}</span></span>` +
        `<span class="graph-right">` +
          `<span class="graph-modes" id="graphModes">` +
            `<button type="button" data-gmode="category" class="${graphMode === "category" ? "on" : ""}">분류</button>` +
            `<button type="button" data-gmode="link" class="${graphMode === "link" ? "on" : ""}">[[링크]]</button>` +
          `</span>` +
          `<button class="graph-reset" id="graphReset" type="button">가운데 정렬</button>` +
        `</span>` +
      `</div>` +
      `<div class="graph-empty" id="graphEmpty" style="display:none"></div>` +
    `</div>`;

  const cs = getComputedStyle(document.body);
  const COL = {
    bg: (cs.getPropertyValue("--bg")||"#1d1d1f").trim(),
    line: (cs.getPropertyValue("--line")||"#3a3a3d").trim(),
    text: (cs.getPropertyValue("--text")||"#ececec").trim(),
    muted: (cs.getPropertyValue("--muted")||"#9a9a9e").trim(),
    accent: (cs.getPropertyValue("--accent")||"#cdae6a").trim(),
  };
  const lg = document.getElementById("lgConcept"); if (lg) lg.style.background = COL.accent;
  const modesEl = document.getElementById("graphModes");
  if (modesEl) modesEl.addEventListener("click", (e) => {
    const b = e.target.closest("[data-gmode]"); if (b) setGraphMode(b.dataset.gmode);
  });

  const wrap = document.getElementById("graphWrap");
  const canvas = document.getElementById("graphCanvas");
  const emptyEl = document.getElementById("graphEmpty");
  const data = buildGraphData(graphMode);

  if (!data.nodes.length){
    emptyEl.style.display = "flex";
    emptyEl.innerHTML = `<div class="ge-title">아직 기록이 없어요</div><div class="ge-sub">기록을 남기면 여기에 점으로 나타나고, 분류를 지정하면 같은 분류끼리 이어져요.</div>`;
    return;
  }
  if (!data.edges.length){
    emptyEl.style.display = "flex";
    emptyEl.style.pointerEvents = "none";
    emptyEl.innerHTML = graphMode === "category"
      ? `<div class="ge-title">아직 분류된 기록이 없어요</div><div class="ge-sub">기록에 <b>분류</b>(작업·스케줄 등)를 지정하면 같은 분류끼리 별자리처럼 연결돼요.</div>`
      : `<div class="ge-title">아직 이어진 점이 없어요</div><div class="ge-sub">본문에 <b>[[주제]]</b>처럼 위키링크를 적으면 같은 주제의 기록들이 별자리처럼 연결돼요.</div>`;
  }

  const gen = ++graphGen;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const ctx = canvas.getContext("2d");
  const rt = graphRT = {
    canvas, ctx, dpr, COL, nodes:data.nodes, edges:data.edges, adj:data.adj,
    alpha: 0.9, running:false, dragNode:null, dragMoved:false, panning:false,
    interacting:false, hoverId:null, pointers:new Map(), pinchDist:0, lastPan:null, cssW:0, cssH:0,
  };
  const freshCam = !graphCam;
  if (!graphCam) graphCam = { scale:1, panX:0, panY:0 };
  rt.cam = graphCam;

  function resize(){
    const r = wrap.getBoundingClientRect();
    rt.cssW = r.width; rt.cssH = r.height;
    canvas.width = Math.round(r.width * dpr);
    canvas.height = Math.round(r.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  if (freshCam) fitView();

  function fitView(){
    const ns = rt.nodes; if (!ns.length) return;
    let minx=Infinity,miny=Infinity,maxx=-Infinity,maxy=-Infinity;
    for (const n of ns){ if(n.x<minx)minx=n.x; if(n.y<miny)miny=n.y; if(n.x>maxx)maxx=n.x; if(n.y>maxy)maxy=n.y; }
    const bw = (maxx-minx)||1, bh = (maxy-miny)||1, pad = 70;
    const s = Math.max(0.2, Math.min((rt.cssW-pad*2)/bw, (rt.cssH-pad*2)/bh, 1.6));
    rt.cam.scale = s;
    rt.cam.panX = rt.cssW/2 - ((minx+maxx)/2)*s;
    rt.cam.panY = rt.cssH/2 - ((miny+maxy)/2)*s;
  }
  rt.fitView = fitView;

  const S = (n) => ({ x: n.x*rt.cam.scale + rt.cam.panX, y: n.y*rt.cam.scale + rt.cam.panY });
  const toWorld = (sx, sy) => ({ x:(sx-rt.cam.panX)/rt.cam.scale, y:(sy-rt.cam.panY)/rt.cam.scale });
  const radius = (n) => (n.type==="concept" ? 6 + Math.min(n.deg,10)*1.1 : 5 + Math.min(n.deg,6)*0.8);

  function simulate(a){
    const ns = rt.nodes, es = rt.edges;
    const REP = 2600, LEN = 82, SPR = 0.02, GRAV = 0.012, DAMP = 0.85;
    for (let i=0;i<ns.length;i++){
      const p = ns[i];
      for (let j=i+1;j<ns.length;j++){
        const q = ns[j];
        let dx = p.x-q.x, dy = p.y-q.y, d2 = dx*dx+dy*dy;
        if (d2 < 0.01){ dx = (Math.random()-0.5); dy = (Math.random()-0.5); d2 = dx*dx+dy*dy; }
        const d = Math.sqrt(d2), f = REP / d2;
        const fx = (dx/d)*f, fy = (dy/d)*f;
        p.vx += fx; p.vy += fy; q.vx -= fx; q.vy -= fy;
      }
    }
    for (const ed of es){
      const a1 = ed.a, b1 = ed.b;
      let dx = b1.x-a1.x, dy = b1.y-a1.y, d = Math.hypot(dx,dy)||0.01;
      const f = (d-LEN)*SPR, fx = (dx/d)*f, fy = (dy/d)*f;
      a1.vx += fx; a1.vy += fy; b1.vx -= fx; b1.vy -= fy;
    }
    for (const p of ns){
      p.vx -= p.x*GRAV; p.vy -= p.y*GRAV;
      if (p.fixed) continue;
      p.vx *= DAMP; p.vy *= DAMP;
      p.x += p.vx*a; p.y += p.vy*a;
    }
    for (const p of ns) graphPos.set(p.id, { x:p.x, y:p.y });
  }

  function draw(){
    ctx.clearRect(0,0,rt.cssW,rt.cssH);
    const hover = rt.hoverId, neigh = hover ? rt.adj.get(hover) : null;
    // edges
    for (const ed of rt.edges){
      const incident = hover && (ed.a.id===hover || ed.b.id===hover);
      ctx.strokeStyle = COL.line;
      ctx.globalAlpha = hover ? (incident ? 0.95 : 0.12) : 0.5;
      ctx.lineWidth = Math.max(0.6, Math.min(2, rt.cam.scale)) * (incident?1.6:1);
      const pa = S(ed.a), pb = S(ed.b);
      ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // nodes
    for (const n of rt.nodes){
      const sp = S(n), r = Math.max(2.5, Math.min(42, radius(n)*rt.cam.scale));
      const isNeigh = hover && (n.id===hover || (neigh && neigh.has(n.id)));
      ctx.globalAlpha = hover ? (isNeigh ? 1 : 0.25) : 1;
      ctx.beginPath(); ctx.arc(sp.x, sp.y, r, 0, 6.2832);
      ctx.fillStyle = n.type==="concept" ? (n.color || COL.accent) : ENTRY_COL;
      ctx.fill();
      if (n.id===hover){ ctx.lineWidth = 2; ctx.strokeStyle = COL.text; ctx.globalAlpha = 0.9; ctx.stroke(); }
    }
    ctx.globalAlpha = 1;
    // labels: 허브 항상 + 호버한 점/이웃
    ctx.font = "600 11.5px " + (cs.getPropertyValue("--sans")||"system-ui");
    ctx.textAlign = "center"; ctx.textBaseline = "top";
    for (const n of rt.nodes){
      const isHub = n.deg >= HUB_DEG;
      const isNeigh = hover && (n.id===hover || (neigh && neigh.has(n.id)));
      if (!isHub && !isNeigh) continue;
      if (hover && !isNeigh && !(isHub)) continue;
      const sp = S(n), r = Math.max(2.5, Math.min(42, radius(n)*rt.cam.scale));
      const txt = (n.label||"").slice(0, 18);
      ctx.globalAlpha = hover ? (isNeigh ? 1 : 0.35) : 0.92;
      ctx.fillStyle = COL.text;
      ctx.fillText(txt, sp.x, sp.y + r + 3);
    }
    ctx.globalAlpha = 1;
  }
  rt.draw = draw;

  function startLoop(){
    if (rt.running) return; rt.running = true;
    const myGen = gen;
    const frame = () => {
      if (myGen !== graphGen || state.view !== "graph"){ rt.running = false; return; }
      if (rt.alpha > 0.02){ simulate(rt.alpha); rt.alpha *= 0.985; if (rt.alpha < 0.02) rt.alpha = 0; }
      draw();
      if (rt.alpha > 0.02 || rt.dragNode || rt.interacting){ requestAnimationFrame(frame); }
      else { rt.running = false; }
    };
    requestAnimationFrame(frame);
  }
  rt.startLoop = startLoop;
  const reheat = (v) => { rt.alpha = Math.max(rt.alpha, v||0.5); startLoop(); };

  function hitTest(sx, sy){
    let best = null, bestD = 18*18;
    for (const n of rt.nodes){
      const sp = S(n), r = Math.max(2.5, radius(n)*rt.cam.scale);
      const dx = sx-sp.x, dy = sy-sp.y, d2 = dx*dx+dy*dy, hitR = (r+8)*(r+8);
      if (d2 <= Math.max(bestD, hitR) && d2 <= hitR){ best = n; bestD = d2; }
    }
    return best;
  }
  function nodeAction(n){
    if (n.type === "entry"){ openEditor(n.entry); return; }
    state.view = "timeline"; clearFilters();
    if (n.filter && n.filter.type === "cat") state.catFilter = n.filter.value;
    else state.linkFilter = n.name;
    render(); window.scrollTo({ top: 0 });
  }

  const relPos = (e) => { const r = canvas.getBoundingClientRect(); return { x:e.clientX-r.left, y:e.clientY-r.top }; };

  canvas.addEventListener("pointerdown", (e) => {
    canvas.setPointerCapture(e.pointerId);
    const p = relPos(e); rt.pointers.set(e.pointerId, p);
    if (rt.pointers.size === 2){
      const pts = [...rt.pointers.values()];
      rt.pinchDist = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
      rt.dragNode = null; rt.panning = false; rt.interacting = true; return;
    }
    const hit = hitTest(p.x, p.y);
    if (hit){ rt.dragNode = hit; rt.dragMoved = false; hit.fixed = true; reheat(0.3); }
    else { rt.panning = true; rt.lastPan = p; rt.dragMoved = false; rt.interacting = true; startLoop(); }
  });
  canvas.addEventListener("pointermove", (e) => {
    const p = relPos(e);
    if (rt.pointers.has(e.pointerId)) rt.pointers.set(e.pointerId, p);
    if (rt.pointers.size === 2){
      const pts = [...rt.pointers.values()];
      const d = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
      const mid = { x:(pts[0].x+pts[1].x)/2, y:(pts[0].y+pts[1].y)/2 };
      if (rt.pinchDist > 0){ zoomAt(mid.x, mid.y, d/rt.pinchDist); }
      rt.pinchDist = d; rt.interacting = true; startLoop(); return;
    }
    if (rt.dragNode){
      const w = toWorld(p.x, p.y); rt.dragNode.x = w.x; rt.dragNode.y = w.y;
      rt.dragNode.vx = 0; rt.dragNode.vy = 0; rt.dragMoved = true; reheat(0.35); return;
    }
    if (rt.panning && rt.lastPan){
      rt.cam.panX += p.x-rt.lastPan.x; rt.cam.panY += p.y-rt.lastPan.y; rt.lastPan = p;
      rt.dragMoved = true; startLoop(); return;
    }
    // hover
    const hit = hitTest(p.x, p.y);
    const id = hit ? hit.id : null;
    canvas.style.cursor = hit ? "pointer" : "default";
    if (id !== rt.hoverId){ rt.hoverId = id; startLoop(); }
  });
  function endPointer(e){
    const wasDrag = rt.dragNode, wasPan = rt.panning, moved = rt.dragMoved;
    if (rt.pointers.has(e.pointerId)) rt.pointers.delete(e.pointerId);
    if (rt.pointers.size < 2) rt.pinchDist = 0;
    if (wasDrag){ wasDrag.fixed = false; if (!moved) nodeAction(wasDrag); rt.dragNode = null; reheat(0.2); }
    rt.panning = false; rt.lastPan = null;
    if (rt.pointers.size === 0) rt.interacting = false;
  }
  canvas.addEventListener("pointerup", endPointer);
  canvas.addEventListener("pointercancel", endPointer);
  canvas.addEventListener("pointerleave", (e) => {
    if (!rt.dragNode && !rt.panning && rt.pointers.size===0 && rt.hoverId){ rt.hoverId = null; canvas.style.cursor="default"; startLoop(); }
  });
  function zoomAt(sx, sy, factor){
    const ns = Math.max(0.15, Math.min(4, rt.cam.scale*factor));
    const w = toWorld(sx, sy);
    rt.cam.scale = ns;
    rt.cam.panX = sx - w.x*ns; rt.cam.panY = sy - w.y*ns;
  }
  canvas.addEventListener("wheel", (e) => {
    e.preventDefault();
    const p = relPos(e);
    zoomAt(p.x, p.y, e.deltaY < 0 ? 1.1 : 0.9);
    startLoop();
  }, { passive:false });

  document.getElementById("graphReset").addEventListener("click", () => { fitView(); reheat(0.6); });

  // 뷰 크기 변동 대응
  if (rt._ro) rt._ro.disconnect();
  rt._ro = new ResizeObserver(() => { if (state.view==="graph" && graphGen===gen){ resize(); startLoop(); } });
  rt._ro.observe(wrap);

  startLoop();
}

function buildSummaryPrompt(entries){
  const body = entries
    .slice()
    .sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0))
    .map(e => {
      const imgs = (e.images && e.images.length) ? ` (사진 ${e.images.length}장)` : "";
      return `■ ${e.date}${imgs}\n${(e.text || "").trim()}`;
    })
    .join("\n\n");
  return (
    `다음은 나의 작업 일지 기록이야. 한국어로 간결하게 요약해줘.\n` +
    `- 주요하게 한 일과 성과를 불릿으로 정리\n` +
    `- 반복되는 주제나 패턴이 있으면 짚어주기\n` +
    `- 마지막에 한 줄 총평\n\n` +
    `[기록 ${entries.length}건]\n${body}`
  );
}

async function copyText(t){
  try {
    if (navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(t);
      return true;
    }
  } catch(e){ /* ignore */ }
  return false;
}

  const scope = state.monthFilter ? formatMonth(state.monthFilter) : "전체 기록";
  const prompt = buildSummaryPrompt(entries);
  summaryText = prompt;

  summaryScope = scope;
  openSummary();
  $summaryOpen.hidden = true;
  $summaryBody.innerHTML =
    `<div class="summary-loading"><span class="spinner"></span>요약 중… (${escapeHtml(scope)} · ${entries.length}건)</div>`;

  const showResult = (text) => {
    summaryText = String(text || "").trim() || "(요약 결과가 비어 있어요)";
    $summaryBody.textContent = summaryText;
    $summaryOpen.hidden = false;
  };

  // ① 서버 함수로 진짜 클로드 호출 (키 설정돼 있으면 동작)
  const question =
    "아래 내 작업 일지를 한국어로 간결하게 요약해줘. " +
    "주요하게 한 일과 성과를 불릿으로 정리하고, 반복되는 주제·패턴이 있으면 짚어주고, 마지막에 한 줄 총평을 덧붙여줘.";
  try {
    const backendText = await callJarvisBackend(question, entries);
    if (backendText){ showResult(backendText); return; }
  } catch(err){ console.error(err); }

  // ② claude.ai 아티팩트 안: 모델을 그 자리에서 호출
  if (window.claude && typeof window.claude.complete === "function"){
    try {
      const out = await window.claude.complete(prompt);
      showResult(out);
      return;
    } catch(err){ console.error(err); }
  }

  // ③ 폴백: AI 미연동 → 요약용 내용을 '새 창에서 보기'로 확인 후 Claude에 붙여넣기
  summaryText = prompt;
  $summaryBody.innerHTML =
    `<div class="summary-note">이 기기에서는 자동 요약이 아직 연결되지 않았어요. ` +
    `<b>‘새 창에서 보기’</b>를 눌러 요약용 내용을 연 뒤 <b>Claude 대화창에 붙여넣고 보내면</b> 요약해 줍니다.</div>` +
    `<div class="summary-pre">${escapeHtml(prompt)}</div>`;
  $summaryOpen.hidden = false;
}

/* 날짜 범위 해석 → {from,to,label} | null */
function jarvisDateRange(q){
  const t = todayISO();
  const wd = new Date(t.slice(0,4), Number(t.slice(5,7))-1, Number(t.slice(8,10))).getDay(); // 0=일
  const monOffset = (wd + 6) % 7; // 이번 주 월요일까지 뒤로
  if (/그저께|그제/.test(q)) return { from: isoAddDays(t,-2), to: isoAddDays(t,-2), label: "그저께" };
  if (/어제/.test(q)) return { from: isoAddDays(t,-1), to: isoAddDays(t,-1), label: "어제" };
  if (/오늘|금일/.test(q)) return { from: t, to: t, label: "오늘" };
  if (/지난\s*주|저번\s*주|전\s*주/.test(q)){ const mon = isoAddDays(t, -monOffset-7); return { from: mon, to: isoAddDays(mon,6), label: "지난주" }; }
  if (/이번\s*주|금주|한\s*주/.test(q)){ const mon = isoAddDays(t, -monOffset); return { from: mon, to: t, label: "이번주" }; }
  let m = q.match(/(?:최근|지난)\s*(\d{1,3})\s*일/);
  if (m){ const n = Math.max(1, Number(m[1])); return { from: isoAddDays(t, -(n-1)), to: t, label: `최근 ${n}일` }; }
  if (/지난\s*달|저번\s*달|전\s*달/.test(q)){ const d = new Date(t.slice(0,4), Number(t.slice(5,7))-1-1, 1); const ym = todayISOFrom(d).slice(0,7); return monthRange(ym, "지난달"); }
  if (/이번\s*달|금월|이달/.test(q)) return monthRange(t.slice(0,7), "이번달");
  // 특정 일자: 2026-06-09 / 2026.6.9 / 2026년 6월 9일 / 6월 9일 / 6/9
  let dm = q.match(/(\d{4})\s*[-.\/]\s*(\d{1,2})\s*[-.\/]\s*(\d{1,2})/) || q.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
  if (dm){ const iso = `${dm[1]}-${String(+dm[2]).padStart(2,"0")}-${String(+dm[3]).padStart(2,"0")}`; return { from: iso, to: iso, label: formatDateLine(iso).full.split(" · ")[0] }; }
  dm = q.match(/(\d{1,2})\s*월\s*(\d{1,2})\s*일/) || q.match(/(?:^|\D)(\d{1,2})\s*\/\s*(\d{1,2})(?!\d)/);
  if (dm){ const iso = `${t.slice(0,4)}-${String(+dm[1]).padStart(2,"0")}-${String(+dm[2]).padStart(2,"0")}`; return { from: iso, to: iso, label: `${+dm[1]}월 ${+dm[2]}일` }; }
  m = q.match(/(\d{4})\s*[-.\/]\s*(\d{1,2})/) || q.match(/(\d{4})년\s*(\d{1,2})월/);
  if (m){ const ym = m[1]+"-"+String(Number(m[2])).padStart(2,"0"); return monthRange(ym, formatMonth(ym)); }
  m = q.match(/(?:^|\D)(\d{1,2})\s*월(?!\s*\d)/);
  if (m){ const mm = String(Number(m[1])).padStart(2,"0"); const ym = t.slice(0,4)+"-"+mm; return monthRange(ym, formatMonth(ym)); }
  if (/올해|금년/.test(q)){ const y = t.slice(0,4); return { from: y+"-01-01", to: y+"-12-31", label: y+"년" }; }
  return null;
}
function monthRange(ym, label){
  const [y, mo] = ym.split("-").map(Number);
  const last = new Date(y, mo, 0).getDate();
  return { from: `${ym}-01`, to: `${ym}-${String(last).padStart(2,"0")}`, label };
}

const JV_STOP = new Set(["요약","정리","분석","회고","총평","해줘","해","보여줘","보여","찾아줘","찾아","찾기","검색","알려줘","알려","뭐","무엇","어떤","했어","한","일","기록","좀","줘","대해","관련","들","것","개","건","장","몇","며칠","통계","얼마나","얼마","및","그리고","나","내","제","저","이번","지난","저번","최근","올해","금년","주","달","월","한일","할일","한것","한거","했던","했던일","했던것","뭐한","뭐했","뭐했어","무슨","일들","것들"]);
function jarvisKeywords(q){
  return q.replace(/[#"']/g," ")
    // 상대·절대 날짜 표현 제거(검색어로 오인 방지)
    .replace(/오늘|금일|어제|그저께|그제|이번\s*주|지난\s*주|저번\s*주|전\s*주|금주|한\s*주|이번\s*달|지난\s*달|저번\s*달|전\s*달|이달|금월|올해|금년/g," ")
    .replace(/(?:최근|지난)\s*\d+\s*일/g," ")
    .replace(/\d{4}\s*[-.\/]\s*\d{1,2}\s*[-.\/]\s*\d{1,2}/g," ")  // 2026-06-09
    .replace(/\d{4}년\s*\d{1,2}월\s*\d{1,2}일/g," ")
    .replace(/\d{1,2}\s*월\s*\d{1,2}\s*일/g," ")                  // 6월 9일
    .replace(/\d{1,2}\s*\/\s*\d{1,2}/g," ")                       // 6/9
    .replace(/\d{4}\s*[-.\/]?\s*\d{0,2}\s*월?/g," ")
    .replace(/\d{1,2}\s*월/g," ")
    .split(/[\s,.;]+/)
    .map(s=>s.trim()).filter(s=>s && s.length>=2 && !JV_STOP.has(s));
}
function jarvisFindTags(q){
  const tags = extractTags(q).map(s=>s.toLowerCase());
  let m = q.match(/([0-9A-Za-z_\-가-힣ㄱ-ㆎ]+)\s*태그/);
  if (m && !tags.includes(m[1].toLowerCase())) tags.push(m[1].toLowerCase());
  return tags;
}
function jarvisRowsHtml(list){
  const rows = list.slice(0, 12).map(e => {
    const dl = formatDateLine(e.date);
    const snip = (e.text || "").replace(/\s+/g," ").trim().slice(0, 46) || "(사진만)";
    const ph = (e.images && e.images.length) ? ` 📷${e.images.length}` : "";
    return `<button class="jv-row" type="button" data-open="${escapeHtml(e.id)}"><b>${escapeHtml(dl.full)}</b>${ph}<span>${escapeHtml(snip)}</span></button>`;
  }).join("");
  const more = list.length > 12 ? `<div class="jv-more">외 ${list.length - 12}건 더…</div>` : "";
  return `<div class="jv-rows">${rows}${more}</div>`;
}
function jarvisAiPrompt(q, list){
  const body = list.slice().sort((a,b)=> a.date<b.date?-1:a.date>b.date?1:0)
    .map(e=>`■ ${e.date}\n${(e.text||"").trim()}`).join("\n\n");
  return `너는 내 작업일지 비서야. 아래 "내 기록"만 근거로 한국어로 간결하고 구체적으로 답해줘. 기록에 없는 내용은 추측하지 말고 모른다고 해.\n\n[질문]\n${q}\n\n[내 기록 ${list.length}건]\n${body}`;
}

// 자비스가 쓸 클로드 모델: "sonnet"(추천) | "haiku" | "opus"
const JARVIS_MODEL = "sonnet";
// 서버 함수(jarvis)로 진짜 클로드 호출. 키 미설정·오프라인·게스트면 null 반환 → 폴백
async function callJarvisBackend(question, entries){
  if (!isCloud() || !sb) return null;
  try {
    const payload = (entries || []).slice(0, 60).map(e => ({ date: e.date, text: e.text || "" }));
    const { data, error } = await sb.functions.invoke("jarvis", {
      body: { question, entries: payload, model: JARVIS_MODEL },
    });
    if (error) return null;
    if (data && typeof data.text === "string" && data.text.trim()) return data.text.trim();
    return null;   // {error:"NO_KEY"} 등 → 폴백
  } catch(_){ return null; }
}

async function jarvisAsk(q){
  if (jarvisBusy) return;
  q = (q || "").trim();
  if (!q) return;
  jarvisBusy = true;
  jarvisPush("me", escapeHtml(q));
  $jarvisInput.value = "";

  try {
    const range = jarvisDateRange(q);
    const tags = jarvisFindTags(q);
    const terms = jarvisKeywords(q);
    const wantStat = /몇|개수|건수|장|며칠|연속|통계|얼마/.test(q);
    const wantAI = /요약|정리|분석|회고|돌아|총평|인사이트|패턴|어땠|평가|\?|어떻게|어때|왜|추천|방법|아이디어|계획|좋을까|할까|골라|비교|설명|가르쳐|어떤\s*게|뭐가\s*좋|도와/.test(q);

    // ── 프로젝트 / 할일 질문 ──
    if (/프로젝트|할\s*일|할일|투두|todo|체크리스트|미완|안\s*끝|남은\s*(거|일|할|것)|해야|다음\s*할/.test(q)){
      const projects = state.projects || [];
      if (!projects.length){
        jarvisPush("bot", "아직 등록된 프로젝트가 없어요. 메뉴 → <b>🗂 프로젝트</b>에서 목표와 할 일을 만들어보세요.");
        jarvisBusy = false; return;
      }
      // 특정 프로젝트를 지목했는지 (이름이 질문에 포함)
      const named = projects.find(p => p.name && p.name.length >= 2 && q.includes(p.name));
      if (named){
        const todos = named.todos || [];
        const left = todos.filter(t => !t.done);
        let html = `<b>${escapeHtml(named.name)}</b> · ${statusInfo(named.status).label} · ${projectProgress(named)}%`;
        if (named.goal) html += `<br><span class="jv-ex">🎯 ${escapeHtml(named.goal)}</span>`;
        if (left.length){
          html += `<br>남은 할 일 <b>${left.length}개</b>` +
            `<div class="jv-rows">` + left.slice(0, 15).map(t =>
              `<button class="jv-row" type="button" data-openproject="${escapeHtml(named.id)}"><span>☐ ${escapeHtml(t.text)}</span></button>`).join("") + `</div>`;
        } else html += `<br>할 일을 모두 끝냈어요! 🎉`;
        jarvisPush("bot", html); jarvisBusy = false; return;
      }
      // 남은 할 일(미완료) 모으기
      if (/할\s*일|할일|투두|todo|미완|안\s*끝|남은|해야|오늘|다음/.test(q) && !/프로젝트\s*(목록|리스트|뭐|있|몇|개)/.test(q)){
        const items = [];
        for (const p of projects){
          if (p.status === "done") continue;
          for (const t of (p.todos || [])) if (!t.done) items.push({ text: t.text, project: p.name, pid: p.id });
        }
        if (!items.length){ jarvisPush("bot", "남은 할 일이 없어요. 다 끝내셨네요! 🎉"); jarvisBusy = false; return; }
        const rows = `<div class="jv-rows">` + items.slice(0, 15).map(it =>
          `<button class="jv-row" type="button" data-openproject="${escapeHtml(it.pid)}"><b>☐ ${escapeHtml(it.project)}</b><span>${escapeHtml(it.text)}</span></button>`).join("") +
          (items.length > 15 ? `<div class="jv-more">외 ${items.length - 15}개</div>` : "") + `</div>`;
        jarvisPush("bot", `남은 할 일 <b>${items.length}개</b>예요.` + rows); jarvisBusy = false; return;
      }
      // 프로젝트 목록
      let ps = projects.slice();
      if (/진행\s*중/.test(q)) ps = ps.filter(p => p.status === "active");
      const rows = `<div class="jv-rows">` + ps.map(p => {
        const left = (p.todos || []).filter(t => !t.done).length;
        return `<button class="jv-row" type="button" data-openproject="${escapeHtml(p.id)}"><b>${escapeHtml(p.name)} · ${statusInfo(p.status).label} ${projectProgress(p)}%</b><span>${left ? ("남은 할일 " + left + "개") : "할일 완료"}${p.goal ? (" · " + escapeHtml(p.goal)) : ""}</span></button>`;
      }).join("") + `</div>`;
      jarvisPush("bot", `프로젝트 <b>${ps.length}개</b>예요.` + rows); jarvisBusy = false; return;
    }

    let list = state.entries.slice();
    if (range) list = list.filter(e => e.date >= range.from && e.date <= range.to);
    if (tags.length) list = list.filter(e => { const tg = extractTags(e.text).map(s=>s.toLowerCase()); return tags.every(t => tg.includes(t)); });
    if (terms.length) list = list.filter(e => { const lc = searchableText(e); return terms.every(t => lc.includes(t.toLowerCase())); });
    list.sort(sortEntries);

    const scopeBits = [];
    if (range) scopeBits.push(range.label);
    if (tags.length) scopeBits.push(tags.map(t=>"#"+t).join(" "));
    if (terms.length) scopeBits.push("‘"+terms.join(" ")+"’");
    const scope = scopeBits.join(" · ") || "전체";

    // 연속 며칠
    if (/연속\s*(며칠|몇\s*일)|며칠\s*연속/.test(q)){
      const s = currentStreak(state.entries);
      jarvisPush("bot", s >= 1 ? `🔥 지금 <b>${s}일</b> 연속 기록 중이에요.` : `최근 연속 기록이 끊겼어요. 오늘 한 줄 남겨볼까요?`);
      jarvisBusy = false; return;
    }

    // 자유 질문·요약·분석 → ① 백엔드(진짜 클로드) ② claude.ai ③ 복사 폴백
    if (wantAI){
      const prompt = jarvisAiPrompt(q, list);
      const wait = jarvisPush("bot", `<span class="jv-think"><span class="spinner"></span>생각 중…${list.length ? ` (${escapeHtml(scope)} · ${list.length}건)` : ""}</span>`);
      // ① 서버 함수로 진짜 클로드 호출 (키 설정돼 있으면 동작)
      const backendText = await callJarvisBackend(q, list);
      if (backendText){
        wait.innerHTML = jarvisFormat(backendText) + (list.length ? jarvisRowsHtml(list) : "");
        $jarvisLog.scrollTop = $jarvisLog.scrollHeight; jarvisBusy = false; return;
      }
      // ② claude.ai 아티팩트
      if (window.claude && typeof window.claude.complete === "function"){
        try {
          const out = await window.claude.complete(prompt);
          wait.innerHTML = jarvisFormat(String(out||"").trim() || "(답이 비어 있어요)") + (list.length ? jarvisRowsHtml(list) : "");
          $jarvisLog.scrollTop = $jarvisLog.scrollHeight; jarvisBusy = false; return;
        } catch(err){ console.error(err); }
      }
      // ③ 복사 폴백
      if (!list.length){
        wait.innerHTML = `이 질문엔 아직 바로 답하기 어려워요. <b>메뉴→설정에서 AI를 연동</b>하면 제가 직접 생각해서 답해드려요.`;
      } else {
        copyText(prompt);
        wait.innerHTML = jarvisCopyFallback(prompt, list);
      }
      $jarvisLog.scrollTop = $jarvisLog.scrollHeight;
      jarvisBusy = false; return;
    }

    // 통계
    if (wantStat){
      const days = new Set(list.map(e=>e.date)).size;
      const photos = list.reduce((a,e)=>a+(e.images?.length||0),0);
      jarvisPush("bot",
        `${escapeHtml(scope)} 기록 <b>${list.length}</b>건 · <b>${days}</b>일 · 사진 <b>${photos}</b>장` +
        (list.length ? jarvisRowsHtml(list) : ""));
      jarvisBusy = false; return;
    }

    // 찾기(기본)
    if (!list.length){
      jarvisPush("bot", `${escapeHtml(scope)}에서 찾은 기록이 없어요. 다른 키워드나 기간으로 물어봐 주세요.`);
    } else {
      jarvisPush("bot", `${escapeHtml(scope)}에서 <b>${list.length}건</b> 찾았어요.` + jarvisRowsHtml(list));
    }
  } catch(err){
    console.error(err);
    jarvisPush("bot", "처리 중 문제가 생겼어요. 다시 물어봐 주세요.");
  }
  jarvisBusy = false;
}
function jarvisCopyFallback(prompt, list){
  return `이 화면에서는 AI 답변을 바로 못 띄워요(claude.ai에서 열면 즉시 답해요).<br>` +
    `<b>질문+기록을 복사했어요</b> — Claude 대화창에 붙여넣으면 답해줍니다.` + jarvisRowsHtml(list);
}
// 아주 가벼운 마크다운 → HTML (AI 답변 표시용)
function jarvisFormat(t){
  let s = escapeHtml(t);
  s = s.replace(/\*\*([^*\n]+)\*\*/g,"<b>$1</b>");
  s = s.replace(/^\s*[-*]\s+(.*)$/gm,"• $1");
  return s.replace(/\n/g,"<br>");
}

function systemDark(){
  return !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
}
function currentThemeAttr(){
  return document.documentElement.getAttribute("data-theme") || "auto";
}
function effectiveDark(){
  const t = currentThemeAttr();
  return t === "dark" || (t === "auto" && systemDark());
}
function updateThemeIcon(){
  // 현재 다크면 해(→라이트로), 라이트면 달(→다크로)
  $themeBtn.innerHTML = effectiveDark() ? ICON_SUN : ICON_MOON;
}
function toggleTheme(){
  const next = effectiveDark() ? "light" : "dark";
  try { localStorage.setItem(THEME_KEY, next); } catch(e){}

}

}

/* ============================================================
   화면 잠금 (PIN · 생체인증) — 로컬 기기 잠금
   - Supabase 세션은 유지하되, 앱을 열 때 PIN/생체로 화면 잠금 해제
   - 데이터 접근 권한이 아니라 '화면 가림(개인정보 보호)' 용도
   ============================================================ */
const PIN_KEY = "worklog:pin";        // {salt, hash, len}
const BIO_KEY = "worklog:biometric";  // {credentialId}

function getPin(){ try { return JSON.parse(localStorage.getItem(PIN_KEY) || "null"); } catch(_){ return null; } }
function getBio(){ try { return JSON.parse(localStorage.getItem(BIO_KEY) || "null"); } catch(_){ return null; } }
function lockEnabled(){ return !!(getPin() || getBio()); }

function randHex(n){ return [...crypto.getRandomValues(new Uint8Array(n))].map(b=>b.toString(16).padStart(2,"0")).join(""); }
async function hashPin(pin, salt){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(salt + ":" + pin));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}
function bufToB64(buf){ const a = new Uint8Array(buf); let s=""; for (const x of a) s += String.fromCharCode(x); return btoa(s); }
function b64ToBuf(b64){ const s = atob(b64); const a = new Uint8Array(s.length); for (let i=0;i<s.length;i++) a[i]=s.charCodeAt(i); return a.buffer; }

let pendingUser = null; // 잠금 해제 후 진입할 사용자
let pinBuffer = "";

const $lockScrim  = document.getElementById("lockScrim");
const $lockSub    = document.getElementById("lockSub");
const $lockDots   = document.getElementById("lockDots");
const $lockPad    = document.getElementById("lockPad");
const $lockMsg    = document.getElementById("lockMsg");
const $lockBioBtn = document.getElementById("lockBioBtn");

function lockMsg(m, err){ if (!$lockMsg) return; $lockMsg.textContent = m || ""; $lockMsg.className = "lock-msg" + (err ? " err" : ""); }
function renderLockDots(len){
  let html = "";
  for (let i=0;i<len;i++) html += `<span class="dot ${i<pinBuffer.length?"on":""}"></span>`;
  $lockDots.innerHTML = html;
}
function renderLockPad(){
  const keys = ["1","2","3","4","5","6","7","8","9", getBio()?"bio":"", "0", "del"];
  $lockPad.innerHTML = keys.map(k=>{
    if (k === "")   return `<span class="pad-key empty"></span>`;
    if (k === "del")return `<button type="button" class="pad-key" data-k="del" aria-label="지우기">⌫</button>`;
    if (k === "bio")return `<button type="button" class="pad-key bio" data-k="bio" aria-label="생체인증">☝</button>`;
    return `<button type="button" class="pad-key" data-k="${k}">${k}</button>`;
  }).join("");
}
function showLock(user){
  pendingUser = user;
  pinBuffer = "";
  const pin = getPin();
  const len = pin ? (pin.len || 4) : 4;
  $lockPad.style.display  = pin ? "" : "none";
  $lockDots.style.display = pin ? "" : "none";
  renderLockPad();
  renderLockDots(len);
  $lockBioBtn.style.display = getBio() ? "" : "none";
  $lockSub.textContent = pin && getBio() ? "PIN 또는 생체인증으로 잠금을 해제하세요."
    : pin ? "PIN을 입력해 잠금을 해제하세요." : "생체인증으로 잠금을 해제하세요.";
  lockMsg("");
  $lockScrim.dataset.open = "true";
  $lockScrim.setAttribute("aria-hidden", "false");
  document.body.classList.add("modal-open");
}
function hideLock(){
  $lockScrim.dataset.open = "false";
  $lockScrim.setAttribute("aria-hidden", "true");
  document.body.classList.remove("modal-open");
}
async function unlockSuccess(){
  hideLock();
  const u = pendingUser; pendingUser = null;
  await startApp(u);
}
async function tryPin(){
  const pin = getPin();
  if (!pin) return;
  const h = await hashPin(pinBuffer, pin.salt);
  if (h === pin.hash){ await unlockSuccess(); }
  else {
    pinBuffer = "";
    renderLockDots(pin.len || 4);
    lockMsg("PIN이 일치하지 않아요", true);
    if (navigator.vibrate) navigator.vibrate(120);
  }
}
if ($lockPad) $lockPad.addEventListener("click", async (e) => {
  const btn = e.target.closest("[data-k]");
  if (!btn) return;
  const k = btn.dataset.k;
  const pin = getPin();
  const len = pin ? (pin.len || 4) : 4;
  if (k === "del"){ pinBuffer = pinBuffer.slice(0, -1); renderLockDots(len); return; }
  if (k === "bio"){ doBioUnlock(); return; }
  if (pinBuffer.length >= len) return;
  pinBuffer += k;
  renderLockDots(len);
  lockMsg("");
  if (pinBuffer.length === len) await tryPin();
});
async function doBioUnlock(){
  try {
    lockMsg("생체인증 확인 중…");
    const ok = await unlockBiometric();
    if (ok) await unlockSuccess();
    else lockMsg("생체인증에 실패했어요", true);
  } catch(err){
    console.warn(err);
    lockMsg("생체인증을 사용할 수 없어요. PIN으로 해제하세요.", true);
  }
}
if ($lockBioBtn) $lockBioBtn.addEventListener("click", doBioUnlock);

/* 생체인증 (WebAuthn) */
async function biometricSupported(){
  if (!window.PublicKeyCredential) return false;
  try { return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable(); }
  catch(_){ return false; }
}
async function enableBiometric(){
  const challenge = crypto.getRandomValues(new Uint8Array(32));
  const userId = crypto.getRandomValues(new Uint8Array(16));
  const cred = await navigator.credentials.create({
    publicKey: {
      challenge,
      rp: { name: "L'Heure Bleue" },
      user: { id: userId, name: (currentUser && currentUser.email) || "worklog", displayName: "작업일지" },
      pubKeyCredParams: [{ type:"public-key", alg:-7 }, { type:"public-key", alg:-257 }],
      authenticatorSelection: { authenticatorAttachment:"platform", userVerification:"required" },
      timeout: 60000, attestation: "none",
    },
  });
  if (!cred) throw new Error("등록 취소됨");
  localStorage.setItem(BIO_KEY, JSON.stringify({ credentialId: bufToB64(cred.rawId) }));
}
async function unlockBiometric(){
  const meta = getBio();
  if (!meta) throw new Error("등록된 생체인증이 없어요");
  const challenge = crypto.getRandomValues(new Uint8Array(32));
  const assertion = await navigator.credentials.get({
    publicKey: {
      challenge,
      allowCredentials: [{ type:"public-key", id: b64ToBuf(meta.credentialId) }],
      userVerification: "required",
      timeout: 60000,
    },
  });
  return !!assertion;
}

/* 잠금 설정 모달 */
const $lockSetScrim  = document.getElementById("lockSettingsScrim");
const $pinStatus     = document.getElementById("pinStatus");
const $bioStatus     = document.getElementById("bioStatus");
const $pinSetWrap    = document.getElementById("pinSetWrap");
const $pinInput1     = document.getElementById("pinInput1");
const $pinInput2     = document.getElementById("pinInput2");
const $pinSaveBtn    = document.getElementById("pinSaveBtn");
const $pinToggleBtn  = document.getElementById("pinToggleBtn");
const $bioToggleBtn  = document.getElementById("bioToggleBtn");
const $lockSetMsg    = document.getElementById("lockSetMsg");
const $lockNowBtn    = document.getElementById("lockNowBtn");

function lockSetMsg(m, err){ if (!$lockSetMsg) return; $lockSetMsg.textContent = m || ""; $lockSetMsg.className = "lock-msg" + (err ? " err" : ""); }
function refreshLockSettings(){
  const hasPin = !!getPin(), hasBio = !!getBio();
  $pinStatus.textContent = hasPin ? "설정됨" : "사용 안 함";
  $pinToggleBtn.textContent = hasPin ? "PIN 해제" : "PIN 설정";
  $bioStatus.textContent = hasBio ? "사용 중" : "사용 안 함";
  $bioToggleBtn.textContent = hasBio ? "생체인증 해제" : "생체인증 사용";
  $pinSetWrap.style.display = "none";
  $pinInput1.value = ""; $pinInput2.value = "";
  lockSetMsg("");
  biometricSupported().then(ok => {
    if (!ok && !hasBio){ $bioToggleBtn.disabled = true; $bioStatus.textContent = "이 기기 미지원"; }
    else $bioToggleBtn.disabled = false;
  });
}
function openLockSettings(){ refreshLockSettings(); $lockSetScrim.dataset.open = "true"; $lockSetScrim.setAttribute("aria-hidden","false"); document.body.classList.add("modal-open"); }
function closeLockSettings(){ $lockSetScrim.dataset.open = "false"; $lockSetScrim.setAttribute("aria-hidden","true"); document.body.classList.remove("modal-open"); }

document.getElementById("lockSettingsBtn").addEventListener("click", () => { setMenu(false); openLockSettings(); });
document.getElementById("lockSettingsClose").addEventListener("click", closeLockSettings);
$lockSetScrim.addEventListener("click", (e) => { if (e.target === $lockSetScrim) closeLockSettings(); });

$pinToggleBtn.addEventListener("click", () => {
  if (getPin()){
    openConfirm({ title:"PIN 해제", message:"PIN 잠금을 해제할까요?", okText:"해제", danger:true,
      onOk: () => { localStorage.removeItem(PIN_KEY); refreshLockSettings(); showToast("PIN을 해제했어요"); } });
  } else {
    $pinSetWrap.style.display = ""; lockSetMsg(""); $pinInput1.focus();
  }
});
$pinSaveBtn.addEventListener("click", async () => {
  const p1 = $pinInput1.value.trim(), p2 = $pinInput2.value.trim();
  if (!/^\d{4,6}$/.test(p1)){ lockSetMsg("PIN은 숫자 4~6자리예요", true); return; }
  if (p1 !== p2){ lockSetMsg("PIN이 일치하지 않아요", true); return; }
  const salt = randHex(8);
  const hash = await hashPin(p1, salt);
  localStorage.setItem(PIN_KEY, JSON.stringify({ salt, hash, len: p1.length }));
  refreshLockSettings(); showToast("PIN을 설정했어요");
});
$bioToggleBtn.addEventListener("click", async () => {
  if (getBio()){
    openConfirm({ title:"생체인증 해제", message:"생체인증 잠금을 해제할까요?", okText:"해제", danger:true,
      onOk: () => { localStorage.removeItem(BIO_KEY); refreshLockSettings(); showToast("생체인증을 해제했어요"); } });
  } else {
    try {
      lockSetMsg("생체인증 등록 중…");
      await enableBiometric();
      refreshLockSettings(); showToast("생체인증을 등록했어요");
    } catch(err){ console.warn(err); lockSetMsg("생체인증 등록에 실패했어요", true); }
  }
});
$lockNowBtn.addEventListener("click", () => {
  if (!lockEnabled()){ lockSetMsg("먼저 PIN이나 생체인증을 설정하세요", true); return; }
  closeLockSettings();
  showLock(currentUser);
});

/* ============================================================
   Boot
   ============================================================ */
(async function init(){
  if (sb){
    // 인증 상태 변화 감지 (로그아웃·비밀번호 재설정)
    // 저장 영구화 요청 → 자동 로그인 정보(세션)가 지워지지 않도록 (특히 iOS/설치형 PWA)
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist().catch(() => {});
    }
    sb.auth.onAuthStateChange((event) => {
      if (event === "SIGNED_OUT") location.reload();
      else if (event === "PASSWORD_RECOVERY"){ showLogin(); setAuthMode("recovery"); }
    });
    // 비밀번호 재설정 메일 링크로 들어온 경우 → 새 비밀번호 설정 화면
    if (INITIAL_HASH.includes("type=recovery")){
      showLogin();
      setAuthMode("recovery");
      render();
      return;
    }
    try {
      const { data } = await sb.auth.getSession();
      if (data && data.session && data.session.user){
        if (lockEnabled()){
          render();                 // 데이터는 잠금 해제 후 로드 (화면은 잠금이 가림)
          showLock(data.session.user);
        } else {
          await startApp(data.session.user);
        }
      } else {
        showLogin();
        render();
      }
    } catch(e){
      console.error(e);
      showLogin();
      render();
    }
    return;
  }
  // Supabase SDK 로드 실패 → 기존 로컬(localStorage) 모드로 동작
  try {
    await loadAll();
  } catch(e){
    console.error(e);
    showToast("저장된 기록을 불러오지 못했어요");
  }
  try { await loadProjects(); } catch(e){ console.error(e); }
  render();
  document.body.classList.add("app-ready");
})();
</script>
<script>
  /* PWA 서비스 워커 등록 + 자동 업데이트 (새 버전 배포 시 자동 반영) */
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").then((reg) => {
        reg.update();
        setInterval(() => reg.update(), 60 * 60 * 1000); // 1시간마다 갱신 확인
      }).catch((e) => console.warn("SW 등록 실패", e));
      let reloaded = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (reloaded) return;
        reloaded = true;
        location.reload(); // 새 SW가 제어 시작하면 1회 새로고침해 최신 화면 적용
      });
    });
  }
</script>
